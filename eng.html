<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sổ tay từ vựng</title>
        <!-- Logo hiển thị trên tab -->
    <link rel="icon" type="image/png" href="eng.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f4f6f7; padding: 20px; }
        .container { max-width: 900px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-audio { background-color: #0d6efd; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
        .btn-speak { background-color: #ffc107; color: black; border: none; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        #quizSection { display: none; margin-top: 20px; padding: 20px; border: 2px solid #0d6efd; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4">Sổ tay từ vựng</h2>
    
    <div id="inputArea">
        <textarea id="wordInput" class="form-control" rows="3" placeholder="Nhập từ, cách nhau bởi dấu phẩy hoặc xuống dòng..."></textarea>
        <button class="btn btn-primary mt-2" onclick="processAllWords()">Tra & Thêm từ</button>
        
        <div class="mt-3 p-3 bg-secondary bg-opacity-10 border rounded">
            <label class="fw-bold">Thêm từ ngẫu nhiên:</label>
            <div class="d-flex mt-2">
                <input type="number" id="randomCount" class="form-control w-25" value="5" min="1" max="10">
                <button class="btn btn-info ms-2" onclick="addRandomWords()">Thêm ngay</button>
            </div>
        </div>
        
        <div class="mt-3 p-3 bg-light border">
            <label class="fw-bold">Chế độ kiểm tra:</label>
            <select id="quizMode" class="form-select w-auto d-inline-block mx-2">
                <option value="en-vi">Anh - Việt</option>
                <option value="vi-en">Việt - Anh</option>
            </select>
            <button class="btn btn-warning" onclick="startQuiz()">Tạo bài kiểm tra</button>
        </div>
    </div>

    <table class="table table-bordered mt-4" id="wordTable">
        <thead class="table-dark">
            <tr><th>Từ vựng</th><th>Phiên âm</th><th>Phát âm</th><th>Nghĩa</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="quizSection">
        <h4>Bài kiểm tra từ vựng</h4>
        <div id="quizForm" class="mt-3"></div>
        <button class="btn btn-primary mt-3" onclick="checkQuiz()">Kiểm tra kết quả</button>
        <button class="btn btn-secondary mt-3" onclick="goBack()">Quay lại</button>
        <div id="quizResult" class="mt-3 h4"></div>
    </div>

    <div class="mt-4">
        <button class="btn btn-success" onclick="exportToExcel()">Xuất Excel</button>
        <button class="btn btn-danger" onclick="clearAll()">Xóa hết</button>
    </div>
</div>

<script>
    let quizData = JSON.parse(localStorage.getItem('myVocab')) || [];
    window.onload = () => quizData.forEach(item => renderRow(item));

    // Hàm đọc bằng trình duyệt
    function speakWord(word) {
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }

   function renderRow(obj) {
    let tbody = document.querySelector("#wordTable tbody");
    let row = tbody.insertRow();
    row.insertCell(0).textContent = obj.word;
    row.insertCell(1).textContent = obj.phonetic || "N/A";
    
    let audioHtml = obj.audio ? `<button class="btn-audio" onclick="new Audio('${obj.audio}').play()">Nghe Gốc 🔊</button>` : "";
    audioHtml += `<button class="btn-speak" onclick="speakWord('${obj.word}')">Đọc Máy 🤖</button>`;
    
    row.insertCell(2).innerHTML = audioHtml;

    // Thay đổi cột Nghĩa thành thẻ input
    let meaningCell = row.insertCell(3);
    meaningCell.innerHTML = `<input type="text" class="form-control" value="${obj.meaning}" 
                             onchange="updateMeaning('${obj.word}', this.value)">`;
    }

    // Thêm hàm này để lưu lại mỗi khi bạn sửa
function updateMeaning(word, newMeaning) {
    let item = quizData.find(i => i.word === word);
    if (item) {
        item.meaning = newMeaning;
        localStorage.setItem('myVocab', JSON.stringify(quizData));
        console.log("Đã cập nhật nghĩa cho từ:", word);
    }
}

async function addRandomWords() {
    let count = document.getElementById("randomCount").value;
    // API Datamuse: lấy 100 từ phổ biến nhất (văn bản tiếng Anh)
    // 'topics=vocabulary' giúp lấy từ vựng chung
    const url = `https://api.datamuse.com/words?ml=common&max=100`; 
    
    try {
        let res = await fetch(url);
        let data = await res.json();
        
        // Lấy ngẫu nhiên vài từ từ danh sách trả về
        for (let i = 0; i < count; i++) {
            let randomIndex = Math.floor(Math.random() * data.length);
            let word = data[randomIndex].word;
            await addWordToTable(word);
        }
    } catch (e) {
        alert("Lỗi khi lấy từ thông dụng!");
    }
}

    // Thay thế hàm addWordToTable cũ bằng hàm này:
async function addWordToTable(inputWord) {
    inputWord = inputWord.trim().toLowerCase();
    
    // 1. Kiểm tra Cache
    const existing = quizData.find(item => item.word === inputWord);
    if (existing) return;

    try {
        let phonetic = "N/A";
        let audio = null;
        let meaning = "";

        // 2. Vẫn lấy phiên âm và audio từ Dictionary API (để giữ chức năng nghe/phiên âm)
        const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(inputWord)}`);
        if (dictRes.ok) {
            const dictData = await dictRes.json();
            const entry = dictData[0];
            phonetic = entry.phonetics?.find(ph => ph.text)?.text || entry.phonetic || "N/A";
            const audioObj = entry.phonetics.find(ph => ph.audio && ph.audio.length > 0);
            audio = audioObj ? audioObj.audio : null;
        }

        // 3. DỊCH NGHĨA TRỰC TIẾP TỪ (Thay vì dịch câu định nghĩa)
        // Cách này sẽ trả về nghĩa thông dụng nhất của từ
        const transUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(inputWord)}`;
        const transRes = await fetch(transUrl);
        const transData = await transRes.json();
        
        if (transData && transData[0]) {
            // Lấy kết quả dịch trực tiếp từ Google
            meaning = transData[0][0][0]; 
        } else {
            meaning = "Không tìm thấy nghĩa";
        }
        
        const obj = { word: inputWord, meaning: meaning, audio: audio, phonetic: phonetic };
        
        quizData.push(obj);
        localStorage.setItem('myVocab', JSON.stringify(quizData));
        renderRow(obj);
    } catch (e) { 
        console.error("Lỗi:", e);
    }
}

    function processAllWords() {
        let input = document.getElementById("wordInput").value;
        let words = input.split(/[,\n]/).map(w => w.trim()).filter(w => w !== "");
        words.forEach(w => addWordToTable(w));
        document.getElementById("wordInput").value = "";
    }

    // Các hàm Quiz và Tiện ích giữ nguyên như cũ...
    function startQuiz() {
        if (quizData.length === 0) return alert("Chưa có từ!");
        document.getElementById("inputArea").style.display = "none";
        document.getElementById("wordTable").style.display = "none";
        document.getElementById("quizSection").style.display = "block";
        
        let mode = document.getElementById("quizMode").value;
        let activeQuestions = [...quizData].sort(() => Math.random() - 0.5);
        
        document.getElementById("quizForm").innerHTML = activeQuestions.map((item, index) => {
            let isEnVi = mode === 'en-vi';
            return `<div class="card mb-3 p-3">
                    <strong>${index + 1}. ${isEnVi ? item.word : item.meaning}</strong>
                    <input type="text" class="form-control mt-2" id="ans_${index}" data-correct="${isEnVi ? item.meaning : item.word}">
                </div>`;
        }).join("");
        window.activeQuestions = activeQuestions;
    }

    function checkQuiz() {
        let score = 0;
        window.activeQuestions.forEach((item, index) => {
            let input = document.getElementById(`ans_${index}`);
            if (input.value.trim().toLowerCase() === input.dataset.correct.toLowerCase()) score++;
        });
        document.getElementById("quizResult").innerHTML = `<b>Kết quả: ${score}/${window.activeQuestions.length} đúng.</b>`;
    }

    function goBack() { location.reload(); }
    function clearAll() { localStorage.removeItem('myVocab'); location.reload(); }
    function exportToExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("wordTable")), "TuVung.xlsx"); }
</script>
</body>
</html>
