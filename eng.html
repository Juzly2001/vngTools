<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ tay từ vựng</title>
    <link rel="icon" type="image/png" href="eng.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); min-height: 100vh; padding: 20px 10px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-audio, .btn-speak { padding: 4px 8px; font-size: 12px; margin: 2px; }
        /* Tinh chỉnh nút nghe */
        .btn-audio, .btn-speak {
            padding: 5px 8px;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            margin: 2px;
            transition: transform 0.1s;
        }
        .btn-audio:active, .btn-speak:active { transform: scale(0.95); }
        .btn-audio { background-color: #0d6efd; color: white; }
        .btn-speak { background-color: #ffc107; color: black; }
        
        /* Đảm bảo ô Phát âm không bị quá hẹp */
        td:nth-child(3) { white-space: nowrap; }
        /* Tối ưu bảng cho mobile */
        .table-responsive { overflow-x: auto; }
        #wordTable { min-width: 500px; } 
        input.form-control { min-width: 80px; }

        /* Tối ưu Input Group cho mobile */
        @media (max-width: 576px) {
            .input-group {
                flex-direction: column;
            }
            .input-group > .form-select, 
            .input-group > .btn {
                width: 100% !important;
                border-radius: 6px !important;
                margin-left: 0 !important;
                margin-top: 5px;
            }
        }

        /* Thu nhỏ các input trong bảng để không bị tràn */
        #wordTable input.form-control {
            padding: 4px 8px;
            font-size: 13px;
            min-width: 60px;
        }

        .correct-input { border: 2px solid green !important; background-color: #d4edda !important; }
        .wrong-input { border: 2px solid red !important; background-color: #f8d7da !important; }
        .show-answer { color: red; font-size: 0.9em; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4">Sổ tay từ vựng</h2>
    
    <div id="inputArea">
        <textarea id="wordInput" class="form-control" rows="3" placeholder="Nhập từ, cách nhau bởi dấu phẩy..."></textarea>
        <button class="btn btn-primary mt-2 w-100" onclick="processAllWords()">Tra & Thêm từ</button>
        
        <div class="mt-3 p-3 bg-secondary bg-opacity-10 border rounded">
            <label class="fw-bold">Thêm từ ngẫu nhiên:</label>
            <div class="input-group mt-2">
                <input type="number" id="randomCount" class="form-control" value="5" min="1" max="10">
                <button class="btn btn-info" onclick="addRandomWords()">Thêm ngay</button>
            </div>
        </div>

    <div class="mt-3 p-3 bg-primary bg-opacity-10 border rounded">
        <label class="fw-bold">Thêm từ theo chủ đề:</label>
        <div class="row g-2 mt-2">
            <div class="col-8">
                <input type="text" id="topicInput" class="form-control" placeholder="Chủ đề (VD: food)">
            </div>
            <div class="col-4">
                <input type="number" id="topicCount" class="form-control" value="5" min="1" max="20">
            </div>
        </div>
        <button class="btn btn-primary w-100 mt-2" onclick="addByTopic()">Thêm theo chủ đề</button>
    </div>
        
        <div class="mt-3 p-3 bg-light border">
            <label class="fw-bold">Chế độ kiểm tra:</label>
            <div class="input-group mt-2"> <select id="quizMode" class="form-select">
                    <option value="en-vi">Anh - Việt</option>
                    <option value="vi-en">Việt - Anh</option>
                    <option value="mixed">Trộn Việt - Anh</option>
                </select>
                <button class="btn btn-warning" onclick="startQuiz()">Bắt đầu</button>
            </div>
        </div>
    </div>

    <div class="table-responsive mt-4">
        <table class="table table-bordered table-hover" id="wordTable">
            <thead class="table-dark">
                <tr><th>Từ vựng</th><th>Phiên âm</th><th>Phát âm</th><th>Nghĩa</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="quizSection" style="display:none;">
        <h4>Bài kiểm tra từ vựng</h4>
        <div id="quizForm" class="mt-3"></div>
        <button class="btn btn-primary mt-3" onclick="checkQuiz()">Kiểm tra</button>
        <button class="btn btn-secondary mt-3" onclick="goBack()">Quay lại</button>
        <div id="quizResult" class="mt-3 h4"></div>
    </div>

    <div class="mt-4 d-flex gap-2">
        <button class="btn btn-success flex-grow-1" onclick="exportToExcel()">Xuất Excel</button>
        <button class="btn btn-danger flex-grow-1" onclick="clearAll()">Xóa hết</button>
    </div>
</div>

<script>

    function showModal(message) {
        document.getElementById('modalContent').innerText = message;
        // Sử dụng instance của Bootstrap để show
        const modalElement = document.getElementById('infoModal');
        const modal = new bootstrap.Modal(modalElement);
        modal.show();
    }
    
    let quizData = JSON.parse(localStorage.getItem('myVocab')) || [];
    window.onload = () => quizData.forEach(item => renderRow(item));

    // Hàm đọc bằng trình duyệt
    function speakWord(word) {
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }

function renderRow(obj) {
    let tbody = document.querySelector("#wordTable tbody");
    let row = tbody.insertRow();
    
    // Cột Từ vựng
    row.insertCell(0).textContent = obj.word;
    
    // Cột Phiên âm (Chuyển thành ô input)
    let phoneticCell = row.insertCell(1);
    phoneticCell.innerHTML = `<input type="text" class="form-control" value="${obj.phonetic || ""}" 
                             onchange="updateField('${obj.word}', 'phonetic', this.value)">`;
    
    // Cột Phát âm
    let audioHtml = obj.audio ? `<button class="btn-audio" title="Nghe Gốc" onclick="new Audio('${obj.audio}').play()">🔊</button>` : "";
    audioHtml += `<button class="btn-speak" title="Đọc Máy" onclick="speakWord('${obj.word}')">🤖</button>`;
    row.insertCell(2).innerHTML = audioHtml;

    // Cột Nghĩa (Chuyển thành ô input)
    let meaningCell = row.insertCell(3);
    meaningCell.innerHTML = `<input type="text" class="form-control" value="${obj.meaning}" 
                             onchange="updateField('${obj.word}', 'meaning', this.value)">`;
}

    // Thêm hàm này để lưu lại mỗi khi bạn sửa
function updateField(word, field, newValue) {
    let item = quizData.find(i => i.word === word);
    if (item) {
        item[field] = newValue; // Cập nhật linh hoạt theo trường (phonetic hoặc meaning)
        localStorage.setItem('myVocab', JSON.stringify(quizData));
        console.log(`Đã cập nhật ${field} cho từ: ${word}`);
    }
}

async function addRandomWords() {
    let count = document.getElementById("randomCount").value;
    // API Datamuse: lấy 100 từ phổ biến nhất (văn bản tiếng Anh)
    // 'topics=vocabulary' giúp lấy từ vựng chung
    const url = `https://api.datamuse.com/words?ml=common&max=100`; 
    
    try {
        let res = await fetch(url);
        let data = await res.json();
        
        // Lấy ngẫu nhiên vài từ từ danh sách trả về
        for (let i = 0; i < count; i++) {
            let randomIndex = Math.floor(Math.random() * data.length);
            let word = data[randomIndex].word;
            await addWordToTable(word);
        }
        showModal(`Đã thêm ${count} từ ngẫu nhiên!`);
    } catch (e) {
        showModal("Lỗi khi lấy từ thông dụng!");
    }
}

    // Thay thế hàm addWordToTable cũ bằng hàm này:
async function addWordToTable(inputWord) {
    inputWord = inputWord.trim().toLowerCase();
    
    // 1. Kiểm tra Cache
    const existing = quizData.find(item => item.word === inputWord);
    if (existing) return;

    try {
        let phonetic = "N/A";
        let audio = null;
        let meaning = "";

        // 2. Vẫn lấy phiên âm và audio từ Dictionary API (để giữ chức năng nghe/phiên âm)
        const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(inputWord)}`);
        if (dictRes.ok) {
            const dictData = await dictRes.json();
            const entry = dictData[0];
            phonetic = entry.phonetics?.find(ph => ph.text)?.text || entry.phonetic || "N/A";
            const audioObj = entry.phonetics.find(ph => ph.audio && ph.audio.length > 0);
            audio = audioObj ? audioObj.audio : null;
        }

        // 3. DỊCH NGHĨA TRỰC TIẾP TỪ (Thay vì dịch câu định nghĩa)
        // Cách này sẽ trả về nghĩa thông dụng nhất của từ
        const transUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(inputWord)}`;
        const transRes = await fetch(transUrl);
        const transData = await transRes.json();
        
        if (transData && transData[0]) {
            // Lấy kết quả dịch trực tiếp từ Google
            meaning = transData[0][0][0]; 
        } else {
            meaning = "Không tìm thấy nghĩa";
        }
        
        const obj = { word: inputWord, meaning: meaning, audio: audio, phonetic: phonetic };
        
        quizData.push(obj);
        localStorage.setItem('myVocab', JSON.stringify(quizData));
        renderRow(obj);
    } catch (e) { 
        console.error("Lỗi:", e);
    }
}

    function processAllWords() {
        let input = document.getElementById("wordInput").value;
        let words = input.split(/[,\n]/).map(w => w.trim()).filter(w => w !== "");
        words.forEach(w => addWordToTable(w));
        document.getElementById("wordInput").value = "";
        showModal("Đã thêm các từ vào danh sách!");
    }

    // Các hàm Quiz và Tiện ích giữ nguyên như cũ...
    function startQuiz() {
        if (quizData.length === 0) return showModal("Chưa có từ!");
        document.getElementById("inputArea").style.display = "none";
        document.getElementById("wordTable").style.display = "none";
        document.getElementById("quizSection").style.display = "block";
        
        let mode = document.getElementById("quizMode").value;
        let activeQuestions = [...quizData].sort(() => Math.random() - 0.5);
        
        document.getElementById("quizForm").innerHTML = activeQuestions.map((item, index) => {
            // Nếu là 'mixed', tung đồng xu (Math.random()) để quyết định chiều dịch
            let isEnVi = mode === 'en-vi' || (mode === 'mixed' && Math.random() > 0.5);
            
            return `<div class="card mb-3 p-3">
                    <strong>${index + 1}. ${isEnVi ? item.word : item.meaning}</strong>
                    <input type="text" class="form-control mt-2" id="ans_${index}" data-correct="${isEnVi ? item.meaning : item.word}">
                </div>`;
        }).join("");
        window.activeQuestions = activeQuestions;
    }

    function checkQuiz() {
        let score = 0;
        window.activeQuestions.forEach((item, index) => {
            let input = document.getElementById(`ans_${index}`);
            let correctAnswer = input.dataset.correct.toLowerCase();
            let userAnswer = input.value.trim().toLowerCase();
            
            // Tạo một div để hiển thị đáp án đúng nếu sai
            let parent = input.parentElement;
            let feedback = parent.querySelector('.show-answer');
            if (!feedback) {
                feedback = document.createElement('div');
                feedback.className = 'show-answer';
                parent.appendChild(feedback);
            }

            if (userAnswer === correctAnswer) {
                input.classList.add('correct-input');
                input.classList.remove('wrong-input');
                feedback.innerText = "";
                score++;
            } else {
                input.classList.add('wrong-input');
                input.classList.remove('correct-input');
                feedback.innerText = `Sai rồi! Đáp án đúng là: ${input.dataset.correct}`;
            }
        });
        document.getElementById("quizResult").innerHTML = `<b>Kết quả: ${score}/${window.activeQuestions.length} đúng.</b>`;
    }

    function goBack() { location.reload(); }
    function clearAll() { localStorage.removeItem('myVocab'); location.reload(); }
    function exportToExcel() {
    // 1. Chỉ lấy các trường dữ liệu cần thiết
    const dataToExport = quizData.map(item => ({
        "Từ vựng": item.word,
        "Phiên âm": item.phonetic,
        "Nghĩa": item.meaning
    }));

    // 2. Tạo worksheet từ dữ liệu đã chọn
    const worksheet = XLSX.utils.json_to_sheet(dataToExport);
    
    // 3. Tạo workbook và thêm worksheet vào
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "TuVung");

    // 4. Xuất file
    XLSX.writeFile(workbook, "TuVung.xlsx");
}

// Khai báo biến này ở ngoài cùng (phần khai báo biến chung)
// Biến lưu trữ trạng thái trang hiện tại cho chủ đề
let topicPage = 1;
let lastTopic = "";

async function addByTopic() {
    let topic = document.getElementById("topicInput").value.trim();
    let count = parseInt(document.getElementById("topicCount").value);
    
    if (!topic) return showModal("Vui lòng nhập chủ đề!");
    
    const btn = event.target;
    btn.innerText = "Đang tải...";
    btn.disabled = true;

    // Lấy 100 từ (số lượng lớn giúp tăng cơ hội có từ mới)
    const url = `https://api.datamuse.com/words?ml=${encodeURIComponent(topic)}&max=100`;
    
    try {
        let res = await fetch(url);
        let data = await res.json();
        
        // 1. Lọc: Chỉ giữ lại các từ chưa có trong danh sách hiện tại (quizData)
        let newWords = data.filter(item => !quizData.some(q => q.word === item.word));
        
        if (newWords.length === 0) {
            showModal("Đã hết từ vựng mới cho chủ đề này!");
        } else {
            // 2. Xáo trộn ngẫu nhiên (Fisher-Yates shuffle)
            for (let i = newWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newWords[i], newWords[j]] = [newWords[j], newWords[i]];
            }
            
            // 3. Lấy ra số lượng từ cần thêm
            let wordsToAdd = newWords.slice(0, count);
            
            // 4. Thêm từng từ
            for (let item of wordsToAdd) {
                await addWordToTable(item.word);
            }
            showModal(`Đã thêm ${wordsToAdd.length} từ mới về: ${topic}`);
        }
    } catch (e) {
        showModal("Lỗi kết nối.");
    } finally {
        btn.innerText = "Thêm theo chủ đề";
        btn.disabled = false;
    }
}
</script>

<div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thông báo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modalContent">
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
