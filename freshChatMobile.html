<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FreshChat Pro">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff' style='background-color:%230b74de;border-radius:20%25;'%3E%3Cpath d='M13 10V3L4 14h7v7l9-11h-7z'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff' style='background-color:%230b74de;border-radius:20%25;'%3E%3Cpath d='M13 10V3L4 14h7v7l9-11h-7z'/%3E%3C/svg%3E">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreshChat Mobile Ultimate</title>
    <style>
        :root {
            --primary: #0b74de;
            --success: #2e8b57;
            --bg: #ffffff;
            --border: #eeeeee;
        }

        /* Full Screen Layout */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            background: #f4f7f9;
        }

        /* Mặc định ẩn ô nhập link để giống App */
        .input-group {
            display: none; 
        }

        /* Chỉ hiện ô nhập link khi người dùng nhấn giữ vào Logo Header 3 giây (để thay link khi cần) */
        .input-group.show {
            display: flex;
        }
        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header & Toolbar */
        .header {
            background: var(--primary);
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            flex-shrink: 0;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .toolbar {
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }

        input {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            outline: none;
        }

        #gsLink { flex: 1; border-color: #ddd; }
        
        .btn-reload {
            background: #fff;
            border: 1px solid #ccc;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 18px;
        }

        .search-container {
            display: flex;
            align-items: center;
            background: #f0f2f5;
            border-radius: 8px;
            padding: 0 10px;
        }

        #searchInput {
            border: none;
            background: transparent;
            flex: 1;
            padding: 12px 5px;
        }

        #clearSearch {
            display: none; /* Mặc định ẩn đi */
        }

        #searchInput:not(:placeholder-shown) + #clearSearch {
            display: block; /* Chỉ hiện khi người dùng đã gõ gì đó */
        }

        .icon-btn {
            padding: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Shortcuts */
        .shortcuts {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .shortcut-btn {
            background: white;
            border: 1px solid #d1d5db;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.2s;
        }

        .shortcut-btn:active {
            background: #e5e7eb;
            transform: scale(0.95);
        }

        /* Table Fixed Layout */
        .table-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Chống lệch hàng */
        }

        tr:nth-child(even) { background: #fafafa; }

        td {
            padding: 14px 8px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            font-size: 14px;
        }

        .col-id { 
            width: 32%; 
            font-weight: 700; 
            color: #1a1a1a; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }

        .col-text { 
            width: 48%; 
            color: #4a4a4a; 
            cursor: pointer;
        }

        .col-action { 
            width: 20%; 
            text-align: center; 
        }

        .text-preview {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .copy-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px 0;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            box-shadow: 0 2px 4px rgba(46, 139, 87, 0.2);
        }

        /* Khung nền mờ bao quanh */
        #detailModal {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 15px; /* Tạo khoảng trống an toàn xung quanh khung trắng */
            box-sizing: border-box; /* Đảm bảo padding không làm tăng kích thước 100% */
        }

        /* Khung trắng chứa nội dung */
        .modal-content {
            background: white;
            width: 100%; /* Ưu tiên chiếm hết chiều ngang có thể */
            max-width: 400px; /* Nhưng không vượt quá 400px trên màn hình lớn */
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            box-sizing: border-box; /* Quan trọng: Giữ padding nằm trong width */
            position: relative;
        }

        /* Nội dung văn bản bên trong */
        .modal-body {
            max-height: 50vh;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word; /* Ngắt dòng nếu từ quá dài */
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 20px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .modal-close {
            background: var(--primary);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            color: #fff;
            font-size: 15px;
        }

        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            display: none;
            z-index: 20000;
        }

        /* Keyboard */

        .kb-key:active { background: #abb1b7; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">FRESHCHAT SUPPORT PRO</div>
    
    <div class="toolbar">
        <div class="input-group">
            <input type="text" id="gsLink" placeholder="Link Google Sheets (Bất kỳ ai có link)...">
            <button class="btn-reload" id="btnReload">🔄</button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Tìm ID hoặc nội dung...">
            <span id="clearSearch" style="padding: 0 10px; cursor: pointer; color: #999; font-weight: bold;">✕</span>
            
            <span id="addKeyBtn" class="icon-btn">➕</span>
        </div>

        <div id="shortcutList" class="shortcuts"></div>
    </div>

    <div class="table-wrapper">
        <table>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="detailModal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--primary)">Nội dung chi tiết</h3>
        <div id="modalText" class="modal-body"></div>
        <button class="modal-close" onclick="closeModal()">ĐÓNG CỬA SỔ</button>
    </div>
</div>

<div id="toast">Đã copy thành công!</div>

<script>
    let rows = [];
    let shortcuts = ["HT", "KT", "LH", "CC", "TK", "GD", "KM"];

    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const shortcutList = document.getElementById('shortcutList');
    const gsInput = document.getElementById('gsLink');

    // 1. Render Bảng dữ liệu
    function render(filter = "") {
        tableBody.innerHTML = "";
        const data = rows.filter(r => 
            r.id.toLowerCase().includes(filter.toLowerCase()) || 
            r.text.toLowerCase().includes(filter.toLowerCase())
        );

        data.forEach(r => {
            const tr = document.createElement('tr');
            
            // Cột ID
            const tdId = document.createElement('td');
            tdId.className = "col-id";
            tdId.textContent = r.id;

            // Cột Nội dung (Bấm để xem popup)
            const tdText = document.createElement('td');
            tdText.className = "col-text";
            tdText.innerHTML = `<div class="text-preview">${r.text}</div>`;
            tdText.onclick = () => showDetail(r.text);

            // Cột Nút Copy
            const tdAction = document.createElement('td');
            tdAction.className = "col-action";
            const btn = document.createElement('button');
            btn.className = "copy-btn";
            btn.textContent = "COPY";
            btn.onclick = (e) => {
                e.stopPropagation();
                copyToClipboard(r.text);
            };

            tdAction.appendChild(btn);
            tr.append(tdId, tdText, tdAction);
            tableBody.appendChild(tr);
        });
    }

    // 2. Render Key Tắt (Hỗ trợ Long Press)
    function renderKeys() {
        shortcutList.innerHTML = "";
        shortcuts.forEach((key, index) => {
            const btn = document.createElement('button');
            btn.className = "shortcut-btn";
            btn.textContent = key;

            let timer;
            // Click bình thường để tìm kiếm
            btn.onclick = () => {
                searchInput.value = key;
                render(key);
            };

            // Nhấn giữ 0.8s để xóa
            const start = () => {
                timer = setTimeout(() => {
                    if (confirm(`Xóa phím tắt "${key}"?`)) {
                        shortcuts.splice(index, 1);
                        renderKeys();
                    }
                }, 800);
            };
            const end = () => clearTimeout(timer);

            btn.onmousedown = start; btn.onmouseup = end; btn.onmouseleave = end;
            btn.ontouchstart = start; btn.ontouchend = end;

            shortcutList.appendChild(btn);
        });
    }

    // 3. Popup & Copy
    function showDetail(text) {
        document.getElementById('modalText').textContent = text;
        document.getElementById('detailModal').style.display = "flex";
    }

    function closeModal() {
        document.getElementById('detailModal').style.display = "none";
    }

    function copyToClipboard(text) {
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        
        const t = document.getElementById('toast');
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 1500);
    }

    // 4. Google Sheets Logic
    async function loadGS(url) {
        if (!url) return;
        const id = url.match(/\/d\/([a-zA-Z0-9-_]+)/)?.[1];
        if (!id) return;
        
        document.getElementById('btnReload').textContent = "⏳";
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
            const txt = await res.text();
            const json = JSON.parse(txt.substr(47).slice(0, -2));
            rows = json.table.rows.map(r => ({
                id: String(r.c[0]?.v || ""),
                text: String(r.c[1]?.v || "")
            })).filter(r => r.id);
            render();
            localStorage.setItem("GS_SAVED_LINK", url);
        } catch (e) { alert("Lỗi: Hãy kiểm tra quyền chia sẻ của Link GS!"); }
        document.getElementById('btnReload').textContent = "🔄";
    }


    // 6. Events & Init
    searchInput.oninput = (e) => render(e.target.value);
    document.getElementById('btnReload').onclick = () => loadGS(gsInput.value);

    document.getElementById('addKeyBtn').onclick = () => {
        const n = prompt("Tên phím tắt mới:");
        if(n) { shortcuts.push(n.toUpperCase()); renderKeys(); }
    };

    window.onload = () => {
        const saved = localStorage.getItem("GS_SAVED_LINK");
        if (saved) { gsInput.value = saved; loadGS(saved); }
        renderKeys();
    };

    // Bấm dấu X để xóa nhanh nội dung tìm kiếm
    document.getElementById('clearSearch').onclick = function() {
        const input = document.getElementById('searchInput');
        input.value = ""; // Xóa chữ trong ô
        render("");       // Tải lại bảng đầy đủ
        input.focus();    // Đưa con trỏ chuột trở lại ô nhập
    };

    // ... (Giữ nguyên các biến rows, shortcuts và hàm render, renderKeys bên trên)

    const header = document.querySelector('.header');
    const inputGroup = document.querySelector('.input-group');

    // Nhấn giữ Header 2 giây để hiện/ẩn ô nhập link (Dùng khi cần đổi Sheets)
    let headerTimer;
    header.ontouchstart = () => { headerTimer = setTimeout(() => inputGroup.classList.toggle('show'), 2000); };
    header.ontouchend = () => clearTimeout(headerTimer);

    // Hàm kích hoạt Full Screen (Phải có tương tác người dùng)
    function requestFullScreen() {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    // Chạm bất kỳ đâu lần đầu tiên là bật Full Screen
    document.addEventListener('click', () => {
        requestFullScreen();
    }, { once: true });

    window.onload = () => {
        const saved = localStorage.getItem("GS_SAVED_LINK_FC");
        if (saved) {
            gsInput.value = saved;
            loadGS(saved);
            // Nếu đã có link thì không hiện ô nhập nữa cho giống App
            inputGroup.classList.remove('show');
        } else {
            // Nếu chưa có link thì hiện ra để nhập
            inputGroup.classList.add('show');
        }
        renderKeys();
    };
</script>

</body>
</html>
