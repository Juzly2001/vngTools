<script>

    let scannedCodes = [];

    let lastScanned = "";
    let lastScanTime = 0;

    function beepSuccess(){
        const audio = new Audio(
            "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
        );
        audio.play();
    }

    function vibratePhone(){
        if(navigator.vibrate){
            navigator.vibrate(120);
        }
    }

    function onScanSuccess(decodedText){

        const now = Date.now();

        // chống spam quét liên tục
        if(decodedText === lastScanned && now - lastScanTime < 1500){
            return;
        }

        lastScanned = decodedText;
        lastScanTime = now;

        // không thêm mã trùng
        if(scannedCodes.includes(decodedText)){
            return;
        }

        scannedCodes.push(decodedText);

        beepSuccess();
        vibratePhone();

        const item = document.createElement("div");
        item.className = "barcode-item";
        item.innerText = decodedText;

        document.getElementById("result-container")
            .prepend(item);

        updateStatus();
    }

    function updateStatus(){
        document.getElementById("status").innerText =
            `Đã quét ${scannedCodes.length} mã`;
    }

    // COPY
    document.getElementById("copyBtn")
        .addEventListener("click", async () => {

        if(scannedCodes.length === 0){
            alert("Chưa có mã để copy");
            return;
        }

        const text = scannedCodes.join(", ");

        await navigator.clipboard.writeText(text);

        alert("Đã copy tất cả mã");
    });

    // XÓA
    document.getElementById("clearBtn")
        .addEventListener("click", () => {

        scannedCodes = [];

        document.getElementById("result-container").innerHTML = "";

        updateStatus();
    });

    // KHỞI TẠO CAMERA SAU
    const html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
        .then(devices => {

            if(devices && devices.length){

                // ưu tiên camera sau
                let backCamera = devices.find(device =>
                    device.label.toLowerCase().includes('back') ||
                    device.label.toLowerCase().includes('rear') ||
                    device.label.toLowerCase().includes('environment')
                );

                // nếu không tìm thấy thì dùng camera đầu tiên
                let cameraId = backCamera
                    ? backCamera.id
                    : devices[0].id;

                html5QrCode.start(
                    cameraId,
                    {
                        fps: 20,

                        qrbox: function(viewfinderWidth, viewfinderHeight) {

                            let minEdge =
                                Math.min(viewfinderWidth, viewfinderHeight);

                            let size = Math.floor(minEdge * 0.8);

                            return {
                                width: size,
                                height: size
                            };
                        },

                        aspectRatio: 1.7778,

                        disableFlip: false
                    },
                    onScanSuccess
                );

            }
        })
        .catch(err => {
            console.error("Không tìm thấy camera", err);
        });

</script>
