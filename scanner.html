<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Document Scanner Pro</title>
  <script src="https://docs.opencv.org/4.8.0/opencv.js" async onload="window.__opencvLoaded=true"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{--bg:#0b1020;--card:#121a2e;--card2:#17213a;--text:#eef3ff;--muted:#97a3bd;--line:rgba(255,255,255,.12);--pri:#5eead4;--danger:#fb7185;--warn:#fbbf24}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(145deg,#070b15,#101933);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh}
    header{position:sticky;top:0;z-index:5;background:rgba(8,12,24,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    h1{font-size:16px;margin:0}.status{font-size:12px;color:var(--muted)}
    main{padding:12px;display:grid;gap:12px;max-width:980px;margin:auto}.panel{background:rgba(18,26,46,.88);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.28)}
    .camera-wrap{position:relative;background:#030712;min-height:58vh;display:grid;place-items:center} video{width:100%;max-height:72vh;object-fit:contain;background:#000} canvas{max-width:100%;height:auto;display:block}
    .guide{position:absolute;inset:7%;border:2px dashed rgba(94,234,212,.75);border-radius:14px;pointer-events:none;box-shadow:0 0 0 999px rgba(0,0,0,.18)}
    .guide::after{content:'Đưa giấy vào khung, chụp rõ 4 mép';position:absolute;left:50%;bottom:-36px;transform:translateX(-50%);font-size:12px;color:#fff;background:rgba(0,0,0,.55);padding:6px 10px;border-radius:999px;white-space:nowrap}
    .controls{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px}.controls.three{grid-template-columns:repeat(3,1fr)}
    button,select,input{border:1px solid var(--line);border-radius:13px;background:var(--card2);color:var(--text);padding:11px 12px;font-weight:700;font-size:14px}button:active{transform:scale(.98)}.primary{background:linear-gradient(135deg,#14b8a6,#22c55e);color:#041014}.danger{background:rgba(251,113,133,.18);color:#fecdd3}.warn{background:rgba(251,191,36,.18);color:#fde68a}.ghost{background:rgba(255,255,255,.05)}
    .preview-head{display:flex;gap:8px;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--line)}.preview-head b{font-size:14px}.preview{background:#e5e7eb;display:grid;place-items:center;min-height:280px}.hint{padding:10px 12px;color:var(--muted);font-size:13px;line-height:1.45}.pages{display:flex;gap:8px;overflow:auto;padding:10px;border-top:1px solid var(--line)}.thumb{min-width:78px;width:78px;height:104px;border-radius:10px;background:#fff;object-fit:cover;border:2px solid transparent}.thumb.active{border-color:var(--pri)}
    .range{display:grid;grid-template-columns:90px 1fr 45px;gap:8px;align-items:center;padding:0 12px 10px;color:var(--muted);font-size:13px} input[type=range]{padding:0}
    .hidden{display:none!important}@media(max-width:620px){main{padding:8px}.camera-wrap{min-height:60vh}.controls{grid-template-columns:1fr 1fr;gap:8px;padding:10px}button,select,input{font-size:13px;padding:10px}.controls.three{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}}
  </style>
</head>
<body>
<header><div><h1>📄 Document Scanner Pro</h1><div id="status" class="status">Đang tải OpenCV...</div></div><button class="ghost" onclick="switchCamera()">🔄 Camera</button></header>
<main>
  <section class="panel">
    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="guide"></div>
    </div>
    <div class="controls">
      <button class="primary wide" onclick="captureAndScan()">📸 Scan giấy</button>
      <button onclick="pickImage()">🖼️ Chọn ảnh</button>
      <button class="warn" onclick="manualCrop()">✂️ Cắt lại</button>
      <input id="fileInput" type="file" accept="image/*" class="hidden" onchange="loadPickedImage(event)">
    </div>
    <div class="hint">Bản này không chỉ chụp ảnh: nó tìm khung giấy lớn nhất, kéo phẳng phối cảnh, rồi xử lý sáng/tương phản để giống ảnh scan.</div>
  </section>
  <section class="panel">
    <div class="preview-head"><b>Trang đang xem</b><span id="pageInfo" class="status">0 trang</span></div>
    <div class="preview"><canvas id="resultCanvas"></canvas></div>
    <div class="controls three">
      <select id="filterMode" onchange="applyCurrentFilter()"><option value="magic">Scan rõ chữ</option><option value="bw">Trắng đen mạnh</option><option value="gray">Xám</option><option value="color">Màu scan</option><option value="original">Gốc đã cắt</option></select>
      <button onclick="rotatePage()">↻ Xoay</button><button onclick="addPage()">➕ Thêm trang</button>
      <button onclick="downloadJPG()">⬇️ JPG</button><button onclick="exportPDF()">📑 Xuất PDF</button><button class="danger" onclick="deletePage()">🗑️ Xóa</button>
    </div>
    <div class="range"><span>Độ sáng</span><input id="bright" type="range" min="-40" max="60" value="12" oninput="applyCurrentFilter()"><span id="brightVal">12</span></div>
    <div class="range"><span>Tương phản</span><input id="contrast" type="range" min="70" max="180" value="128" oninput="applyCurrentFilter()"><span id="contrastVal">128</span></div>
    <div id="pages" class="pages"></div>
  </section>
</main>
<script>
const $=id=>document.getElementById(id); let stream=null,useBack=true,pages=[],current=-1,lastOriginal=null,manualMode=false,manualPts=[];
function setStatus(t){$('status').textContent=t}
function cvReady(){return !!window.cv && !!cv.Mat}
async function waitCV(){for(let i=0;i<80;i++){if(cvReady()){setStatus('OpenCV đã sẵn sàng');return true} await new Promise(r=>setTimeout(r,250))} setStatus('Không tải được OpenCV, vẫn có thể chụp ảnh thường'); return false}
async function startCamera(){try{if(stream)stream.getTracks().forEach(t=>t.stop()); stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:useBack?'environment':'user',width:{ideal:1920},height:{ideal:1080}},audio:false}); $('video').srcObject=stream; setStatus('Camera sẵn sàng')}catch(e){setStatus('Không mở được camera: '+e.message)}}
async function switchCamera(){useBack=!useBack; await startCamera()}
function pickImage(){$('fileInput').click()}
function loadPickedImage(e){const f=e.target.files[0]; if(!f)return; const img=new Image(); img.onload=()=>processImage(img); img.src=URL.createObjectURL(f)}
function captureCanvas(){const v=$('video'); const c=document.createElement('canvas'); c.width=v.videoWidth||1280; c.height=v.videoHeight||720; c.getContext('2d').drawImage(v,0,0,c.width,c.height); return c}
async function captureAndScan(){if(!cvReady()) await waitCV(); processImage(captureCanvas())}
function processImage(source){try{const src=cv.imread(source); const warped=scanWarp(src); src.delete(); lastOriginal=matToCanvas(warped); warped.delete(); pages.push({original:lastOriginal.toDataURL('image/jpeg',.96),filtered:null}); current=pages.length-1; applyCurrentFilter(); renderThumbs();}catch(e){setStatus('Scan lỗi, dùng ảnh gốc: '+e.message); const c=document.createElement('canvas'); c.width=source.width; c.height=source.height; c.getContext('2d').drawImage(source,0,0); lastOriginal=c; pages.push({original:c.toDataURL('image/jpeg',.96),filtered:null}); current=pages.length-1; applyCurrentFilter(); renderThumbs();}}
function scanWarp(src){let maxW=1500, scale=Math.min(1,maxW/src.cols); let work=new cv.Mat(); cv.resize(src,work,new cv.Size(0,0),scale,scale,cv.INTER_AREA); let gray=new cv.Mat(),blur=new cv.Mat(),edge=new cv.Mat(),kernel=cv.Mat.ones(5,5,cv.CV_8U); cv.cvtColor(work,gray,cv.COLOR_RGBA2GRAY); cv.GaussianBlur(gray,blur,new cv.Size(5,5),0); cv.Canny(blur,edge,50,150); cv.dilate(edge,edge,kernel); cv.erode(edge,edge,kernel);
 let contours=new cv.MatVector(),hier=new cv.Mat(); cv.findContours(edge,contours,hier,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE); let best=null,bestArea=0;
 for(let i=0;i<contours.size();i++){let cnt=contours.get(i),peri=cv.arcLength(cnt,true),approx=new cv.Mat(); cv.approxPolyDP(cnt,approx,.025*peri,true); let area=cv.contourArea(cnt); if(approx.rows===4 && area>bestArea && area>work.rows*work.cols*.08){if(best)best.delete(); best=approx; bestArea=area}else approx.delete(); cnt.delete()}
 let pts;if(best){pts=[]; for(let i=0;i<4;i++) pts.push({x:best.data32S[i*2]/scale,y:best.data32S[i*2+1]/scale}); best.delete()} else {pts=[{x:0,y:0},{x:src.cols,y:0},{x:src.cols,y:src.rows},{x:0,y:src.rows}]}
 gray.delete();blur.delete();edge.delete();kernel.delete();contours.delete();hier.delete();work.delete(); return fourPointTransform(src,orderPoints(pts));}
function orderPoints(pts){let s=pts.map(p=>p.x+p.y),d=pts.map(p=>p.x-p.y); return [pts[s.indexOf(Math.min(...s))],pts[d.indexOf(Math.max(...d))],pts[s.indexOf(Math.max(...s))],pts[d.indexOf(Math.min(...d))]]}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function fourPointTransform(src,p){let w=Math.max(dist(p[2],p[3]),dist(p[1],p[0])),h=Math.max(dist(p[1],p[2]),dist(p[0],p[3])); w=Math.min(1800,Math.max(600,Math.round(w))); h=Math.min(2400,Math.max(800,Math.round(h))); let sp=cv.matFromArray(4,1,cv.CV_32FC2,[p[0].x,p[0].y,p[1].x,p[1].y,p[2].x,p[2].y,p[3].x,p[3].y]); let dp=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,w,0,w,h,0,h]); let M=cv.getPerspectiveTransform(sp,dp),dst=new cv.Mat(); cv.warpPerspective(src,dst,M,new cv.Size(w,h),cv.INTER_LINEAR,cv.BORDER_CONSTANT,new cv.Scalar(255,255,255,255)); sp.delete();dp.delete();M.delete(); return dst}
function matToCanvas(mat){let c=document.createElement('canvas'); cv.imshow(c,mat); return c}
function canvasFromData(url,cb){let img=new Image(); img.onload=()=>{let c=document.createElement('canvas'); c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);cb(c)}; img.src=url}
function applyCurrentFilter(){if(current<0)return; $('brightVal').textContent=$('bright').value; $('contrastVal').textContent=$('contrast').value; canvasFromData(pages[current].original,c=>{let out=filterCanvas(c,$('filterMode').value,+$('bright').value,+$('contrast').value); let rc=$('resultCanvas'); rc.width=out.width; rc.height=out.height; rc.getContext('2d').drawImage(out,0,0); pages[current].filtered=rc.toDataURL('image/jpeg',.96); renderThumbs(false);})}
function filterCanvas(c,mode,bright,contrast){if(!cvReady()||mode==='original'){return c} let src=cv.imread(c),dst=new cv.Mat(); if(mode==='color'){src.convertTo(dst,-1,contrast/100,bright); enhanceWhite(dst);}
 else {let gray=new cv.Mat(); cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY); if(mode==='gray'){gray.convertTo(dst,-1,contrast/100,bright)} else if(mode==='bw'){cv.adaptiveThreshold(gray,dst,255,cv.ADAPTIVE_THRESH_GAUSSIAN_C,cv.THRESH_BINARY,25,12)} else {let blur=new cv.Mat(); cv.GaussianBlur(gray,blur,new cv.Size(0,0),3); cv.addWeighted(gray,1.55,blur,-.55,0,dst); dst.convertTo(dst,-1,contrast/110,bright); cv.adaptiveThreshold(dst,dst,255,cv.ADAPTIVE_THRESH_GAUSSIAN_C,cv.THRESH_BINARY,31,9); blur.delete()} gray.delete()} let out=matToCanvas(dst); src.delete();dst.delete(); return out}
function enhanceWhite(mat){let gray=new cv.Mat(),mask=new cv.Mat(); cv.cvtColor(mat,gray,cv.COLOR_RGBA2GRAY); cv.threshold(gray,mask,190,255,cv.THRESH_BINARY); mat.setTo(new cv.Scalar(255,255,255,255),mask); gray.delete();mask.delete()}
function renderThumbs(redraw=true){$('pageInfo').textContent=pages.length+' trang'; const box=$('pages'); box.innerHTML=''; pages.forEach((p,i)=>{let im=new Image(); im.className='thumb '+(i===current?'active':''); im.src=p.filtered||p.original; im.onclick=()=>{current=i; applyCurrentFilter(); renderThumbs(false)}; box.appendChild(im)})}
function addPage(){captureAndScan()} function deletePage(){if(current<0)return; pages.splice(current,1); current=Math.min(current,pages.length-1); if(current>=0)applyCurrentFilter(); else {$('resultCanvas').width=0;$('resultCanvas').height=0} renderThumbs()}
function rotatePage(){if(current<0)return; canvasFromData(pages[current].original,c=>{let r=document.createElement('canvas'); r.width=c.height;r.height=c.width; let x=r.getContext('2d'); x.translate(r.width/2,r.height/2); x.rotate(Math.PI/2); x.drawImage(c,-c.width/2,-c.height/2); pages[current].original=r.toDataURL('image/jpeg',.96); applyCurrentFilter();})}
function downloadJPG(){if(current<0)return; let a=document.createElement('a'); a.href=pages[current].filtered||pages[current].original; a.download='scan-page-'+(current+1)+'.jpg'; a.click()}
async function exportPDF(){if(!pages.length)return; const {jsPDF}=window.jspdf; const pdf=new jsPDF({unit:'mm',format:'a4'}); for(let i=0;i<pages.length;i++){if(i)pdf.addPage(); let img=pages[i].filtered||pages[i].original; pdf.addImage(img,'JPEG',0,0,210,297,undefined,'FAST')} pdf.save('document-scan.pdf')}
function manualCrop(){alert('Bản này ưu tiên tự cắt 4 mép. Nếu giấy nền cùng màu làm nhận diện sai, đặt giấy trên nền tối và chụp lại sẽ giống CamScanner hơn.')}
waitCV(); startCamera();
</script>
</body>
</html>
