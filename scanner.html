<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Document Scanner Cam Style</title>
  <script src="https://docs.opencv.org/4.9.0/opencv.js" async onload="onOpenCvLoaded()"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{--bg:#0b1020;--card:#151c33;--soft:#202a48;--text:#eef3ff;--muted:#9aa8c7;--main:#4f8cff;--ok:#23c483;--danger:#ff5570;--line:rgba(255,255,255,.12)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;background:radial-gradient(circle at top,#1c2b58,#080b14 55%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100dvh} button,select{font:inherit} .app{max-width:980px;margin:auto;padding:14px}.top{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:12px}.title{font-weight:800;font-size:20px}.status{font-size:12px;color:var(--muted)}.card{background:rgba(21,28,51,.86);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 40px rgba(0,0,0,.28);overflow:hidden}.stage{position:relative;background:#05070d;min-height:55dvh;display:grid;place-items:center}.stage video,.stage canvas,.stage img{max-width:100%;max-height:72dvh;display:block}.camera video{width:100%;height:72dvh;object-fit:cover}.toolbar{display:flex;gap:8px;padding:10px;overflow:auto;background:rgba(0,0,0,.22);border-top:1px solid var(--line)}.btn{border:0;border-radius:14px;padding:11px 14px;background:var(--soft);color:var(--text);white-space:nowrap;font-weight:700}.btn.primary{background:linear-gradient(135deg,#3d7cff,#65a4ff)}.btn.ok{background:linear-gradient(135deg,#16a46b,#27cf8b)}.btn.danger{background:linear-gradient(135deg,#ff4263,#ff7c90)}.btn.ghost{background:rgba(255,255,255,.08);border:1px solid var(--line)}.btn:active{transform:scale(.98)}select{border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:14px;padding:10px 12px}.hidden{display:none!important}.hint{padding:10px 12px;color:var(--muted);font-size:13px;line-height:1.45}.crop-wrap{position:relative;touch-action:none}.crop-wrap img{user-select:none;pointer-events:none}.crop-svg{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.shade{fill:rgba(0,0,0,.42);fill-rule:evenodd}.poly{fill:rgba(79,140,255,.08);stroke:#70a8ff;stroke-width:3;stroke-linejoin:round}.edge{stroke:#fff;stroke-width:1.4;stroke-dasharray:8 7;opacity:.75}.pt{fill:#fff;stroke:#4f8cff;stroke-width:4;filter:drop-shadow(0 4px 8px rgba(0,0,0,.55));cursor:pointer}.zoom{position:absolute;right:10px;top:10px;width:92px;height:92px;border-radius:16px;border:2px solid #fff;background:#111;overflow:hidden;display:none;box-shadow:0 10px 30px rgba(0,0,0,.4)}.zoom canvas{width:100%;height:100%}.pages{display:flex;gap:8px;padding:10px;overflow:auto}.thumb{width:74px;height:96px;border-radius:10px;background:#fff;object-fit:cover;border:2px solid transparent}.thumb.active{border-color:var(--main)}.empty{text-align:center;color:var(--muted);padding:22px}.split{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:800px){.split{grid-template-columns:1.4fr .6fr}.camera video{height:74dvh}.stage{min-height:74dvh}}
  </style>
</head>
<body>
<div class="app">
  <div class="top"><div><div class="title">📄 Document Scanner</div><div class="status" id="status">Đang tải OpenCV...</div></div><button class="btn ghost" onclick="resetAll()">Làm mới</button></div>
  <div class="split">
    <div class="card">
      <div id="cameraView" class="stage camera">
        <video id="video" autoplay playsinline muted></video>
      </div>
      <div id="cropView" class="stage hidden">
        <div class="crop-wrap" id="cropWrap">
          <img id="cropImg" alt="crop">
          <svg class="crop-svg" id="cropSvg"></svg>
          <div class="zoom" id="zoom"><canvas id="zoomCanvas" width="184" height="184"></canvas></div>
        </div>
      </div>
      <div id="resultView" class="stage hidden"><canvas id="resultCanvas"></canvas></div>
      <div class="toolbar" id="barCamera">
        <button class="btn primary" onclick="startCamera()">📷 Mở camera</button>
        <button class="btn ok" onclick="capturePhoto()">📸 Chụp</button>
        <button class="btn ghost" onclick="pickFile.click()">🖼️ Chọn ảnh</button>
        <input id="pickFile" type="file" accept="image/*" class="hidden" onchange="loadFile(event)">
      </div>
      <div class="toolbar hidden" id="barCrop">
        <button class="btn ok" onclick="applyCrop()">✅ Apply Scan</button>
        <button class="btn ghost" onclick="autoCorners()">🎯 Tự tìm mép</button>
        <button class="btn ghost" onclick="resetCorners()">↺ Reset góc</button>
        <button class="btn danger" onclick="showCamera()">Hủy</button>
      </div>
      <div class="toolbar hidden" id="barResult">
        <select id="filterMode" onchange="renderFilter()">
          <option value="magic">Magic Color</option>
          <option value="bw">Trắng đen rõ chữ</option>
          <option value="gray">Xám</option>
          <option value="origin">Màu gốc</option>
        </select>
        <button class="btn ghost" onclick="rotateResult()">🔄 Xoay</button>
        <button class="btn ok" onclick="addPage()">➕ Thêm trang</button>
        <button class="btn primary" onclick="downloadPdf()">📄 Xuất PDF</button>
        <button class="btn ghost" onclick="showCamera()">Scan tiếp</button>
      </div>
      <div class="hint" id="hint">Quy trình: chụp → kéo 4 góc cho khớp mép giấy → Apply Scan → chọn bộ lọc → thêm trang hoặc xuất PDF.</div>
    </div>
    <div class="card">
      <div class="hint"><b>Trang đã scan</b><br>Ảnh sau khi xử lý sẽ nằm ở đây. Có thể xuất PDF nhiều trang.</div>
      <div class="pages" id="pages"><div class="empty">Chưa có trang nào</div></div>
      <div class="toolbar"><button class="btn danger" onclick="clearPages()">Xóa trang</button><button class="btn primary" onclick="downloadPdf()">Xuất PDF</button></div>
    </div>
  </div>
</div>
<canvas id="rawCanvas" class="hidden"></canvas><canvas id="workCanvas" class="hidden"></canvas>
<script>
let cvReady=false, stream=null, rawImg=null, cropImgEl, points=[], dragIndex=-1, croppedCanvas=null, finalData=null, pages=[];
const $=id=>document.getElementById(id); cropImgEl=$('cropImg');
function onOpenCvLoaded(){cv['onRuntimeInitialized']=()=>{cvReady=true;$('status').textContent='OpenCV sẵn sàng. Có thể scan kiểu CamScanner.'}}
function setBars(mode){['Camera','Crop','Result'].forEach(x=>$('bar'+x).classList.add('hidden'));$('bar'+mode).classList.remove('hidden')}
function view(mode){$('cameraView').classList.toggle('hidden',mode!=='camera');$('cropView').classList.toggle('hidden',mode!=='crop');$('resultView').classList.toggle('hidden',mode!=='result')}
async function startCamera(){try{if(stream)stream.getTracks().forEach(t=>t.stop());stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});$('video').srcObject=stream;$('status').textContent='Camera đang bật';showCamera()}catch(e){$('status').textContent='Không mở được camera: '+e.message}}
function showCamera(){view('camera');setBars('Camera');$('hint').textContent='Đưa giấy lên nền tối/khác màu, chụp đủ 4 góc giấy để auto crop tốt hơn.'}
function capturePhoto(){const v=$('video');if(!v.videoWidth)return alert('Chưa mở camera');const c=$('rawCanvas');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);loadRaw(c.toDataURL('image/jpeg',.96))}
function loadFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>loadRaw(r.result);r.readAsDataURL(f)}
function loadRaw(src){rawImg=new Image();rawImg.onload=()=>{cropImgEl.src=src;cropImgEl.onload=()=>{view('crop');setBars('Crop');setTimeout(()=>{resetCorners();autoCorners()},120)}};rawImg.src=src;$('hint').textContent='Kéo 4 chấm trắng vào đúng 4 góc giấy, giống CamScanner.'}
function displayedSize(){const r=cropImgEl.getBoundingClientRect();return {w:r.width,h:r.height}}
function resetCorners(){const {w,h}=displayedSize();points=[{x:w*.07,y:h*.06},{x:w*.93,y:h*.06},{x:w*.93,y:h*.94},{x:w*.07,y:h*.94}];drawCrop()}
function imgToDisplay(p){const {w,h}=displayedSize();return {x:p.x/rawImg.width*w,y:p.y/rawImg.height*h}}
function displayToImg(p){const {w,h}=displayedSize();return {x:p.x/w*rawImg.width,y:p.y/h*rawImg.height}}
function orderPts(pts){let s=pts.map(p=>p.x+p.y), d=pts.map(p=>p.x-p.y);return [pts[s.indexOf(Math.min(...s))],pts[d.indexOf(Math.max(...d))],pts[s.indexOf(Math.max(...s))],pts[d.indexOf(Math.min(...d))]]}
function autoCorners(){if(!cvReady||!rawImg)return resetCorners();try{const c=$('rawCanvas'),ctx=c.getContext('2d');c.width=rawImg.width;c.height=rawImg.height;ctx.drawImage(rawImg,0,0);let src=cv.imread(c), gray=new cv.Mat(), blur=new cv.Mat(), edge=new cv.Mat();cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);cv.GaussianBlur(gray,blur,new cv.Size(5,5),0);cv.Canny(blur,edge,50,150);let contours=new cv.MatVector(), hierarchy=new cv.Mat();cv.findContours(edge,contours,hierarchy,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);let best=null,bestArea=0;for(let i=0;i<contours.size();i++){let cnt=contours.get(i), peri=cv.arcLength(cnt,true), approx=new cv.Mat();cv.approxPolyDP(cnt,approx,0.025*peri,true);let area=Math.abs(cv.contourArea(approx));if(approx.rows===4&&area>bestArea&&area>rawImg.width*rawImg.height*.12){bestArea=area;best=[];for(let j=0;j<4;j++)best.push({x:approx.intPtr(j,0)[0],y:approx.intPtr(j,0)[1]})}approx.delete();cnt.delete()}src.delete();gray.delete();blur.delete();edge.delete();contours.delete();hierarchy.delete();if(best){points=orderPts(best).map(imgToDisplay);drawCrop();$('status').textContent='Đã tự tìm mép. Nếu lệch, kéo chỉnh lại 4 góc.'}else{resetCorners();$('status').textContent='Không tìm thấy mép rõ, hãy kéo chỉnh thủ công.'}}catch(e){resetCorners();$('status').textContent='Auto crop lỗi, dùng chỉnh tay.'}}
function drawCrop(){const {w,h}=displayedSize();let p=points;let poly=p.map(a=>a.x+','+a.y).join(' ');$('cropSvg').innerHTML=`<path class="shade" d="M0,0H${w}V${h}H0Z M${p[0].x},${p[0].y} L${p[1].x},${p[1].y} L${p[2].x},${p[2].y} L${p[3].x},${p[3].y}Z"></path><polygon class="poly" points="${poly}"></polygon><line class="edge" x1="${p[0].x}" y1="${p[0].y}" x2="${p[2].x}" y2="${p[2].y}"/><line class="edge" x1="${p[1].x}" y1="${p[1].y}" x2="${p[3].x}" y2="${p[3].y}"/>`+p.map((a,i)=>`<circle class="pt" data-i="${i}" cx="${a.x}" cy="${a.y}" r="13"></circle>`).join('')}
$('cropSvg').addEventListener('pointerdown',e=>{if(e.target.classList.contains('pt')){dragIndex=+e.target.dataset.i;e.target.setPointerCapture(e.pointerId);$('zoom').style.display='block';movePoint(e)}});
$('cropSvg').addEventListener('pointermove',e=>{if(dragIndex>=0)movePoint(e)});['pointerup','pointercancel'].forEach(ev=>$('cropSvg').addEventListener(ev,()=>{dragIndex=-1;$('zoom').style.display='none'}));
function movePoint(e){const r=$('cropSvg').getBoundingClientRect();points[dragIndex]={x:Math.max(0,Math.min(r.width,e.clientX-r.left)),y:Math.max(0,Math.min(r.height,e.clientY-r.top))};drawCrop();drawZoom(points[dragIndex])}
function drawZoom(p){const z=$('zoomCanvas'),ctx=z.getContext('2d'), ip=displayToImg(p), size=90;ctx.clearRect(0,0,z.width,z.height);ctx.drawImage(rawImg,ip.x-size/2,ip.y-size/2,size,size,0,0,z.width,z.height);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(92,0);ctx.lineTo(92,184);ctx.moveTo(0,92);ctx.lineTo(184,92);ctx.stroke()}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function applyCrop(){if(!cvReady)return alert('OpenCV chưa tải xong. Đợi vài giây rồi thử lại.');const ip=orderPts(points.map(displayToImg));const w=Math.max(dist(ip[0],ip[1]),dist(ip[3],ip[2]));const h=Math.max(dist(ip[0],ip[3]),dist(ip[1],ip[2]));const c=$('rawCanvas');c.width=rawImg.width;c.height=rawImg.height;c.getContext('2d').drawImage(rawImg,0,0);let src=cv.imread(c), dst=new cv.Mat(), srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[ip[0].x,ip[0].y,ip[1].x,ip[1].y,ip[2].x,ip[2].y,ip[3].x,ip[3].y]), dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,w,0,w,h,0,h]), M=cv.getPerspectiveTransform(srcTri,dstTri);cv.warpPerspective(src,dst,M,new cv.Size(Math.round(w),Math.round(h)),cv.INTER_LINEAR,cv.BORDER_CONSTANT,new cv.Scalar());croppedCanvas=$('workCanvas');cv.imshow(croppedCanvas,dst);src.delete();dst.delete();srcTri.delete();dstTri.delete();M.delete();view('result');setBars('Result');renderFilter()}
function renderFilter(){if(!croppedCanvas)return;const mode=$('filterMode').value,out=$('resultCanvas');out.width=croppedCanvas.width;out.height=croppedCanvas.height;let ctx=out.getContext('2d');ctx.drawImage(croppedCanvas,0,0);if(!cvReady||mode==='origin'){finalData=out.toDataURL('image/jpeg',.95);return}let src=cv.imread(out), dst=new cv.Mat();if(mode==='gray'){cv.cvtColor(src,dst,cv.COLOR_RGBA2GRAY);cv.cvtColor(dst,dst,cv.COLOR_GRAY2RGBA)}else if(mode==='bw'){cv.cvtColor(src,dst,cv.COLOR_RGBA2GRAY);cv.GaussianBlur(dst,dst,new cv.Size(3,3),0);cv.adaptiveThreshold(dst,dst,255,cv.ADAPTIVE_THRESH_GAUSSIAN_C,cv.THRESH_BINARY,25,12);cv.cvtColor(dst,dst,cv.COLOR_GRAY2RGBA)}else{src.convertTo(dst,-1,1.28,18);let lab=new cv.Mat();cv.cvtColor(dst,lab,cv.COLOR_RGBA2RGB);cv.cvtColor(lab,lab,cv.COLOR_RGB2Lab);cv.cvtColor(lab,dst,cv.COLOR_Lab2RGB);cv.cvtColor(dst,dst,cv.COLOR_RGB2RGBA);lab.delete()}cv.imshow(out,dst);src.delete();dst.delete();finalData=out.toDataURL('image/jpeg',.95)}
function rotateResult(){const c=$('resultCanvas'),t=document.createElement('canvas');t.width=c.height;t.height=c.width;let x=t.getContext('2d');x.translate(t.width/2,t.height/2);x.rotate(Math.PI/2);x.drawImage(c,-c.width/2,-c.height/2);croppedCanvas=t;$('workCanvas').width=t.width;$('workCanvas').height=t.height;$('workCanvas').getContext('2d').drawImage(t,0,0);renderFilter()}
function addPage(){renderFilter();if(!finalData)return;pages.push(finalData);renderPages();$('status').textContent='Đã thêm trang '+pages.length}
function renderPages(){const box=$('pages');if(!pages.length){box.innerHTML='<div class="empty">Chưa có trang nào</div>';return}box.innerHTML=pages.map((p,i)=>`<img class="thumb" src="${p}" onclick="pages.splice(${i},1);renderPages()" title="Bấm để xóa trang">`).join('')}
function clearPages(){pages=[];renderPages()}
function downloadPdf(){renderFilter();let list=pages.slice();if(finalData&&!list.includes(finalData))list.push(finalData);if(!list.length)return alert('Chưa có trang để xuất PDF');const {jsPDF}=window.jspdf;let pdf=new jsPDF('p','mm','a4');list.forEach((img,i)=>{if(i)pdf.addPage();let props=pdf.getImageProperties(img), pw=210, ph=297, margin=6, rw=pw-margin*2, rh=rw*props.height/props.width;if(rh>ph-margin*2){rh=ph-margin*2;rw=rh*props.width/props.height}pdf.addImage(img,'JPEG',(pw-rw)/2,(ph-rh)/2,rw,rh)});pdf.save('scan-document.pdf')}
function resetAll(){clearPages();finalData=null;croppedCanvas=null;showCamera()} window.addEventListener('resize',()=>{if(!cropView.classList.contains('hidden')&&rawImg)resetCorners()}); startCamera();
</script>
</body>
</html>
