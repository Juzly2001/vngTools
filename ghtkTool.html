<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tra Cứu Tuyến Shipper Thủ Đức</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .search-wrapper { position: sticky; top: 10px; z-index: 100; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .search-box { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 18px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        .search-box:focus { border-color: var(--primary); }
        .stats { font-size: 13px; color: #64748b; margin-top: 8px; text-align: right; }
        .result-list { margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid #cbd5e1; display: none; animation: fadeIn 0.3s ease; }
        .card.active { display: block; border-left-color: var(--primary); }
        .shipper-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .name { font-size: 1.3em; font-weight: bold; color: var(--primary); }
        .code { background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
        .area { font-weight: 600; color: #475569; margin-bottom: 8px; font-size: 0.95em; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: #f1f5f9; padding: 4px 10px; border-radius: 6px; font-size: 13px; color: #334155; }
        .highlight { background: #fef08a; font-weight: bold; }
        .no-result { text-align: center; padding: 40px; color: #94a3b8; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚚 Tra Cứu Tuyến Shipper</h1>
        <p>Thành phố Thủ Đức (Hiệp Bình Phước - Tam Bình - Bình Chiểu)</p>
    </div>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-box" placeholder="Nhập tên đường, hẻm, công ty, hoặc chung cư..." onkeyup="handleSearch()">
        <div class="stats" id="stats">Sẵn sàng tra cứu</div>
    </div>

    <div id="resultList" class="result-list"></div>
    <div id="noResult" class="no-result">Không tìm thấy địa chỉ này trong danh sách hiện có.</div>
</div>

    // 1. Hàm chuẩn hóa dữ liệu: Biến mọi thứ về dạng viết tắt, không dấu, không khoảng trắng
function superNormalize(str) {
    if (!str) return "";
    return str.toLowerCase()
        .replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a")
        .replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e")
        .replace(/ì|í|ị|ỉ|ĩ/g, "i")
        .replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o")
        .replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u")
        .replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y")
        .replace(/đ/g, "d")
        // Xử lý các cụm từ viết tắt phổ biến
        .replace(/quoc lo/g, "ql")
        .replace(/duong so/g, "d")
        .replace(/duong/g, "d")
        .replace(/hem/g, "h")
        .replace(/tinh lo/g, "tl")
        .replace(/khu dan cu/g, "kdc")
        // Xóa sạch khoảng trắng để so khớp dính liền (ví dụ: ql 13 thành ql13)
        .replace(/\s+/g, "");
}

// 2. Hàm tạo mẫu tìm kiếm linh hoạt (cho phép có ký tự ở giữa, vd: d9 khớp "đường số 9")
function createFuzzyRegex(query) {
    const cleanQuery = superNormalize(query);
    // Tách từng chữ cái và nối lại bằng .* (đại diện cho ký tự bất kỳ)
    // Ví dụ: "d9" -> /d.*9/i
    const pattern = cleanQuery.split('').join('.*');
    return new RegExp(pattern, 'i');
}

function handleSearch() {
    const rawQuery = document.getElementById('searchInput').value;
    const cards = document.getElementsByClassName('card');
    const noResult = document.getElementById('noResult');
    let count = 0;

    // Nếu ô tìm kiếm trống, ẩn tất cả kết quả
    if (rawQuery.trim() === "") {
        for (let card of cards) card.classList.remove('active');
        noResult.style.display = "none";
        document.getElementById('stats').innerText = "Sẵn sàng tra cứu";
        return;
    }

    const fuzzyRegex = createFuzzyRegex(rawQuery);

    database.forEach((item, index) => {
        const card = document.getElementById(`card-${index}`);
        const tagContainer = document.getElementById(`tags-${index}`);
        
        // Kiểm tra xem Regex có khớp với Tên hoặc bất kỳ Địa điểm nào không
        const isNameMatch = fuzzyRegex.test(superNormalize(item.name));
        const matchedLocations = item.locations.filter(loc => 
            fuzzyRegex.test(superNormalize(loc))
        );

        if (matchedLocations.length > 0 || isNameMatch) {
            card.classList.add('active');
            count++;
            
            // Cập nhật giao diện tag để highlight những chỗ khớp
            tagContainer.innerHTML = item.locations.map(loc => {
                const isMatch = fuzzyRegex.test(superNormalize(loc));
                return `<span class="tag ${isMatch ? 'highlight' : ''}">${loc}</span>`;
            }).join('');
        } else {
            card.classList.remove('active');
        }
    });

    // Hiển thị thông báo nếu không tìm thấy
    noResult.style.display = count === 0 ? "block" : "none";
    document.getElementById('stats').innerText = `Tìm thấy ${count} kết quả cho "${rawQuery}"`;
}

// Khởi tạo hiển thị danh sách ban đầu (nhưng ẩn card cho đến khi search)
function renderCards() {
    const container = document.getElementById('resultList');
    container.innerHTML = database.map((item, index) => `
        <div class="card" id="card-${index}">
            <div class="shipper-info">
                <div class="name">👤 ${item.name}</div>
                <div class="code">${item.code}</div>
            </div>
            <div class="area">📍 Khu vực: ${item.area}</div>
            <div class="tags" id="tags-${index}">
                ${item.locations.map(loc => `<span class="tag">${loc}</span>`).join('')}
            </div>
        </div>
    `).join('');
}

// Chạy hàm khởi tạo
renderCards();
