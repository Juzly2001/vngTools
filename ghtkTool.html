    <meta charset="UTF-8">

    <title>Tra Cứu Tuyến</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .search-wrapper { position: sticky; top: 10px; z-index: 100; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .search-box { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 18px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        .search-box:focus { border-color: var(--primary); }
        .stats { font-size: 13px; color: #64748b; margin-top: 8px; text-align: right; }
        .result-list { margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid #cbd5e1; display: none; animation: fadeIn 0.3s ease; }
        .card.active { display: block; border-left-color: var(--primary); }
        .shipper-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .name { font-size: 1.3em; font-weight: bold; color: var(--primary); }
        .code { background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
        .area { font-weight: 600; color: #475569; margin-bottom: 8px; font-size: 0.95em; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: #f1f5f9; padding: 4px 10px; border-radius: 6px; font-size: 13px; color: #334155; }
        .highlight { background: #fef08a; padding: 2px 6px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); color: #854d0e; }
        .name, .area { line-height: 1.6; }
        .no-result { text-align: center; padding: 40px; color: #94a3b8; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

    function superNormalize(str) {
        if (!str) return "";
        return str.toLowerCase()
            .replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a")
            .replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e")
            .replace(/ì|í|ị|ỉ|ĩ/g, "i")
            .replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o")
            .replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u")
            .replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y")
            .replace(/đ/g, "d")
            .replace(/quoc lo/g, "ql").replace(/cong ty/g, "cty").replace(/khu do thi/g, "kdt").replace(/khu dan cu/g, "kdc").replace(/khu pho/g, "kp").replace(/hiep binh phuoc/g, "hbp").replace(/tinh lo/g, "tl").replace(/duong so/g, "d").replace(/duong/g, "d").replace(/hem/g, "h")
            .replace(/\s+/g, "");
    }

    // LOGIC MỚI: Kiểm tra số nhà có nằm trong khoảng chẵn/lẻ không
    function isHouseNumberInRange(query, locationStr) {
        // Tách lấy số đầu tiên trong chuỗi tìm kiếm (ví dụ: "1000 tl 43" -> "1000")
        const queryNumbers = query.match(/\d+/);
        if (!queryNumbers) return false;
        
        const queryNum = parseInt(queryNumbers[0]);
        const rangeMatch = locationStr.match(/(\d+)\s*-\s*(\d+)/);

        if (rangeMatch && !isNaN(queryNum)) {
            const start = parseInt(rangeMatch[1]);
            const end = parseInt(rangeMatch[2]);
            const isEvenRange = locationStr.toLowerCase().includes("chẵn");
            const isOddRange = locationStr.toLowerCase().includes("lẻ");

            const inRange = (queryNum >= Math.min(start, end) && queryNum <= Math.max(start, end));

            if (inRange) {
                if (isEvenRange && queryNum % 2 === 0) return true;
                if (isOddRange && queryNum % 2 !== 0) return true;
                if (!isEvenRange && !isOddRange) return true;
            }
        }
        return false;
    }

function handleSearch() {
    const rawQuery = document.getElementById('searchInput').value.trim();
    const clearBtn = document.getElementById('clearBtn');
    clearBtn.style.display = rawQuery.length > 0 ? "block" : "none";

    const resultList = document.getElementById('resultList');
    const noResult = document.getElementById('noResult');
    const stats = document.getElementById('stats');

    if (rawQuery === "") {
        resultList.innerHTML = "";
        noResult.style.display = "none";
        stats.innerText = "Sẵn sàng tra cứu";
        return;
    }

    const queryTextOnly = rawQuery.replace(/\d+/g, "").trim();
    const textRegex = new RegExp(superNormalize(queryTextOnly), 'i');
    const fullFuzzyRegex = new RegExp(superNormalize(rawQuery), 'i');

    // 1. Tính điểm và lọc dữ liệu
    const searchResults = database.map(item => {
        let score = 0;
        
        // Trọng số ưu tiên
        if (fullFuzzyRegex.test(superNormalize(item.name))) score += 100;
        if (fullFuzzyRegex.test(superNormalize(item.area))) score += 50;

        const checkMatch = (loc) => {
            const rangeMatch = isHouseNumberInRange(rawQuery, loc);
            const textMatch = textRegex.test(superNormalize(loc));
            const fullMatch = fullFuzzyRegex.test(superNormalize(loc));
            if (rawQuery.match(/\d+/) && queryTextOnly.length > 1) {
                return rangeMatch && textMatch;
            }
            return rangeMatch || fullMatch;
        };

        const matchedSpecial = item.locations.filter(loc => checkMatch(loc));
        const matchedLevel4 = (item.locations4 || []).filter(loc => checkMatch(loc));

        // Cộng điểm nếu khớp địa chỉ
        if (matchedSpecial.length > 0 || matchedLevel4.length > 0) {
            score += (matchedSpecial.length + matchedLevel4.length) * 20;
        }

        return { ...item, score, matchedSpecial, matchedLevel4 };
    })
    .filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score);

    // 2. Vẽ lại giao diện với đầy đủ các phần
    if (searchResults.length > 0) {
        noResult.style.display = "none";
        resultList.innerHTML = searchResults.map(item => `
            <div class="card active">
                <div class="shipper-info">
                    <div class="name">👤 <span class="${fullFuzzyRegex.test(superNormalize(item.name)) ? 'highlight' : ''}">${item.name}</span></div>
                    <div class="code">${item.code}</div>
                </div>
                <div class="area">📍 Khu vực: <span class="${fullFuzzyRegex.test(superNormalize(item.area)) ? 'highlight' : ''}">${item.area}</span></div>
                
                <div style="margin-top: 10px;">
                    <div style="font-size: 0.85em; color: #64748b; margin-bottom: 5px; font-weight: bold;">🏠 Địa chỉ đặc biệt:</div>
                    <div class="tags">
                        ${item.locations.map(loc => {
                            const isMatch = item.matchedSpecial.includes(loc);
                            return `<span class="tag ${isMatch ? 'highlight' : ''}">${loc}</span>`;
                        }).join('')}
                    </div>
                </div>

                ${item.locations4 && item.locations4.length > 0 ? `
                <div style="margin-top: 10px;">
                    <div style="font-size: 0.85em; color: #64748b; margin-bottom: 5px; font-weight: bold;">🏢 Địa chỉ cấp 4:</div>
                    <div class="tags">
                        ${item.locations4.map(loc => {
                            const isMatch = item.matchedLevel4.includes(loc);
                            return `<span class="tag ${isMatch ? 'highlight' : ''}">${loc}</span>`;
                        }).join('')}
                    </div>
                </div>` : ''}
            </div>
        `).join('');
    } else {
        resultList.innerHTML = "";
        noResult.style.display = "block";
    }

    stats.innerText = `Tìm thấy ${searchResults.length} kết quả cho "${rawQuery}"`;
}

    function clearSearch(e) {
        e.preventDefault();
        const input = document.getElementById('searchInput');
        input.value = "";
        handleSearch();
        input.focus();
    }

    function renderCards() {
        const container = document.getElementById('resultList');
        container.innerHTML = database.map((item, index) => `
            <div class="card" id="card-${index}">
                <div class="shipper-info">
                    <div class="name">👤 <span id="name-${index}">${item.name}</span></div>
                    <div class="code">${item.code}</div>
                </div>
                <div class="area">📍 Khu vực: <span id="area-${index}">${item.area}</span></div>
                <div style="font-size: 0.85em; color: #64748b; margin-bottom: 5px; font-weight: bold;">🏠 Địa chỉ đặc biệt:</div>
                <div class="tags" id="tags-special-${index}">${item.locations.map(l => `<span class="tag">${l}</span>`).join('')}</div>
                ${item.locations4 ? `<div style="margin-top: 10px;">
                    <div style="font-size: 0.85em; color: #64748b; margin-bottom: 5px; font-weight: bold;">🏢 Địa chỉ cấp 4:</div>
                    <div class="tags" id="tags-level4-${index}">${item.locations4.map(l => `<span class="tag">${l}</span>`).join('')}</div>
                </div>` : ''}
            </div>
        `).join('');
    }

    renderCards();
</script>
</body>
</html>
