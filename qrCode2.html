<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Scanner v1.0</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<defs>
<linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
<stop offset='0%' stop-color='%2300d4ff'/>
<stop offset='100%' stop-color='%23006eff'/>
</linearGradient>
</defs>
<rect width='64' height='64' rx='16' fill='%23111'/>
<rect x='8' y='8' width='18' height='18' rx='4' fill='url(%23g)'/>
<rect x='38' y='8' width='18' height='18' rx='4' fill='url(%23g)'/>
<rect x='8' y='38' width='18' height='18' rx='4' fill='url(%23g)'/>
<rect x='34' y='34' width='6' height='6' fill='white'/>
<rect x='44' y='34' width='10' height='6' fill='white'/>
<rect x='34' y='46' width='20' height='6' fill='white'/>
</svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{
    --mono:"JetBrains Mono","Cascadia Code","Consolas","Courier New",monospace;
    --bg:#edf3fb;
    --bg2:#f8fbff;
    --card:#ffffff;
    --text:#142033;
    --muted:#6b7890;
    --line:#dfe7f2;
    --primary:#1976ff;
    --primary2:#00b8ff;
    --good:#19b866;
    --danger:#ef4444;
    --warning:#f59e0b;
    --shadow:0 12px 30px rgba(19,38,68,.10);
    --shadow2:0 8px 18px rgba(19,38,68,.08);
    --radius:20px;
}

* ,
*::before,
*::after{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:var(--mono);
    -webkit-tap-highlight-color:transparent;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:var(--mono);
    background:
        radial-gradient(circle at top left,rgba(0,184,255,.18),transparent 34%),
        linear-gradient(180deg,var(--bg2),var(--bg));
    color:var(--text);
    min-height:100vh;
    padding:12px;
    padding-bottom:calc(28px + env(safe-area-inset-bottom));
}

body.dark{
    --bg:#0b1220;
    --bg2:#111827;
    --card:#182235;
    --text:#eef5ff;
    --muted:#9fb0ca;
    --line:#263449;
    --shadow:0 12px 30px rgba(0,0,0,.32);
    --shadow2:0 8px 18px rgba(0,0,0,.24);
}

button,
input,
textarea,
select{
    font-family:var(--mono);
    letter-spacing:-.02em;
}

.code,
.barcode-text,
.stat-value{
    font-variant-numeric:tabular-nums;
}

.container{
    max-width:540px;
    margin:auto;
}

.app-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin:4px 0 12px;
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
}

.logo{
    width:42px;
    height:42px;
    border-radius:14px;
    display:grid;
    place-items:center;
    color:#fff;
    font-size:22px;
    background:linear-gradient(135deg,var(--primary),var(--primary2));
    box-shadow:0 10px 22px rgba(25,118,255,.26);
}

.brand h1{
    font-size:18px;
    line-height:1.1;
}

.brand p{
    color:var(--muted);
    font-size:12px;
    margin-top:3px;
}

.header-actions{
    display:flex;
    gap:8px;
}

.icon-btn{
    flex:none;
    width:42px;
    height:42px;
    padding:0;
    border-radius:14px;
    background:var(--card);
    color:var(--text);
    box-shadow:var(--shadow2);
    font-size:18px;
}

.scanner-card{
    background:var(--card);
    border:1px solid rgba(255,255,255,.55);
    border-radius:24px;
    padding:10px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
}

.scanner-off .scan-line{
    display:none;
}

.scanner-off .scan-frame{
    display:none;
}

#reader{
    background:#050914;
    border-radius:18px;
    overflow:hidden;
    width:100%;
    height:clamp(300px,70vh,300px);
    max-height:none;
    aspect-ratio:auto;
    position:relative;
    contain:layout paint;
}

#reader video{
    width:100% !important;
    height:100% !important;
    border-radius:18px;
    object-fit:cover;
    transform:translateZ(0);
    backface-visibility:hidden;
    will-change:transform;
}

.scan-frame{
    pointer-events:none;
    position:absolute;
    inset:10px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.12);
}

/* Bỏ ô xanh cố định ở giữa khung scan */
.scan-frame::before{
    content:none;
}

.scan-line{
    pointer-events:none;
    position:absolute;
    left:22px;
    right:22px;
    top:50%;
    height:3px;
    border-radius:99px;
    background:linear-gradient(90deg,transparent,#00ff88,transparent);
    box-shadow:0 0 18px rgba(0,255,136,.65);
    opacity:0;
    transform:translateY(-50%) scaleX(.25);
}

/* Chỉ hiện vạch xanh khi vừa quét được mã */
.scanner-card.scan-success .scan-line{
    animation:scanSuccessLine .42s ease-out;
}

@keyframes scanSuccessLine{
    0%{ opacity:0; transform:translateY(-50%) scaleX(.25); }
    22%{ opacity:1; transform:translateY(-50%) scaleX(1); }
    100%{ opacity:0; transform:translateY(-50%) scaleX(1); }
}

.quick-stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin:12px 0;
}

.stat-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:10px;
    text-align:center;
    box-shadow:var(--shadow2);
}

.stat-card b{
    display:block;
    font-size:18px;
}

.stat-card span{
    display:block;
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
}

.top-bar{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin:10px 0 12px;
}

.top-bar button{
    min-height:48px;
    padding:8px 6px;
    border-radius:16px;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.top-bar button span{
    display:none;
}

button{
    border:none;
    border-radius:14px;
    padding:11px 9px;
    font-size:12px;
    font-weight:800;
    cursor:pointer;
    transition:transform .16s ease,filter .16s ease,opacity .16s ease;
    color:#fff;
    touch-action:manipulation;
}

button:active{
    transform:scale(.96);
}

button:disabled{
    opacity:.55;
    cursor:not-allowed;
}

#copyBtn{ background:linear-gradient(135deg,#16c784,#33e09d); }
#addManualBtn{ background:linear-gradient(135deg,#ff9800,#ffb74d); color:#fff; }
#moreMenuBtn{ background:linear-gradient(135deg,#111827,#334155); }
.quick-action-bar{
    display:grid;
    grid-template-columns:1fr 1fr auto;
    gap:8px;
    margin:10px 0 8px;
}
.quick-pill{
    min-height:42px;
    padding:8px 10px;
    border-radius:16px;
    background:var(--card);
    color:var(--text);
    border:1px solid var(--line);
    box-shadow:var(--shadow2);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-size:12px;
    white-space:nowrap;
    overflow:hidden;
}
.quick-pill span{
    overflow:hidden;
    text-overflow:ellipsis;
}
.quick-pill.auto-on{
    background:linear-gradient(135deg,#16c784,#33e09d);
    color:#fff;
    border-color:transparent;
}
.quick-pill.auto-off{
    background:var(--card);
    color:var(--muted);
}
.quick-picker-options{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
    max-height:58vh;
    overflow:auto;
    padding-bottom:4px;
    scrollbar-width:none;
}
.quick-picker-options::-webkit-scrollbar{ display:none; }
.quick-option-btn{
    width:100%;
    min-height:46px;
    border-radius:16px;
    background:var(--bg2);
    color:var(--text);
    border:1px solid var(--line);
    box-shadow:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:11px 13px;
    font-size:14px;
    text-align:left;
}
.quick-option-btn.active{
    background:linear-gradient(135deg,rgba(25,118,255,.16),rgba(0,184,255,.12));
    border-color:rgba(25,118,255,.38);
    color:var(--primary);
}
.quick-option-btn.clear-choice{
    color:var(--danger);
}
/* Quick Action mặc định có thể ẩn/hiện bằng nút trong menu */
.quick-action-bar.quick-hidden{
    display:none;
}

/* Focus mode: chỉ giữ camera + số mã đã quét + danh sách mã */
body.focus-mode .app-header,
body.focus-mode .quick-stats,
body.focus-mode .quick-action-bar,
body.focus-mode .top-bar,
body.focus-mode .tool-card,
body.focus-mode .bottom-sheet,
body.focus-mode .bottom-sheet-backdrop{
    display:none !important;
}
body.focus-mode .focus-exit-btn{
    display:flex !important;
}
body.focus-mode{
    padding-top:10px;
}
body.focus-mode .scanner-card{
    margin-bottom:10px;
}
body.focus-mode #reader{
    height:clamp(340px,78vh,300px);
    max-height:none;
}
body.focus-mode #status{
    margin-top:0;
    background:linear-gradient(135deg,#111827,#334155);
    color:#fff;
    border-color:transparent;
}
.focus-exit-btn{
    display:none;
    position:fixed;
    right:14px;
    top:calc(12px + env(safe-area-inset-top));
    z-index:7000;
    min-height:40px;
    padding:9px 12px;
    border-radius:999px;
    background:linear-gradient(135deg,#111827,#334155);
    color:#fff;
    box-shadow:0 12px 28px rgba(0,0,0,.25);
    align-items:center;
    gap:6px;
    font-size:12px;
}
body.focus-mode .focus-exit-btn{
    display:flex;
}
#clearBtn{ background:linear-gradient(135deg,#e53935,#ff6a6a); }
#importBtn{ background:linear-gradient(135deg,#2196f3,#42a5f5); }
#filterToggleBtn{
    background:linear-gradient(135deg,#7c3aed,#22d3ee);
    position:relative;
}
#filterToggleBtn.has-filter::after,
#moreMenuBtn.has-filter::after{
    content:"";
    position:absolute;
    right:9px;
    top:8px;
    width:9px;
    height:9px;
    border-radius:50%;
    background:#00ff88;
    box-shadow:0 0 0 3px rgba(0,255,136,.20),0 0 12px rgba(0,255,136,.65);
}
#filterToggleBtn.is-open{
    filter:brightness(1.08);
}

.bottom-sheet-backdrop{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.45);
    opacity:0;
    pointer-events:none;
    transition:.18s ease;
    z-index:9000;
}

.bottom-sheet{
    position:fixed;
    left:10px;
    right:10px;
    bottom:calc(10px + env(safe-area-inset-bottom));
    background:var(--card);
    border:1px solid var(--line);
    border-radius:24px;
    padding:10px;
    box-shadow:0 24px 60px rgba(0,0,0,.28);
    transform:translateY(calc(100% + 24px));
    transition:.22s ease;
    z-index:9001;
    max-width:520px;
    margin:auto;
}

.bottom-sheet.show{
    transform:translateY(0);
}

.bottom-sheet-backdrop.show{
    opacity:1;
    pointer-events:auto;
}

.sheet-handle{
    width:46px;
    height:5px;
    border-radius:99px;
    background:var(--line);
    margin:4px auto 10px;
}

.sheet-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:0 2px 10px;
    font-size:14px;
    font-weight:900;
    color:var(--text);
}

.sheet-close-btn{
    width:34px;
    height:34px;
    padding:0;
    border-radius:12px;
    background:var(--bg2);
    color:var(--muted);
    border:1px solid var(--line);
    box-shadow:none;
}

.sheet-actions{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
}

.sheet-actions button{
    width:100%;
    min-height:48px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:10px;
    padding:12px 14px;
    font-size:14px;
    text-align:left;
    color:#fff;
    box-shadow:var(--shadow2);
}

.sheet-actions .danger-action{
    margin-top:4px;
}

#filterToggleBtn{ background:linear-gradient(135deg,#7c3aed,#22d3ee); }
#importBtn{ background:linear-gradient(135deg,#2196f3,#42a5f5); }
#quickBarToggleBtn{ background:linear-gradient(135deg,#0f766e,#2dd4bf); }
#focusModeBtn{ background:linear-gradient(135deg,#4f46e5,#8b5cf6); }
#focusModeBtn.focus-on{ background:linear-gradient(135deg,#111827,#334155); }
#clearBtn{ background:linear-gradient(135deg,#e53935,#ff6a6a); }


.tool-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:var(--shadow2);
    display:none;
    opacity:0;
    transform:translateY(-8px);
}
.tool-card.show{
    display:block;
    animation:filterPanelIn .18s ease forwards;
}
@keyframes filterPanelIn{
    to{ opacity:1; transform:translateY(0); }
}
.tool-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:10px;
    color:var(--text);
    font-size:13px;
    font-weight:900;
}
.close-tool-btn{
    width:32px;
    height:32px;
    padding:0;
    border-radius:10px;
    background:var(--bg2);
    color:var(--muted);
    box-shadow:none;
    border:1px solid var(--line);
}

.input-row{
    position:relative;
}

.input-row + .input-row{
    margin-top:10px;
}

.input-row input{
    width:100%;
    padding:13px 42px 13px 14px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--bg2);
    color:var(--text);
    font-size:14px;
    outline:none;
}

.input-row input:focus{
    border-color:rgba(25,118,255,.65);
    box-shadow:0 0 0 4px rgba(25,118,255,.10);
}

.clear-field-btn{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    width:34px;
    height:34px;
    padding:0;
    border-radius:10px;
    border:none;
    background:transparent;
    color:var(--muted);
    font-size:17px;
    box-shadow:none;
}

#status{
    background:var(--card);
    border:1px solid var(--line);
    padding:12px 14px;
    border-radius:16px;
    text-align:center;
    font-weight:800;
    margin-bottom:12px;
    box-shadow:var(--shadow2);
    color:var(--text);
}

#result-container{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.empty-state{
    background:var(--card);
    border:1px dashed var(--line);
    border-radius:18px;
    padding:18px;
    text-align:center;
    color:var(--muted);
}

.barcode-item{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:12px;
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    box-shadow:var(--shadow2);
    animation:fadeIn .18s ease;
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(-8px); }
    to{ opacity:1; transform:translateY(0); }
}

.barcode-main{
    min-width:0;
}

.barcode-text{
    word-break:break-all;
    font-weight:900;
    font-size:15px;
    line-height:1.35;
}

.tag-preview{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    margin-top:7px;
}

.tag-pill{
    font-size:11px;
    font-weight:800;
    color:#1166d8;
    background:rgba(25,118,255,.10);
    border:1px solid rgba(25,118,255,.15);
    padding:4px 7px;
    border-radius:999px;
}

.item-actions{
    display:flex;
    align-items:flex-start;
    gap:6px;
    flex:none;
}

.delete-btn,.copy-line-btn{
    border-radius:10px;
    padding:8px 9px;
    width:38px;
    height:36px;
    flex:none;
    display:grid;
    place-items:center;
}

.delete-btn{ background:#ff4d4d; }
.copy-line-btn{ background:#24c96f; }

.dropdown{
    grid-column:1/-1;
    position:relative;
}

.drop-btn{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--bg2);
    color:var(--text);
    cursor:pointer;
    font-size:13px;
    text-align:left;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.dropdown-menu{
    display:none;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    width:100%;
    z-index:20;
    box-shadow:var(--shadow);
    max-height:260px;
    overflow-y:auto;
    padding:10px;
    margin-top:8px;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    touch-action:pan-y;
    scrollbar-width:none;
}

.dropdown-menu::-webkit-scrollbar,
.action-content::-webkit-scrollbar{
    display:none;
}

.dropdown-menu.show{
    display:block;
}

.groups-container{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.action-panel{
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    background:var(--bg2);
}

.action-toggle{
    width:100%;
    background:transparent;
    border:none;
    border-radius:0;
    padding:11px 12px;
    color:var(--primary);
    cursor:pointer;
    font-weight:900;
    display:flex;
    justify-content:space-between;
}

.action-content{
    display:none;
    max-height:160px;
    overflow-y:auto;
    padding:0 10px 10px;
    scrollbar-width:none;
}

.action-content.show{
    display:block;
}

.drop-item{
    display:flex;
    align-items:center;
    gap:9px;
    padding:9px 4px;
    cursor:pointer;
    color:var(--text);
    font-weight:700;
    font-size:14px;
}

.drop-item input{
    width:18px;
    height:18px;
    accent-color:var(--primary);
}

.highlight{
    background:linear-gradient(135deg,rgba(255,235,238,.95),rgba(255,255,255,.98)) !important;
    border:2px solid #e53935 !important;
}

body.dark .highlight{
    background:linear-gradient(135deg,rgba(127,29,29,.45),rgba(24,34,53,.98)) !important;
}

.hidden{
    display:none !important;
}

.toast{
    position:fixed;
    left:50%;
    bottom:calc(18px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(18px);
    opacity:0;
    pointer-events:none;
    background:#111827;
    color:white;
    padding:12px 16px;
    border-radius:999px;
    font-weight:800;
    box-shadow:0 12px 34px rgba(0,0,0,.25);
    transition:.2s ease;
    z-index:9999;
    max-width:92vw;
    text-align:center;
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

@media(max-width:450px){
    body{ padding:10px; padding-bottom:calc(22px + env(safe-area-inset-bottom)); }
    #reader{ height:clamp(280px,62vh,300px); max-height:none; }
    .brand h1{ font-size:17px; }
    .brand p{ font-size:11px; }
    .top-bar{ gap:7px; }
    button{ font-size:11px; padding:10px 6px; }
    .barcode-item{ padding:11px; }
}
</style>
</head>

<body>
<div class="container">

<header class="app-header">
    <div class="brand">
        <div class="logo">▣</div>
        <div>
            <h1>Scanner</h1>
            <p>QR · Barcode · Import</p>
        </div>
    </div>
    <div class="header-actions">
        <button class="icon-btn" id="cameraToggleBtn" title="Tắt/mở camera">📷</button>
        <button class="icon-btn" id="themeBtn" title="Đổi giao diện">🌙</button>
    </div>
</header>

<section class="scanner-card">
    <div id="reader"></div>
    <div class="scan-frame"></div>
    <div class="scan-line"></div>
</section>

<button id="focusExitBtn" class="focus-exit-btn" type="button">↩ <span>Thoát Focus</span></button>

<div class="quick-stats">
    <div class="stat-card"><b id="totalCount">0</b><span>Tổng mã</span></div>
    <div class="stat-card"><b id="taggedCount">0</b><span>Thao tác</span></div>
    <div class="stat-card"><b id="matchedCount">0</b><span>Đối chiếu</span></div>
</div>

<div class="quick-action-bar" id="quickActionBar">

<script>
    // chặn màn hình
const isPhone = window.innerWidth <= 750 && window.matchMedia("(pointer:coarse)").matches;
if (!isPhone) {
    document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;font-family:"JetBrains Mono","Cascadia Code","Consolas","Courier New",monospace;padding:20px;background:#eef2f7;">
            <div>
                <h2>📱 Chỉ hỗ trợ điện thoại</h2>
                <p>Thiết bị hoặc kích thước màn hình không được hỗ trợ.</p>
                <br><p style="color:red;">Vì tôi thích như vậy ~</p>
            </div>
        </div>
    `;
    throw new Error("Phone only");
}

const dropdownOptions = ["Út", "Cường", "Phong", "Dũng", "Đạt", "Minh", "Tùng", "Lâm"];
const actionOptions = ["Đẩy đơn", "Đẩy app", "Đẩy lấy", "Đẩy trả", "Đẩy ra", "XN hủy", "Chuyển tuyến"];
const SHEET_WEBHOOK = "https://script.google.com/macros/s/AKfycbyMinlMSUi2quS9phTXnV3GfEilYY65KhPJE8p3qB4WT03XBBnXAblpwEDux0ebs3KP/exec";

let scannedCodes = [];
let lastScanned = "";
let lastScanTime = 0;
let html5QrCode = null;
let cameraRunning = false;
let scanFlashTimer = null;
let lastReaderTapTime = 0;
let defaultCod = "";
let defaultActions = [];
let autoTagEnabled = true;
let quickBarVisible = false;

const statusEl = document.getElementById("status");
const importBtn = document.getElementById("importBtn");
const copyBtn = document.getElementById("copyBtn");
const clearBtn = document.getElementById("clearBtn");
const addManualBtn = document.getElementById("addManualBtn");
const moreMenuBtn = document.getElementById("moreMenuBtn");
const quickCodBtn = document.getElementById("quickCodBtn");
const quickActionBtn = document.getElementById("quickActionBtn");
const autoTagBtn = document.getElementById("autoTagBtn");
const quickActionBar = document.getElementById("quickActionBar");
const bottomSheet = document.getElementById("bottomSheet");
const bottomSheetBackdrop = document.getElementById("bottomSheetBackdrop");
const closeSheetBtn = document.getElementById("closeSheetBtn");
const quickPickerSheet = document.getElementById("quickPickerSheet");
const quickPickerBackdrop = document.getElementById("quickPickerBackdrop");
const quickPickerTitle = document.getElementById("quickPickerTitle");
const quickPickerOptions = document.getElementById("quickPickerOptions");
const closeQuickPickerBtn = document.getElementById("closeQuickPickerBtn");
const filterToggleBtn = document.getElementById("filterToggleBtn");
const focusModeBtn = document.getElementById("focusModeBtn");
const focusExitBtn = document.getElementById("focusExitBtn");
const quickBarToggleBtn = document.getElementById("quickBarToggleBtn");
const filterPanel = document.getElementById("filterPanel");
const resultContainer = document.getElementById("result-container");
const checkListInput = document.getElementById("checkListInput");
const searchInput = document.getElementById("searchInput");
const themeBtn = document.getElementById("themeBtn");
const cameraToggleBtn = document.getElementById("cameraToggleBtn");
const clearCheckListBtn = document.getElementById("clearCheckListBtn");
const clearSearchBtn = document.getElementById("clearSearchBtn");
const totalCount = document.getElementById("totalCount");
const taggedCount = document.getElementById("taggedCount");
const matchedCount = document.getElementById("matchedCount");
const toast = document.getElementById("toast");
const scannerCard = document.querySelector(".scanner-card");

const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

function escapeHtml(value){
    return String(value)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

function showToast(message){
    toast.textContent = message;
    toast.classList.add("show");
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => toast.classList.remove("show"), 1450);
}

function setFilterPanel(open){
    filterPanel.classList.toggle("show", open);
    filterToggleBtn.classList.toggle("is-open", open);
}

function updateFilterBadge(){
    const hasFilter = checkListInput.value.trim() || searchInput.value.trim();
    filterToggleBtn.classList.toggle("has-filter", Boolean(hasFilter));
    moreMenuBtn.classList.toggle("has-filter", Boolean(hasFilter));
}

function setBottomSheet(open){
    bottomSheet.classList.toggle("show", open);
    bottomSheetBackdrop.classList.toggle("show", open);
}

function setQuickPicker(open){
    quickPickerSheet.classList.toggle("show", open);
    quickPickerBackdrop.classList.toggle("show", open);
}

function saveQuickDefaults(){
    localStorage.setItem("hbp_defaultCod", defaultCod);
    localStorage.setItem("hbp_defaultActions", JSON.stringify(defaultActions));
    localStorage.setItem("hbp_autoTag", autoTagEnabled ? "1" : "0");
}

function updateQuickBar(){
    quickCodBtn.innerHTML = `👤 <span>COD: ${defaultCod || "Không"}</span>`;
    quickActionBtn.innerHTML = `⚡ <span>${defaultActions.length ? defaultActions.join(", ") : "Thao tác: Không"}</span>`;
    autoTagBtn.classList.toggle("auto-on", autoTagEnabled);
    autoTagBtn.classList.toggle("auto-off", !autoTagEnabled);
    autoTagBtn.innerHTML = `${autoTagEnabled ? "📌" : "📍"} <span>${autoTagEnabled ? "Auto" : "Tắt"}</span>`;
}

function updateQuickBarVisibility(){
    quickActionBar.classList.toggle("quick-hidden", !quickBarVisible);
    quickBarToggleBtn.innerHTML = quickBarVisible
        ? "⚡ <span>Ẩn Quick Action</span>"
        : "⚡ <span>Hiện Quick Action</span>";
}

function setFocusMode(open){
    document.body.classList.toggle("focus-mode", open);
    updateFocusButton();
}

function updateFocusButton(){
    const focus = document.body.classList.contains("focus-mode");
    focusModeBtn.classList.toggle("focus-on", focus);
    focusModeBtn.innerHTML = focus
        ? "🎯 <span>Tắt Focus mode</span>"
        : "🎯 <span>Bật Focus mode</span>";
}

function openCodPicker(){
    quickPickerTitle.textContent = "👤 Chọn COD mặc định";
    quickPickerOptions.innerHTML = `
        <button class="quick-option-btn clear-choice ${!defaultCod ? "active" : ""}" type="button" data-value="">Không gán COD <span>${!defaultCod ? "✓" : ""}</span></button>
        ${dropdownOptions.map(x => `<button class="quick-option-btn ${defaultCod === x ? "active" : ""}" type="button" data-value="${escapeHtml(x)}"><span>${escapeHtml(x)}</span><span>${defaultCod === x ? "✓" : ""}</span></button>`).join("")}
    `;
    quickPickerOptions.querySelectorAll("button").forEach(btn => {
        btn.onclick = () => {
            defaultCod = btn.dataset.value || "";
            saveQuickDefaults();
            updateQuickBar();
            setQuickPicker(false);
            showToast(defaultCod ? `Đã ghim COD: ${defaultCod}` : "Đã tắt COD mặc định");
        };
    });
    setBottomSheet(false);
    setQuickPicker(true);
}

function openActionPicker(){
    quickPickerTitle.textContent = "⚡ Chọn thao tác mặc định";
    quickPickerOptions.innerHTML = `
        <button class="quick-option-btn clear-choice ${!defaultActions.length ? "active" : ""}" type="button" data-clear="1">Bỏ tất cả thao tác <span>${!defaultActions.length ? "✓" : ""}</span></button>
        ${actionOptions.map(x => `<button class="quick-option-btn ${defaultActions.includes(x) ? "active" : ""}" type="button" data-value="${escapeHtml(x)}"><span>${escapeHtml(x)}</span><span>${defaultActions.includes(x) ? "✓" : ""}</span></button>`).join("")}
        <button class="quick-option-btn" type="button" data-done="1"><span>✅ Xong</span><span></span></button>
    `;
    quickPickerOptions.querySelectorAll("button").forEach(btn => {
        btn.onclick = () => {
            if (btn.dataset.done) {
                saveQuickDefaults();
                updateQuickBar();
                setQuickPicker(false);
                showToast("Đã lưu thao tác mặc định");
                return;
            }
            if (btn.dataset.clear) {
                defaultActions = [];
            } else {
                const value = btn.dataset.value;
                defaultActions = defaultActions.includes(value)
                    ? defaultActions.filter(x => x !== value)
                    : [...defaultActions, value];
            }
            saveQuickDefaults();
            updateQuickBar();
            openActionPicker();
        };
    });
    setBottomSheet(false);
    setQuickPicker(true);
}

function playBeep(){
    beep.currentTime = 0;
    beep.play().catch(() => {});
}

function vibratePhone(){
    navigator.vibrate?.(80);
}

function flashScanLine(){
    scannerCard.classList.remove("scan-success");
    void scannerCard.offsetWidth;
    scannerCard.classList.add("scan-success");
    clearTimeout(scanFlashTimer);
    scanFlashTimer = setTimeout(() => {
        scannerCard.classList.remove("scan-success");
    }, 460);
}

function resetScanState(showMessage = true){
    lastScanned = "";
    lastScanTime = 0;
    scannerCard.classList.remove("scan-success");
    if (showMessage) showToast("Đã reset trạng thái quét");
}

function getCheckList(){
    return checkListInput.value
        .split(",")
        .map(c => c.trim())
        .filter(Boolean);
}

function getFormattedText(obj){
    return obj.code + obj.tags.map(t => ` (${t})`).join("");
}

function saveData(){
    localStorage.setItem("hbp_scannedCodes", JSON.stringify(scannedCodes));
}

function updateStatus(){
    const checkList = getCheckList();
    const matched = scannedCodes.filter(x => checkList.includes(x.code)).length;
    const tagged = scannedCodes.filter(x => x.tags?.length).length;

    totalCount.textContent = scannedCodes.length;
    taggedCount.textContent = tagged;
    matchedCount.textContent = matched;
    statusEl.textContent = scannedCodes.length
        ? `✅ Đã quét ${scannedCodes.length} mã`
        : "Chưa có mã nào";

    if (!scannedCodes.length) {
        resultContainer.innerHTML = `<div class="empty-state">📷 Quét mã hoặc bấm “Nhập tay” để thêm mã mới.</div>`;
    } else {
        const empty = resultContainer.querySelector(".empty-state");
        if (empty) empty.remove();
    }
}

function applyFilters(){
    updateFilterBadge();
    const checkList = getCheckList();
    const keyword = searchInput.value.trim().toLowerCase();

    document.querySelectorAll(".barcode-item").forEach(item => {
        const code = item.dataset.code || "";
        item.classList.toggle("highlight", checkList.includes(code));
        const visible = !keyword || code.toLowerCase().includes(keyword);
        item.classList.toggle("hidden", !visible);
    });

    updateStatus();
}

function renderAll(){
    resultContainer.innerHTML = "";
    [...scannedCodes].reverse().forEach(renderItem);
    applyFilters();
}

function onScanSuccess(decodedText){
    const code = String(decodedText || "").trim();
    if (!code) return;

    const now = Date.now();
    if (code === lastScanned && now - lastScanTime < 1200) return;

    flashScanLine();
    lastScanned = code;
    lastScanTime = now;

    if (scannedCodes.find(x => x.code === code)) {
        showToast("Mã này đã có trong danh sách");
        return;
    }

    setFilterPanel(false);

    const autoTags = autoTagEnabled
        ? [...new Set([defaultCod, ...defaultActions].filter(Boolean))]
        : [];
    const newObj = { code, tags: autoTags };
    scannedCodes.push(newObj);

    playBeep();
    vibratePhone();
    saveData();
    renderItem(newObj, true);
    applyFilters();
    showToast("Đã thêm mã mới");
}

function createGroup(title, options, obj, dropBtn){
    const panel = document.createElement("div");
    panel.className = "action-panel";
    panel.innerHTML = `
        <button class="action-toggle" type="button">
            <span>${escapeHtml(title)}</span><span>⌄</span>
        </button>
        <div class="action-content">
            ${options.map(x => `
                <label class="drop-item">
                    <input type="checkbox" value="${escapeHtml(x)}" ${obj.tags.includes(x) ? "checked" : ""}>
                    <span>${escapeHtml(x)}</span>
                </label>
            `).join("")}
        </div>
    `;

    const toggle = panel.querySelector(".action-toggle");
    const content = panel.querySelector(".action-content");
    toggle.onclick = (e) => {
        e.stopPropagation();
        content.classList.toggle("show");
    };

    return panel;
}

function refreshItemView(item, obj, dropBtn){
    const tagPreview = item.querySelector(".tag-preview");
    tagPreview.innerHTML = obj.tags.map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join("");
    dropBtn.innerHTML = `<span>${obj.tags.length ? "Đã chọn" : "Chọn COD / thao tác"}</span><span>▼</span>`;
}

function renderItem(obj, prepend = false){
    const item = document.createElement("div");
    item.className = "barcode-item";
    item.dataset.code = obj.code;

    item.innerHTML = `
        <div class="barcode-main">
            <div class="barcode-text">${escapeHtml(obj.code)}</div>
            <div class="tag-preview"></div>
        </div>
        <div class="item-actions">
            <button class="copy-line-btn" type="button">📋</button>
            <button class="delete-btn" type="button">🗑️</button>
        </div>
        <div class="dropdown">
            <button class="drop-btn" type="button"></button>
            <div class="dropdown-menu">
                <div class="groups-container"></div>
            </div>
        </div>
    `;

    const dropBtn = item.querySelector(".drop-btn");
    const menu = item.querySelector(".dropdown-menu");
    const groupsContainer = item.querySelector(".groups-container");

    groupsContainer.append(createGroup("+ Thao tác", actionOptions, obj, dropBtn));
    groupsContainer.append(createGroup("+ COD", dropdownOptions, obj, dropBtn));
    refreshItemView(item, obj, dropBtn);

    dropBtn.onclick = (e) => {
        e.stopPropagation();
        document.querySelectorAll(".dropdown-menu.show").forEach(openMenu => {
            if (openMenu !== menu) openMenu.classList.remove("show");
        });
        menu.classList.toggle("show");
    };

    menu.addEventListener("click", e => e.stopPropagation());

    menu.addEventListener("change", (e) => {
        if (e.target.type === "checkbox") {
            const allChecks = menu.querySelectorAll('input[type="checkbox"]');
            obj.tags = [...allChecks].filter(x => x.checked).map(x => x.value);
            refreshItemView(item, obj, dropBtn);
            saveData();
            updateStatus();
        }
    });

    item.querySelector(".copy-line-btn").onclick = async () => {
        await navigator.clipboard.writeText(getFormattedText(obj));
        const btn = item.querySelector(".copy-line-btn");
        btn.textContent = "✓";
        showToast("Đã copy mã này");
        setTimeout(() => { btn.textContent = "📋"; }, 800);
    };

    item.querySelector(".delete-btn").onclick = () => {
        scannedCodes = scannedCodes.filter(x => x.code !== obj.code);
        item.remove();
        saveData();
        applyFilters();
        showToast("Đã xóa mã");
    };

    if (prepend) resultContainer.prepend(item);
    else resultContainer.append(item);
}


function getSmartQrBox(viewfinderWidth, viewfinderHeight){
    const minSide = Math.min(viewfinderWidth, viewfinderHeight);
    const longSide = Math.max(viewfinderWidth, viewfinderHeight);

    // Màn hình càng lớn thì vùng quét càng lớn, nhưng vẫn chừa mép để dễ canh mã.
    let size = Math.floor(minSide * 0.82);

    // Khi khung camera cao/dài, barcode thường nằm ngang nên cho vùng quét rộng hơn một chút.
    const width = Math.min(Math.floor(viewfinderWidth * 0.92), Math.max(size, Math.floor(longSide * 0.52)));
    const height = Math.min(Math.floor(viewfinderHeight * 0.72), size);

    return {
        width: Math.max(220, width),
        height: Math.max(180, height)
    };
}

async function applyCameraEnhancements(){
    try{
        const video = document.querySelector("#reader video");
        const stream = video?.srcObject;
        const track = stream?.getVideoTracks?.()[0];
        if (!track?.getCapabilities || !track?.applyConstraints) return;

        const caps = track.getCapabilities();
        const advanced = [];

        if (caps.focusMode?.includes("continuous")) advanced.push({ focusMode:"continuous" });
        if (caps.exposureMode?.includes("continuous")) advanced.push({ exposureMode:"continuous" });
        if (caps.whiteBalanceMode?.includes("continuous")) advanced.push({ whiteBalanceMode:"continuous" });
        if (caps.torch) advanced.push({ torch:false });

        if (advanced.length) {
            await track.applyConstraints({ advanced });
        }
    }catch(err){
        console.log("Camera enhancement skipped:", err);
    }
}

async function restartCameraForResize(){
    if (!cameraRunning) return;
    clearTimeout(window.hbpResizeCameraTimer);
    window.hbpResizeCameraTimer = setTimeout(async () => {
        try{
            await stopCamera();
            await new Promise(resolve => setTimeout(resolve, 180));
            await startCamera();
        }catch(err){
            console.log("Resize camera restart failed:", err);
        }
    }, 350);
}

async function startCamera(){
    if (cameraRunning) return;
    try {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(
            { facingMode: { exact: "environment" } },
            {
                fps: 35,
                qrbox: getSmartQrBox,
                aspectRatio: undefined,
                videoConstraints: {
                    facingMode: "environment",
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    advanced: [
                        { focusMode: "continuous" },
                        { exposureMode: "continuous" },
                        { whiteBalanceMode: "continuous" }
                    ]
                },
                rememberLastUsedCamera: true,
                disableFlip: true,
                experimentalFeatures: { useBarCodeDetectorIfSupported: true },
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.QR_CODE,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.CODE_39
                ]
            },
            onScanSuccess
        );
        cameraRunning = true;
        setTimeout(applyCameraEnhancements, 350);
        resetScanState(false);
        document.querySelector(".scanner-card").classList.remove("scanner-off");
        cameraToggleBtn.textContent = "📷";
        showToast("Camera đã bật");
    } catch (err) {
        console.error(err);
        alert("Không mở được camera. Hãy cấp quyền camera.");
    }
}

async function stopCamera(){
    if (!html5QrCode || !cameraRunning) return;
    try {
        await html5QrCode.stop();
        cameraRunning = false;
        document.querySelector(".scanner-card").classList.add("scanner-off");
        cameraToggleBtn.textContent = "▶️";
        showToast("Đã tắt camera");
    } catch (err) {
        console.error(err);
    }
}


const readerEl = document.getElementById("reader");
readerEl.addEventListener("touchend", (e) => {
    const now = Date.now();
    if (now - lastReaderTapTime < 320) {
        e.preventDefault();
        resetScanState(true);
        vibratePhone();
    }
    lastReaderTapTime = now;
}, { passive:false });

readerEl.addEventListener("dblclick", () => {
    resetScanState(true);
});

window.addEventListener("resize", restartCameraForResize);
window.addEventListener("orientationchange", restartCameraForResize);


copyBtn.onclick = async () => {
    if (!scannedCodes.length) {
        alert("Chưa có mã.");
        return;
    }
    const text = scannedCodes.map(getFormattedText).join(",\n");
    await navigator.clipboard.writeText(text);
    showToast("Đã copy tất cả");
};

importBtn.onclick = async () => {
    setBottomSheet(false);
    if (!scannedCodes.length) {
        alert("Chưa có dữ liệu.");
        return;
    }

    try {
        importBtn.disabled = true;
        importBtn.innerHTML = "⏳ <span>Đang upload</span>";
        const data = scannedCodes.map(x => ({
            code: x.code,
            cod: x.tags.filter(t => dropdownOptions.includes(t)).join(", "),
            action: x.tags.filter(t => actionOptions.includes(t)).join(", "),
            time: new Date().toLocaleString("vi-VN")
        }));

        await fetch(SHEET_WEBHOOK, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(data)
        });

        showToast("Import thành công");
    } catch (err) {
        console.error(err);
        alert("❌ Import lỗi");
    } finally {
        importBtn.disabled = false;
        importBtn.innerHTML = "☁ <span>Import lên Sheet</span>";
    }
};

clearBtn.onclick = () => {
    setBottomSheet(false);
    if (!scannedCodes.length) return;
    if (!confirm("Xóa toàn bộ mã đã quét?")) return;
    scannedCodes = [];
    localStorage.removeItem("hbp_scannedCodes");
    renderAll();
    showToast("Đã xóa tất cả");
};

addManualBtn.onclick = () => {
    const manualCode = prompt("Nhập mã đơn hàng:");
    if (manualCode && manualCode.trim()) {
        onScanSuccess(manualCode.trim());
    }
};




moreMenuBtn.onclick = (e) => {
    e.stopPropagation();
    setBottomSheet(true);
};

closeSheetBtn.onclick = () => setBottomSheet(false);
bottomSheetBackdrop.onclick = () => setBottomSheet(false);
bottomSheet.addEventListener("click", e => e.stopPropagation());

closeQuickPickerBtn.onclick = () => setQuickPicker(false);
quickPickerBackdrop.onclick = () => setQuickPicker(false);
quickPickerSheet.addEventListener("click", e => e.stopPropagation());
quickCodBtn.onclick = openCodPicker;
quickActionBtn.onclick = openActionPicker;
autoTagBtn.onclick = () => {
    autoTagEnabled = !autoTagEnabled;
    saveQuickDefaults();
    updateQuickBar();
    showToast(autoTagEnabled ? "Đã bật tự gán" : "Đã tắt tự gán");
};
quickBarToggleBtn.onclick = () => {
    quickBarVisible = !quickBarVisible;
    localStorage.setItem("hbp_quickBarVisible", quickBarVisible ? "1" : "0");
    updateQuickBarVisibility();
    setBottomSheet(false);
    showToast(quickBarVisible ? "Đã hiện Quick Action" : "Đã ẩn Quick Action");
};

focusModeBtn.onclick = () => {
    setBottomSheet(false);
    const focus = !document.body.classList.contains("focus-mode");
    setFocusMode(focus);
    showToast(focus ? "Đã bật Focus mode" : "Đã tắt Focus mode");
};

focusExitBtn.onclick = () => {
    setFocusMode(false);
    showToast("Đã tắt Focus mode");
};

filterToggleBtn.onclick = () => {
    const willOpen = !filterPanel.classList.contains("show");
    setFilterPanel(willOpen);
    setBottomSheet(false);
    if (willOpen) setTimeout(() => searchInput.focus(), 80);
};

checkListInput.addEventListener("input", function(){
    localStorage.setItem("hbp_checkList", this.value);
    applyFilters();
});

searchInput.addEventListener("input", function(){
    localStorage.setItem("hbp_searchText", this.value);
    applyFilters();
});

clearCheckListBtn.onclick = () => {
    checkListInput.value = "";
    localStorage.removeItem("hbp_checkList");
    applyFilters();
    checkListInput.focus();
};

clearSearchBtn.onclick = () => {
    searchInput.value = "";
    localStorage.removeItem("hbp_searchText");
    applyFilters();
    searchInput.focus();
};

themeBtn.onclick = () => {
    document.body.classList.toggle("dark");
    const dark = document.body.classList.contains("dark");
    localStorage.setItem("hbp_dark", dark ? "1" : "0");
    themeBtn.textContent = dark ? "☀️" : "🌙";
};

cameraToggleBtn.onclick = () => {
    if (cameraRunning) stopCamera();
    else startCamera();
};

document.addEventListener("click", () => {
    document.querySelectorAll(".dropdown-menu.show").forEach(menu => menu.classList.remove("show"));
});

function loadData(){
    const saved = localStorage.getItem("hbp_scannedCodes");
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            scannedCodes = Array.isArray(parsed)
                ? parsed.filter(x => x && x.code).map(x => ({ code:String(x.code), tags:Array.isArray(x.tags) ? x.tags : [] }))
                : [];
        } catch {
            scannedCodes = [];
        }
    }

    const savedCheckList = localStorage.getItem("hbp_checkList");
    if (savedCheckList) checkListInput.value = savedCheckList;

    const savedSearchText = localStorage.getItem("hbp_searchText");
    if (savedSearchText) searchInput.value = savedSearchText;

    defaultCod = localStorage.getItem("hbp_defaultCod") || "";
    try {
        const savedActions = JSON.parse(localStorage.getItem("hbp_defaultActions") || "[]");
        defaultActions = Array.isArray(savedActions) ? savedActions.filter(x => actionOptions.includes(x)) : [];
    } catch {
        defaultActions = [];
    }
    autoTagEnabled = localStorage.getItem("hbp_autoTag") !== "0";
    quickBarVisible = localStorage.getItem("hbp_quickBarVisible") === "1";

    const dark = localStorage.getItem("hbp_dark") === "1";
    document.body.classList.toggle("dark", dark);
    themeBtn.textContent = dark ? "☀️" : "🌙";

    localStorage.removeItem("hbp_focusMode");
    setFocusMode(false);

    updateQuickBar();
    updateQuickBarVisibility();
    updateFocusButton();
    renderAll();
    updateFilterBadge();
    setFilterPanel(false);
}

loadData();
startCamera();
</script>
</body>
</html>
