<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Quét QR & Barcode</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<defs>
<linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
<stop offset='0%' stop-color='%2300d4ff'/>
<stop offset='100%' stop-color='%23006eff'/>
</linearGradient>
</defs>

<rect width='64' height='64' rx='16' fill='%23111'/>

<rect x='8' y='8' width='18' height='18' rx='4' fill='url(%23g)'/>
<rect x='38' y='8' width='18' height='18' rx='4' fill='url(%23g)'/>
<rect x='8' y='38' width='18' height='18' rx='4' fill='url(%23g)'/>

<rect x='34' y='34' width='6' height='6' fill='white'/>
<rect x='44' y='34' width='10' height='6' fill='white'/>
<rect x='34' y='46' width='20' height='6' fill='white'/>
</svg>">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#eef2f7;
    padding:16px;
    color:#222;
}

.container{
    max-width:520px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:24px;
    margin-bottom:16px;
}

#reader{
    background:#fff;
    padding:12px;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 22px rgba(0,0,0,.08);
}

#reader video{
    width:100% !important;
    border-radius:14px;
    transform:translateZ(0);
    backface-visibility:hidden;
    will-change:transform;
}

.top-bar{
    display:flex;
    gap:10px;
    margin:14px 0;
}

button{
    flex:1;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:active{
    transform:scale(.96);
}

#copyBtn{
    background:linear-gradient(135deg,#00ff66,#4dff8b);
    color:#fff;
}

#clearBtn{
    background:linear-gradient(135deg,#e53935,#ff6a6a);
    color:#fff;
}

#status{
    background:#fff;
    padding:12px;
    border-radius:14px;
    text-align:center;
    font-weight:bold;
    margin-bottom:14px;
    box-shadow:0 4px 10px rgba(0,0,0,.05);
}

#result-container{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.barcode-item{
    background:#fff;
    border-radius:16px;
    padding:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    box-shadow:0 5px 14px rgba(0,0,0,.06);

    animation:fadeIn .2s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.barcode-text{
    flex:1;
    word-break:break-all;
    font-weight:bold;
    font-size:15px;
}

.delete-btn{
    background:#ff4d4d;
    color:white;
    border:none;
    border-radius:8px;

    padding:6px 10px;
    width:fit-content;

    flex:none;
}

.copy-line-btn{
    background:#2dff73;
    color:white;
    border:none;
    border-radius:8px;

    padding:6px 6px;
    width:fit-content;

    flex:none;
}

.dropdown{
    position:relative;
    flex:none;
}

.drop-btn{

    padding:8px 10px;

    border:1px solid #ccc;

    border-radius:10px;

    background:#fff;

    min-width:90px;

    cursor:pointer;

    font-size:13px;
}

.dropdown-menu{

    display:none;

    position:absolute;

    top:110%;
    left:0;

    background:white;

    border:1px solid #ddd;

    border-radius:12px;

    width:170px;

    z-index:999;

    box-shadow:
    0 8px 24px rgba(0,0,0,.12);

    max-height:280px;

    overflow-y:auto;

    padding:8px;
}

.dropdown-menu.show{
    display:block;
}

.drop-item{

    display:flex;

    gap:8px;

    padding:6px 4px;

    cursor:pointer;
}

.groups-container{

    display:flex;

    flex-direction:column;

    gap:10px;
}

.checkbox-group{

    border-bottom:
    1px solid #eee;

    padding-bottom:8px;
}

.add-group-btn{

    width:100%;

    margin-top:8px;

    padding:8px;

    border:none;

    border-radius:8px;

    background:#f3f6fa;

    color:#007bff;

    cursor:pointer;

    font-weight:700;
}

.group-title{

    font-size:13px;

    font-weight:700;

    color:#007bff;

    margin-bottom:8px;
}

.action-panel{

    margin-top:8px;

    border-top:1px solid #eee;

    padding-top:8px;
}

.action-toggle{

    width:100%;

    background:#f3f6fa;

    border:none;

    border-radius:8px;

    padding:8px;

    color:#007bff;

    cursor:pointer;

    font-weight:700;
}

.action-content{

    display:none;

    margin-top:8px;
}

.action-content.show{

    display:block;
}

@media(max-width:600px){

    h1{
        font-size:21px;
    }

    button{
        padding:12px;
    }

}

</style>
</head>
<body>

<div class="container">

<h1>📷 Quét QR & Barcode</h1>

<div id="reader"></div>

<div class="top-bar">
    <button id="copyBtn">📋 Copy tất cả</button>
    <button id="clearBtn">🗑 Xóa tất cả</button>
</div>

<div id="status">
    Chưa có mã nào
</div>

<div id="result-container"></div>

</div>

<script>
const dropdownOptions=["Út","Cường","Phong", "Dũng", "Đạt", "Minh", "Tùng", "Lâm"];
const actionOptions=[
    "Đẩy đơn",
    "Đẩy app",
    "Đẩy ra",
    "Kiểm kho",
    "Xác nhận BC",
    "Chuyển tuyến",
    "Chốt ca",
];
let scannedCodes=[];

let lastScanned="";
let lastScanTime=0;

const status=document.getElementById("status");
const resultContainer=document.getElementById("result-container");


// preload audio (đỡ lag)

const beep=new Audio(
'https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg'
);

function playBeep(){
    beep.currentTime=0;
    beep.play().catch(()=>{});
}

function vibratePhone(){
    navigator.vibrate?.(80);
}

function updateStatus(){

    status.innerText =
    scannedCodes.length
        ? `✅ Đã quét ${scannedCodes.length} mã`
        : "Chưa có mã nào";
}

function onScanSuccess(decodedText){

    const now=Date.now();

    if(
        decodedText===lastScanned &&
        now-lastScanTime<1200
    ){
        return;
    }

    lastScanned=decodedText;
    lastScanTime=now;

    if(
        scannedCodes.find(
            x=>x.code===decodedText
        )
    ){
        return;
    }

    scannedCodes.push({
        code:decodedText,
        tags:[]
    });

    playBeep();
    vibratePhone();

    const item=document.createElement("div");
    item.className="barcode-item";

    item.innerHTML=`
        <div class="barcode-text">
            ${decodedText}
        </div>

        <div class="dropdown">

            <button class="drop-btn">
                Chọn ID ▼
            </button>

<div class="dropdown-menu">

    <div class="groups-container"></div>


</div>

        </div>

                <div style="display:flex;gap:6px;flex:none;">
                    <button class="copy-line-btn">📋</button>
                    <button class="delete-btn">🗑</button>
                </div>
    `;

    const dropdown=
item.querySelector(".dropdown");

const dropBtn=
item.querySelector(".drop-btn");

const menu=
item.querySelector(".dropdown-menu");

const groupsContainer=
item.querySelector(".groups-container");


const obj=
scannedCodes.find(
    x=>x.code===decodedText
);


dropBtn.onclick=(e)=>{

    e.stopPropagation();

    menu.classList.toggle("show");
};


menu.onclick=(e)=>{

    e.stopPropagation();

};


function createGroup(

    title="+ COD",

    options=dropdownOptions

){

    const panel=
    document.createElement("div");

    panel.className=
    "action-panel";

    panel.innerHTML=`

        <button class="action-toggle">

            ${title}

        </button>

        <div class="action-content">

            ${
                options
                .map(x=>`

                    <label class="drop-item">

                        <input
                            type="checkbox"
                            value="${x}"
                        >

                        ${x}

                    </label>

                `)
                .join("")
            }

        </div>

    `;

    groupsContainer.append(panel);

    const toggle=
    panel.querySelector(
        ".action-toggle"
    );

    const content=
    panel.querySelector(
        ".action-content"
    );

    toggle.onclick=(e)=>{

        e.stopPropagation();

        content.classList.toggle(
            "show"
        );

        toggle.innerText=

            content.classList.contains(
                "show"
            )

            ? "− "+title.replace("+ ","")

            : title;

        refreshChecks();
    };

}


function refreshChecks(){

    const checks=
    menu.querySelectorAll(
        'input[type="checkbox"]'
    );

    checks.forEach(check=>{

        check.onchange=()=>{

            obj.tags=

            [...checks]

            .filter(
                x=>x.checked
            )

            .map(
                x=>x.value
            );

            dropBtn.innerText=

                obj.tags.length

                ? "Đã chọn ▼"

                : "Chọn ID ▼";

        };

    });

}




createGroup(
    "+ COD",
    dropdownOptions
);

createGroup(
    "+ Thao tác",
    actionOptions
);


document.addEventListener(
    "click",
    (e)=>{

        if(
            !dropdown.contains(e.target)
        ){
            menu.classList.remove("show");
        }

    }
);


    item.querySelector(".copy-line-btn")
    .onclick=async()=>{

        const obj=scannedCodes.find(
            x=>x.code===decodedText
        );

        const text=
            obj.code+
            obj.tags
            .map(
                x=>` (${x})`
            )
            .join("");

        await navigator.clipboard.writeText(
            text
        );

        const btn=
            item.querySelector(
                ".copy-line-btn"
            );

        btn.innerText="✓";

        setTimeout(()=>{
            btn.innerText="📋";
        },800);
    };

    item.querySelector(".delete-btn")
    .onclick=()=>{

        scannedCodes=scannedCodes.filter(
            x=>x.code!==decodedText
        );

        item.remove();

        updateStatus();
    };

    resultContainer.prepend(item);

    updateStatus();
}

copyBtn.onclick=async()=>{

    if(!scannedCodes.length){
        alert("Chưa có mã.");
        return;
    }

    await navigator.clipboard.writeText(

    scannedCodes
    .map(x=>

        x.code+

        x.tags
        .map(t=>` (${t})`)
        .join("")

    )
    .join(", \n")

    );

    alert("Đã copy.");
};


clearBtn.onclick=()=>{

    scannedCodes=[];

    resultContainer.innerHTML="";

    updateStatus();
};


const html5QrCode=new Html5Qrcode("reader");

html5QrCode.start(
{
    facingMode:{
        exact:"environment"
    }
},
{

    fps:6, // giảm tải CPU

    qrbox:{
        width:220,
        height:220
    },

    aspectRatio:1.333,

    videoConstraints:{

        facingMode:"environment",

        width:{ ideal:1280 },
        height:{ ideal:720 }

    },

    rememberLastUsedCamera:true,

    disableFlip:true,

    experimentalFeatures:{
        useBarCodeDetectorIfSupported:true
    }

},
onScanSuccess
).catch(err=>{

    console.error(err);

    alert(
        "Không mở được camera. Hãy cấp quyền camera."
    );

});

</script>

</body>
</html>
