<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Scanner v1.0</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<defs>
<linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
<stop offset='0%' stop-color='%2300d4ff'/>
<stop offset='100%' stop-color='%23006eff'/>
</linearGradient>
</defs>
<rect width='64' height='64' rx='16' fill='%23111'/>
<rect x='8' y='8' width='18' height='18' rx='4' fill='url(%23g)'/>
<rect x='38' y='8' width='18' height='18' rx='4' fill='url(%23g)'/>
<rect x='8' y='38' width='18' height='18' rx='4' fill='url(%23g)'/>
<rect x='34' y='34' width='6' height='6' fill='white'/>
<rect x='44' y='34' width='10' height='6' fill='white'/>
<rect x='34' y='46' width='20' height='6' fill='white'/>
</svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{
    --mono:"JetBrains Mono","Cascadia Code","Consolas","Courier New",monospace;
    --bg:#edf3fb;
    --bg2:#f8fbff;
    --card:#ffffff;
    --text:#142033;
    --muted:#6b7890;
    --line:#dfe7f2;
    --primary:#1976ff;
    --primary2:#00b8ff;
    --good:#19b866;
    --danger:#ef4444;
    --warning:#f59e0b;
    --shadow:0 12px 30px rgba(19,38,68,.10);
    --shadow2:0 8px 18px rgba(19,38,68,.08);
    --radius:20px;
}

* ,
*::before,
*::after{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:var(--mono);
    -webkit-tap-highlight-color:transparent;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:var(--mono);
    background:
        radial-gradient(circle at top left,rgba(0,184,255,.18),transparent 34%),
        linear-gradient(180deg,var(--bg2),var(--bg));
    color:var(--text);
    min-height:100vh;
    padding:12px;
    padding-bottom:calc(28px + env(safe-area-inset-bottom));
}

body.dark{
    --bg:#0b1220;
    --bg2:#111827;
    --card:#182235;
    --text:#eef5ff;
    --muted:#9fb0ca;
    --line:#263449;
    --shadow:0 12px 30px rgba(0,0,0,.32);
    --shadow2:0 8px 18px rgba(0,0,0,.24);
}

button,
input,
textarea,
select{
    font-family:var(--mono);
    letter-spacing:-.02em;
}

.code,
.barcode-text,
.stat-value{
    font-variant-numeric:tabular-nums;
}

.container{
    max-width:540px;
    margin:auto;
}

.app-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin:4px 0 12px;
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
}

.logo{
    width:42px;
    height:42px;
    border-radius:14px;
    display:grid;
    place-items:center;
    color:#fff;
    font-size:22px;
    background:linear-gradient(135deg,var(--primary),var(--primary2));
    box-shadow:0 10px 22px rgba(25,118,255,.26);
}

.brand h1{
    font-size:18px;
    line-height:1.1;
}

.brand p{
    color:var(--muted);
    font-size:12px;
    margin-top:3px;
}

.header-actions{
    display:flex;
    gap:8px;
}

.icon-btn{
    flex:none;
    width:42px;
    height:42px;
    padding:0;
    border-radius:14px;
    background:var(--card);
    color:var(--text);
    box-shadow:var(--shadow2);
    font-size:18px;
}

.scanner-card{
    background:var(--card);
    border:1px solid rgba(255,255,255,.55);
    border-radius:24px;
    padding:10px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
}

.scanner-off .scan-line{
    display:none;
}

.scanner-off .scan-frame{
    display:none;
}

#reader{
    background:#050914;
    border-radius:18px;
    overflow:hidden;
    aspect-ratio:4/3;
    max-height:310px;
    position:relative;
}

#reader video{
    width:100% !important;
    height:100% !important;
    border-radius:18px;
    object-fit:cover;
    transform:translateZ(0);
    backface-visibility:hidden;
    will-change:transform;
}

.scan-frame{
    pointer-events:none;
    position:absolute;
    inset:10px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.12);
}

.scan-frame::before{
    content:"";
    position:absolute;
    width:135px;
    height:135px;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    border-radius:24px;
    border:3px solid rgba(0,255,136,.95);
    box-shadow:0 0 0 999px rgba(0,0,0,.20),0 0 24px rgba(0,255,136,.25);
}

.scan-line{
    pointer-events:none;
    position:absolute;
    left:50%;
    top:50%;
    width:124px;
    height:2px;
    border-radius:99px;
    background:linear-gradient(90deg,transparent,#00ff88,transparent);
    transform:translate(-50%,-50%);
    animation:scanLine 1.65s ease-in-out infinite;
}

@keyframes scanLine{
    0%,100%{ margin-top:-56px; opacity:.45; }
    50%{ margin-top:56px; opacity:1; }
}

.quick-stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin:12px 0;
}

.stat-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:10px;
    text-align:center;
    box-shadow:var(--shadow2);
}

.stat-card b{
    display:block;
    font-size:18px;
}

.stat-card span{
    display:block;
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
}

.top-bar{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin:12px 0;
}

button{
    border:none;
    border-radius:14px;
    padding:11px 9px;
    font-size:12px;
    font-weight:800;
    cursor:pointer;
    transition:transform .16s ease,filter .16s ease,opacity .16s ease;
    color:#fff;
    touch-action:manipulation;
}

button:active{
    transform:scale(.96);
}

button:disabled{
    opacity:.55;
    cursor:not-allowed;
}

#copyBtn{ background:linear-gradient(135deg,#16c784,#33e09d); }
#clearBtn{ background:linear-gradient(135deg,#e53935,#ff6a6a); }
#importBtn{ background:linear-gradient(135deg,#2196f3,#42a5f5); }
#addManualBtn{ background:linear-gradient(135deg,#ff9800,#ffb74d); color:#fff; }






.tool-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:var(--shadow2);
}

.input-row{
    position:relative;
}

.input-row + .input-row{
    margin-top:10px;
}

.input-row input{
    width:100%;
    padding:13px 42px 13px 14px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--bg2);
    color:var(--text);
    font-size:14px;
    outline:none;
}

.input-row input:focus{
    border-color:rgba(25,118,255,.65);
    box-shadow:0 0 0 4px rgba(25,118,255,.10);
}

.clear-field-btn{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    width:34px;
    height:34px;
    padding:0;
    border-radius:10px;
    border:none;
    background:transparent;
    color:var(--muted);
    font-size:17px;
    box-shadow:none;
}

#status{
    background:var(--card);
    border:1px solid var(--line);
    padding:12px 14px;
    border-radius:16px;
    text-align:center;
    font-weight:800;
    margin-bottom:12px;
    box-shadow:var(--shadow2);
    color:var(--text);
}

#result-container{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.empty-state{
    background:var(--card);
    border:1px dashed var(--line);
    border-radius:18px;
    padding:18px;
    text-align:center;
    color:var(--muted);
}

.barcode-item{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:12px;
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    box-shadow:var(--shadow2);
    animation:fadeIn .18s ease;
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(-8px); }
    to{ opacity:1; transform:translateY(0); }
}

.barcode-main{
    min-width:0;
}

.barcode-text{
    word-break:break-all;
    font-weight:900;
    font-size:15px;
    line-height:1.35;
}

.tag-preview{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    margin-top:7px;
}

.tag-pill{
    font-size:11px;
    font-weight:800;
    color:#1166d8;
    background:rgba(25,118,255,.10);
    border:1px solid rgba(25,118,255,.15);
    padding:4px 7px;
    border-radius:999px;
}

.item-actions{
    display:flex;
    align-items:flex-start;
    gap:6px;
    flex:none;
}

.delete-btn,.copy-line-btn{
    border-radius:10px;
    padding:8px 9px;
    width:38px;
    height:36px;
    flex:none;
    display:grid;
    place-items:center;
}

.delete-btn{ background:#ff4d4d; }
.copy-line-btn{ background:#24c96f; }

.dropdown{
    grid-column:1/-1;
    position:relative;
}

.drop-btn{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--bg2);
    color:var(--text);
    cursor:pointer;
    font-size:13px;
    text-align:left;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.dropdown-menu{
    display:none;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    width:100%;
    z-index:20;
    box-shadow:var(--shadow);
    max-height:260px;
    overflow-y:auto;
    padding:10px;
    margin-top:8px;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    touch-action:pan-y;
    scrollbar-width:none;
}

.dropdown-menu::-webkit-scrollbar,
.action-content::-webkit-scrollbar{
    display:none;
}

.dropdown-menu.show{
    display:block;
}

.groups-container{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.action-panel{
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    background:var(--bg2);
}

.action-toggle{
    width:100%;
    background:transparent;
    border:none;
    border-radius:0;
    padding:11px 12px;
    color:var(--primary);
    cursor:pointer;
    font-weight:900;
    display:flex;
    justify-content:space-between;
}

.action-content{
    display:none;
    max-height:160px;
    overflow-y:auto;
    padding:0 10px 10px;
    scrollbar-width:none;
}

.action-content.show{
    display:block;
}

.drop-item{
    display:flex;
    align-items:center;
    gap:9px;
    padding:9px 4px;
    cursor:pointer;
    color:var(--text);
    font-weight:700;
    font-size:14px;
}

.drop-item input{
    width:18px;
    height:18px;
    accent-color:var(--primary);
}

.highlight{
    background:linear-gradient(135deg,rgba(255,235,238,.95),rgba(255,255,255,.98)) !important;
    border:2px solid #e53935 !important;
}

body.dark .highlight{
    background:linear-gradient(135deg,rgba(127,29,29,.45),rgba(24,34,53,.98)) !important;
}

.hidden{
    display:none !important;
}

.toast{
    position:fixed;
    left:50%;
    bottom:calc(18px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(18px);
    opacity:0;
    pointer-events:none;
    background:#111827;
    color:white;
    padding:12px 16px;
    border-radius:999px;
    font-weight:800;
    box-shadow:0 12px 34px rgba(0,0,0,.25);
    transition:.2s ease;
    z-index:9999;
    max-width:92vw;
    text-align:center;
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

@media(max-width:450px){
    body{ padding:10px; padding-bottom:calc(22px + env(safe-area-inset-bottom)); }
    #reader{ max-height:285px; }
    .brand h1{ font-size:17px; }
    .brand p{ font-size:11px; }
    .top-bar{ gap:7px; }
    button{ font-size:11px; padding:10px 6px; }
    .barcode-item{ padding:11px; }
}
</style>
</head>

<body>
<div class="container">

<header class="app-header">
    <div class="brand">
        <div class="logo">▣</div>
        <div>
            <h1>Scanner</h1>
            <p>QR · Barcode · Import</p>
        </div>
    </div>
    <div class="header-actions">
        <button class="icon-btn" id="cameraToggleBtn" title="Tắt/mở camera">📷</button>
        <button class="icon-btn" id="themeBtn" title="Đổi giao diện">🌙</button>
    </div>
</header>

<section class="scanner-card">
    <div id="reader"></div>
    <div class="scan-frame"></div>
    <div class="scan-line"></div>
</section>


<div class="quick-stats">
    <div class="stat-card"><b id="totalCount">0</b><span>Tổng mã</span></div>
    <div class="stat-card"><b id="taggedCount">0</b><span>Thao tác</span></div>
    <div class="stat-card"><b id="matchedCount">0</b><span>Đối chiếu</span></div>
</div>

<div class="top-bar">
    <button id="copyBtn">📋<br>Copy hết</button>
    <button id="clearBtn">🗑<br>Xóa hết</button>
    <button id="importBtn">☁<br>Import</button>
    <button id="addManualBtn">✏️<br>Nhập tay</button>
</div>

<section class="tool-card">
    <div class="input-row">
        <input type="text" id="checkListInput" placeholder="Nhập mã cần đối chiếu, cách nhau bởi dấu phẩy">
        <button id="clearCheckListBtn" class="clear-field-btn">✕</button>
    </div>
    <div class="input-row">
        <input type="text" id="searchInput" placeholder="Tìm trong danh sách đã quét">
        <button id="clearSearchBtn" class="clear-field-btn">✕</button>
    </div>
</section>

<div id="status">Chưa có mã nào</div>
<div id="result-container"></div>

</div>

<div id="toast" class="toast"></div>

<script>
    // chặn màn hình
const isPhone = window.innerWidth <= 422 && window.matchMedia("(pointer:coarse)").matches;
if (!isPhone) {
    document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;font-family:"JetBrains Mono","Cascadia Code","Consolas","Courier New",monospace;padding:20px;background:#eef2f7;">
            <div>
                <h2>📱 Chỉ hỗ trợ điện thoại</h2>
                <p>Thiết bị hoặc kích thước màn hình không được hỗ trợ.</p>
                <br><p style="color:red;">Vì tôi thích như vậy ~</p>
            </div>
        </div>
    `;
    throw new Error("Phone only");
}

const dropdownOptions = ["Út", "Cường", "Phong", "Dũng", "Đạt", "Minh", "Tùng", "Lâm"];
const actionOptions = ["Đẩy đơn", "Đẩy app", "Đẩy lấy", "Đẩy ra", "XN hủy", "Kiểm kho", "Xác nhận BC", "Chuyển tuyến"];
const SHEET_WEBHOOK = "https://script.google.com/macros/s/AKfycbyMinlMSUi2quS9phTXnV3GfEilYY65KhPJE8p3qB4WT03XBBnXAblpwEDux0ebs3KP/exec";

let scannedCodes = [];
let lastScanned = "";
let lastScanTime = 0;
let html5QrCode = null;
let cameraRunning = false;

const statusEl = document.getElementById("status");
const importBtn = document.getElementById("importBtn");
const copyBtn = document.getElementById("copyBtn");
const clearBtn = document.getElementById("clearBtn");
const addManualBtn = document.getElementById("addManualBtn");
const resultContainer = document.getElementById("result-container");
const checkListInput = document.getElementById("checkListInput");
const searchInput = document.getElementById("searchInput");
const themeBtn = document.getElementById("themeBtn");
const cameraToggleBtn = document.getElementById("cameraToggleBtn");
const clearCheckListBtn = document.getElementById("clearCheckListBtn");
const clearSearchBtn = document.getElementById("clearSearchBtn");
const totalCount = document.getElementById("totalCount");
const taggedCount = document.getElementById("taggedCount");
const matchedCount = document.getElementById("matchedCount");
const toast = document.getElementById("toast");
const scannerCard = document.querySelector(".scanner-card");

const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

function escapeHtml(value){
    return String(value)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

function showToast(message){
    toast.textContent = message;
    toast.classList.add("show");
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => toast.classList.remove("show"), 1450);
}

function playBeep(){
    beep.currentTime = 0;
    beep.play().catch(() => {});
}

function vibratePhone(){
    navigator.vibrate?.(80);
}

function getCheckList(){
    return checkListInput.value
        .split(",")
        .map(c => c.trim())
        .filter(Boolean);
}

function getFormattedText(obj){
    return obj.code + obj.tags.map(t => ` (${t})`).join("");
}

function saveData(){
    localStorage.setItem("hbp_scannedCodes", JSON.stringify(scannedCodes));
}

function updateStatus(){
    const checkList = getCheckList();
    const matched = scannedCodes.filter(x => checkList.includes(x.code)).length;
    const tagged = scannedCodes.filter(x => x.tags?.length).length;

    totalCount.textContent = scannedCodes.length;
    taggedCount.textContent = tagged;
    matchedCount.textContent = matched;
    statusEl.textContent = scannedCodes.length
        ? `✅ Đã quét ${scannedCodes.length} mã`
        : "Chưa có mã nào";

    if (!scannedCodes.length) {
        resultContainer.innerHTML = `<div class="empty-state">📷 Quét mã hoặc bấm “Nhập tay” để thêm mã mới.</div>`;
    } else {
        const empty = resultContainer.querySelector(".empty-state");
        if (empty) empty.remove();
    }
}

function applyFilters(){
    const checkList = getCheckList();
    const keyword = searchInput.value.trim().toLowerCase();

    document.querySelectorAll(".barcode-item").forEach(item => {
        const code = item.dataset.code || "";
        item.classList.toggle("highlight", checkList.includes(code));
        const visible = !keyword || code.toLowerCase().includes(keyword);
        item.classList.toggle("hidden", !visible);
    });

    updateStatus();
}

function renderAll(){
    resultContainer.innerHTML = "";
    [...scannedCodes].reverse().forEach(renderItem);
    applyFilters();
}

function onScanSuccess(decodedText){
    const code = String(decodedText || "").trim();
    if (!code) return;

    const now = Date.now();
    if (code === lastScanned && now - lastScanTime < 1200) return;

    lastScanned = code;
    lastScanTime = now;

    if (scannedCodes.find(x => x.code === code)) {
        showToast("Mã này đã có trong danh sách");
        return;
    }

    const newObj = { code, tags: [] };
    scannedCodes.push(newObj);

    playBeep();
    vibratePhone();
    saveData();
    renderItem(newObj, true);
    applyFilters();
    showToast("Đã thêm mã mới");
}

function createGroup(title, options, obj, dropBtn){
    const panel = document.createElement("div");
    panel.className = "action-panel";
    panel.innerHTML = `
        <button class="action-toggle" type="button">
            <span>${escapeHtml(title)}</span><span>⌄</span>
        </button>
        <div class="action-content">
            ${options.map(x => `
                <label class="drop-item">
                    <input type="checkbox" value="${escapeHtml(x)}" ${obj.tags.includes(x) ? "checked" : ""}>
                    <span>${escapeHtml(x)}</span>
                </label>
            `).join("")}
        </div>
    `;

    const toggle = panel.querySelector(".action-toggle");
    const content = panel.querySelector(".action-content");
    toggle.onclick = (e) => {
        e.stopPropagation();
        content.classList.toggle("show");
    };

    return panel;
}

function refreshItemView(item, obj, dropBtn){
    const tagPreview = item.querySelector(".tag-preview");
    tagPreview.innerHTML = obj.tags.map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join("");
    dropBtn.innerHTML = `<span>${obj.tags.length ? "Đã chọn" : "Chọn COD / thao tác"}</span><span>▼</span>`;
}

function renderItem(obj, prepend = false){
    const item = document.createElement("div");
    item.className = "barcode-item";
    item.dataset.code = obj.code;

    item.innerHTML = `
        <div class="barcode-main">
            <div class="barcode-text">${escapeHtml(obj.code)}</div>
            <div class="tag-preview"></div>
        </div>
        <div class="item-actions">
            <button class="copy-line-btn" type="button">📋</button>
            <button class="delete-btn" type="button">🗑</button>
        </div>
        <div class="dropdown">
            <button class="drop-btn" type="button"></button>
            <div class="dropdown-menu">
                <div class="groups-container"></div>
            </div>
        </div>
    `;

    const dropBtn = item.querySelector(".drop-btn");
    const menu = item.querySelector(".dropdown-menu");
    const groupsContainer = item.querySelector(".groups-container");

    groupsContainer.append(createGroup("+ Thao tác", actionOptions, obj, dropBtn));
    groupsContainer.append(createGroup("+ COD", dropdownOptions, obj, dropBtn));
    refreshItemView(item, obj, dropBtn);

    dropBtn.onclick = (e) => {
        e.stopPropagation();
        document.querySelectorAll(".dropdown-menu.show").forEach(openMenu => {
            if (openMenu !== menu) openMenu.classList.remove("show");
        });
        menu.classList.toggle("show");
    };

    menu.addEventListener("click", e => e.stopPropagation());

    menu.addEventListener("change", (e) => {
        if (e.target.type === "checkbox") {
            const allChecks = menu.querySelectorAll('input[type="checkbox"]');
            obj.tags = [...allChecks].filter(x => x.checked).map(x => x.value);
            refreshItemView(item, obj, dropBtn);
            saveData();
            updateStatus();
        }
    });

    item.querySelector(".copy-line-btn").onclick = async () => {
        await navigator.clipboard.writeText(getFormattedText(obj));
        const btn = item.querySelector(".copy-line-btn");
        btn.textContent = "✓";
        showToast("Đã copy mã này");
        setTimeout(() => { btn.textContent = "📋"; }, 800);
    };

    item.querySelector(".delete-btn").onclick = () => {
        scannedCodes = scannedCodes.filter(x => x.code !== obj.code);
        item.remove();
        saveData();
        applyFilters();
        showToast("Đã xóa mã");
    };

    if (prepend) resultContainer.prepend(item);
    else resultContainer.append(item);
}

async function startCamera(){
    if (cameraRunning) return;
    try {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(
            { facingMode: { exact: "environment" } },
            {
                fps: 24,
                qrbox: { width: 180, height: 180 },
                aspectRatio: 1.333,
                videoConstraints: {
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    advanced: [{ focusMode: "continuous" }]
                },
                rememberLastUsedCamera: true,
                disableFlip: true,
                experimentalFeatures: { useBarCodeDetectorIfSupported: true },
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.QR_CODE,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.CODE_39
                ]
            },
            onScanSuccess
        );
        cameraRunning = true;
        document.querySelector(".scanner-card").classList.remove("scanner-off");
        cameraToggleBtn.textContent = "📷";
        showToast("Camera đã bật");
    } catch (err) {
        console.error(err);
        alert("Không mở được camera. Hãy cấp quyền camera.");
    }
}

async function stopCamera(){
    if (!html5QrCode || !cameraRunning) return;
    try {
        await html5QrCode.stop();
        cameraRunning = false;
        document.querySelector(".scanner-card").classList.add("scanner-off");
        cameraToggleBtn.textContent = "▶️";
        showToast("Đã tắt camera");
    } catch (err) {
        console.error(err);
    }
}



copyBtn.onclick = async () => {
    if (!scannedCodes.length) {
        alert("Chưa có mã.");
        return;
    }
    const text = scannedCodes.map(getFormattedText).join(",\n");
    await navigator.clipboard.writeText(text);
    showToast("Đã copy tất cả");
};

importBtn.onclick = async () => {
    if (!scannedCodes.length) {
        alert("Chưa có dữ liệu.");
        return;
    }

    try {
        importBtn.disabled = true;
        importBtn.innerHTML = "⏳<br>Upload";
        const data = scannedCodes.map(x => ({
            code: x.code,
            cod: x.tags.filter(t => dropdownOptions.includes(t)).join(", "),
            action: x.tags.filter(t => actionOptions.includes(t)).join(", "),
            time: new Date().toLocaleString("vi-VN")
        }));

        await fetch(SHEET_WEBHOOK, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(data)
        });

        showToast("Import thành công");
    } catch (err) {
        console.error(err);
        alert("❌ Import lỗi");
    } finally {
        importBtn.disabled = false;
        importBtn.innerHTML = "☁<br>Import";
    }
};

clearBtn.onclick = () => {
    if (!scannedCodes.length) return;
    if (!confirm("Xóa toàn bộ mã đã quét?")) return;
    scannedCodes = [];
    localStorage.removeItem("hbp_scannedCodes");
    renderAll();
    showToast("Đã xóa tất cả");
};

addManualBtn.onclick = () => {
    const manualCode = prompt("Nhập mã đơn hàng:");
    if (manualCode && manualCode.trim()) {
        onScanSuccess(manualCode.trim());
    }
};




checkListInput.addEventListener("input", function(){
    localStorage.setItem("hbp_checkList", this.value);
    applyFilters();
});

searchInput.addEventListener("input", applyFilters);

clearCheckListBtn.onclick = () => {
    checkListInput.value = "";
    localStorage.removeItem("hbp_checkList");
    applyFilters();
    checkListInput.focus();
};

clearSearchBtn.onclick = () => {
    searchInput.value = "";
    applyFilters();
    searchInput.focus();
};

themeBtn.onclick = () => {
    document.body.classList.toggle("dark");
    const dark = document.body.classList.contains("dark");
    localStorage.setItem("hbp_dark", dark ? "1" : "0");
    themeBtn.textContent = dark ? "☀️" : "🌙";
};

cameraToggleBtn.onclick = () => {
    if (cameraRunning) stopCamera();
    else startCamera();
};

document.addEventListener("click", () => {
    document.querySelectorAll(".dropdown-menu.show").forEach(menu => menu.classList.remove("show"));
});

function loadData(){
    const saved = localStorage.getItem("hbp_scannedCodes");
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            scannedCodes = Array.isArray(parsed)
                ? parsed.filter(x => x && x.code).map(x => ({ code:String(x.code), tags:Array.isArray(x.tags) ? x.tags : [] }))
                : [];
        } catch {
            scannedCodes = [];
        }
    }

    const savedCheckList = localStorage.getItem("hbp_checkList");
    if (savedCheckList) checkListInput.value = savedCheckList;

    const dark = localStorage.getItem("hbp_dark") === "1";
    document.body.classList.toggle("dark", dark);
    themeBtn.textContent = dark ? "☀️" : "🌙";

    renderAll();
}

loadData();
startCamera();
</script>
</body>
</html>
