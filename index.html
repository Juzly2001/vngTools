<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
    <defs>
    <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
    <stop offset='0%' stop-color='%2300d4ff'/>
    <stop offset='100%' stop-color='%23006eff'/>
    </linearGradient>
    </defs>

    <rect width='64' height='64' rx='16' fill='%23111'/>


    <rect x='10' y='10' width='44' height='44' rx='8' fill='%231a1a1a' stroke='url(%23g)' stroke-width='2'/>


    <rect x='18' y='36' width='6' height='12' rx='2' fill='url(%23g)'/>
    <rect x='29' y='28' width='6' height='20' rx='2' fill='url(%23g)'/>
    <rect x='40' y='20' width='6' height='28' rx='2' fill='url(%23g)'/>


    <polyline points='18,28 32,22 43,16'
    fill='none'
    stroke='white'
    stroke-width='3'
    stroke-linecap='round'
    stroke-linejoin='round'/>


    <circle cx='18' cy='28' r='2' fill='white'/>
    <circle cx='32' cy='22' r='2' fill='white'/>
    <circle cx='43' cy='16' r='2' fill='white'/>

    </svg>">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --note-accent: #eab308;
            --note-accent-hover: #ca8a04;
            --danger-color: #ef4444;
            --modal-bg: rgba(15, 23, 42, 0.95);
            --context-bg: rgba(30, 41, 59, 0.95);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .btn-group { display: flex; gap: 10px; }

        button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-warning { background-color: var(--note-accent); color: #0f172a; }
        .btn-warning:hover { background-color: var(--note-accent-hover); }
        .btn-secondary { background-color: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: rgba(255,255,255,0.15); }
        .btn-real-danger { background-color: var(--danger-color); color: white; }

        input[type="file"] { display: none; }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .group-card {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-self: start;
            cursor: grab;
            transition: border-color 0.2s;
        }
        .group-card:hover { border-color: rgba(255, 255, 255, 0.15); }
        
        .group-card.type-note { border-left: 4px solid var(--note-accent); }

        .sortable-ghost-group { opacity: 0.3; border: 2px dashed var(--accent-color); }
        .sortable-ghost-link { opacity: 0.4; transform: scale(0.95); }

        .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }

        .group-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .group-title::before {
            content: "⋮⋮";
            color: var(--text-sub);
            font-size: 14px;
            margin-right: 4px;
        }

        .group-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .tag-link { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }
        .tag-note { background: rgba(234, 179, 8, 0.2); color: #fde047; }

        /* Đồng bộ hai khu vực bấm nút giống hệt nhau về mặt giao diện gọn gàng */
        .buttons-area, .notes-area {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 50px;
            padding: 8px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.12);
        }

        .item-wrapper { display: inline-flex; align-items: center; cursor: grab; }

        .link-button, .note-button {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            user-select: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        /* Hiệu ứng Hover nút Link */
        .link-button:hover {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        /* Hiệu ứng Hover nút Ghi chú (Màu vàng theo đặc trưng Note) */
        .note-button:hover {
            background: linear-gradient(90deg, #eab308, #f59e0b);
            color: #0f172a;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(234, 179, 8, 0.3);
        }

        .no-data-text { color: var(--text-sub); font-size: 13px; font-style: italic; width: 100%; padding: 8px;}

        /* --- CONTEXT MENU CHUỘT PHẢI --- */
        .context-menu {
            position: absolute;
            background: var(--context-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 6px 0;
            width: 200px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: none;
            z-index: 2000;
        }
        .context-menu-item {
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
        }
        .context-menu-item:hover { background: rgba(255, 255, 255, 0.08); }
        .context-menu-item.delete { color: #fca5a5; }
        .context-menu-item.delete:hover { background: rgba(239, 68, 68, 0.2); color: var(--danger-color); }
        .context-menu-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }

        /* --- MODAL STYLE --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-box label { font-size: 12px; color: var(--text-sub); display: block; margin-bottom: 5px; }
        .modal-box input, .modal-box textarea {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color); border-radius: 8px;
            color: #fff; font-size: 15px; box-sizing: border-box;
            margin-bottom: 15px; outline: none; font-family: inherit;
        }
        .modal-box textarea { resize: vertical; height: 160px; line-height: 1.5; }
        .modal-box input:focus, .modal-box textarea:focus { border-color: var(--accent-color); }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        
        /* Giao diện xem ghi chú chi tiết */
        .view-note-content {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            font-size: 15px;
            line-height: 1.6;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 350px;
            overflow-y: auto;
            text-align: left;
        }
        .view-note-content a { color: #6366f1; text-decoration: underline; }

        /* Emoji picker */
        .emoji-picker-container { margin-bottom: 15px; }
        .emoji-grid {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
            max-height: 120px; overflow-y: auto; background: rgba(0, 0, 0, 0.2);
            padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);
        }
        .emoji-item {
            background: rgba(255,255,255,0.02); border: 1px solid transparent; font-size: 20px;
            text-align: center; padding: 6px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .emoji-item:hover { background: rgba(99, 102, 241, 0.2); transform: scale(1.1); }
        .emoji-item.selected { background: var(--accent-color); border-color: rgba(255,255,255,0.3); }
        @media screen and (max-width: 768px) {

            .toolbar {
                display: grid !important;
                grid-template-columns: 1fr !important;
                gap: 12px !important;
            }

            .btn-group {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 10px !important;
                width: 100%;
            }

            .btn-group button {
                width: 100%;
                min-height: 56px;
                justify-content: center;
                white-space: normal;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌟 WORKSPACE DASHBOARD</h1>
        <p style="color: var(--text-sub)">💡 <b>Chuột trái</b> để mở liên kết hoặc đọc nhanh Note. <b>Chuột phải</b> để mở Menu nâng cao.</p>
    </header>

    <div class="toolbar">
        <div class="btn-group">
            <button class="btn-primary" onclick="openGroupModal(false, 'link')">➕ Tạo Nhóm Link</button>
            <button class="btn-warning" onclick="openGroupModal(false, 'note')">📝 Tạo Nhóm Ghi Chú</button>
        </div>
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="exportData()">📥 Export (.json)</button>
            <button class="btn-secondary" onclick="document.getElementById('uploadFile').click()">📤 Import</button>
            <input type="file" id="uploadFile" accept=".json" onchange="importData(event)">
        </div>
    </div>

    <div class="groups-grid" id="groupsContainer"></div>
</div>

<div class="modal-overlay" id="groupModal">
    <div class="modal-box">
        <h3 id="groupModalTitle">📂 Cấu Hình Nhóm</h3>
        <label>Tên nhóm:</label>
        <input type="text" id="groupNameInput" placeholder="Nhập tên nhóm...">
        <label>Chọn Emoji:</label>
        <div class="emoji-picker-container"><div class="emoji-grid" id="groupEmojiGrid"></div></div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal('groupModal')">Hủy</button>
            <button class="btn-primary" onclick="submitGroupForm()">Xác Nhận</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="linkModal">
    <div class="modal-box">
        <h3 id="linkModalTitle">🔗 Cấu Hình Nút Bấm</h3>
        <label>Tên hiển thị:</label>
        <input type="text" id="linkNameInput" placeholder="Ví dụ: Google, Facebook...">
        <label>Địa chỉ URL:</label>
        <input type="text" id="linkUrlInput" placeholder="Ví dụ: google.com">
        <label>Chọn Emoji:</label>
        <div class="emoji-picker-container"><div class="emoji-grid" id="linkEmojiGrid"></div></div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal('linkModal')">Hủy</button>
            <button class="btn-primary" onclick="submitLinkForm()">Xác Nhận</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="noteModal">
    <div class="modal-box">
        <h3 id="noteModalTitle">📝 Thêm Nút Ghi Chú</h3>
        <label>Tiêu đề hiển thị trên nút:</label>
        <input type="text" id="noteTitleInput" placeholder="Ví dụ:Tài khoản BIDV...">
        <label>Nội dung ghi chú chi tiết:</label>
        <textarea id="noteContentInput" placeholder="Nhập nội dung đầy đủ của ghi chú tại đây... (Có thể xuống dòng thoải mái)"></textarea>
        <label>Chọn Emoji cho nút:</label>
        <div class="emoji-picker-container"><div class="emoji-grid" id="noteEmojiGrid"></div></div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal('noteModal')">Hủy</button>
            <button class="btn-primary" onclick="submitNoteForm()">Lưu Cấu Hình</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="readNoteModal">
    <div class="modal-box" style="max-width: 550px;">
        <h3 id="readNoteTitle" style="color: var(--note-accent); margin-top: 0; display:flex; align-items:center; gap:8px;">📋 Ghi Chú</h3>
        <div class="view-note-content" id="readNoteBody"></div>
        <div class="modal-footer">
            <button class="btn-warning" onclick="closeModal('readNoteModal')">Đóng</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="confirmModal">
    <div class="modal-box" style="text-align: center;">
        <h3 style="color: var(--danger-color)">⚠️ Xác Nhận Xóa</h3>
        <p id="confirmMessage" style="color: var(--text-sub); font-size:14px;"></p>
        <div class="modal-footer" style="justify-content: center;">
            <button class="btn-secondary" onclick="closeModal('confirmModal')">Hủy</button>
            <button class="btn-real-danger" id="confirmDeleteBtn">Đồng Ý Xóa</button>
        </div>
    </div>
</div>

<div class="context-menu" id="customContextMenu"><div id="menuItemsContent"></div></div>

<script>
    const emojiList = ["NONE", "🚀", "🤖", "🔥", "✨", "🌟", "💻", "💼", "📚", "🛠️", "🎨", "🎵", "💬", "❤️", "📌", "🔔", "🔑", "💳"];

    let selectedEmoji = ""; 
    let isEditMode = false;
    let currentGroupType = "link"; 
    let currentActiveGroupId = null;
    let currentActiveIndex = null;

    // Khởi tạo dữ liệu mẫu theo cấu trúc mới (Mỗi note là một Object gồm title, content, emoji)
    let dashboardData = JSON.parse(localStorage.getItem('myDashboardDataButtonsEdition')) || [
        {
            id: "g1", title: "Mạng Xã Hội", emoji: "NONE", type: "link",
            links: [
                { name: "Facebook", url: "https://facebook.com", emoji: "💬" },
                { name: "YouTube", url: "https://youtube.com", emoji: "NONE" }
            ]
        },
    ];

    function saveData() {
        localStorage.setItem('myDashboardDataButtonsEdition', JSON.stringify(dashboardData));
        renderDashboard();
    }

    function buildEmojiPicker(gridId, preSelectedEmoji = "NONE") {
        const grid = document.getElementById(gridId); grid.innerHTML = ""; selectedEmoji = preSelectedEmoji;
        emojiList.forEach((emoji) => {
            const item = document.createElement('div'); item.className = 'emoji-item';
            item.innerHTML = emoji === "NONE" ? `<span style="font-size:11px;color:var(--text-sub);font-weight:bold;">🚫 Ẩn</span>` : emoji;
            if(emoji === preSelectedEmoji) item.classList.add('selected');
            item.onclick = function() {
                grid.querySelectorAll('.emoji-item').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected'); selectedEmoji = emoji;
            };
            grid.appendChild(item);
        });
    }

    function openModal(modalId) { document.getElementById(modalId).classList.add('active'); }
    function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); }

    function openGroupModal(editGroupId = false, defaultType = 'link') {
        currentGroupType = defaultType;
        if(editGroupId) {
            isEditMode = true; currentActiveGroupId = editGroupId;
            const group = dashboardData.find(g => g.id === editGroupId);
            document.getElementById('groupModalTitle').innerText = "📝 Sửa Tên/Icon Nhóm";
            document.getElementById('groupNameInput').value = group.title;
            buildEmojiPicker('groupEmojiGrid', group.emoji || "NONE");
        } else {
            isEditMode = false;
            document.getElementById('groupModalTitle').innerText = defaultType === 'link' ? "📂 Tạo Nhóm Link Mới" : "📝 Tạo Nhóm Ghi Chú Mới";
            document.getElementById('groupNameInput').value = '';
            buildEmojiPicker('groupEmojiGrid', "NONE");
        }
        openModal('groupModal');
        document.getElementById('groupNameInput').focus();
    }

    function submitGroupForm() {
        const name = document.getElementById('groupNameInput').value.trim();
        if(!name) return;
        if(isEditMode) {
            const group = dashboardData.find(g => g.id === currentActiveGroupId);
            if(group) { group.title = name; group.emoji = selectedEmoji; }
        } else {
            const newGroup = { id: 'g_' + Date.now(), title: name, emoji: selectedEmoji, type: currentGroupType };
            if(currentGroupType === 'link') newGroup.links = [];
            else newGroup.notes = [];
            dashboardData.push(newGroup);
        }
        saveData(); closeModal('groupModal');
    }

    function openLinkModal(groupId, linkIndex = false) {
        currentActiveGroupId = groupId;
        if(linkIndex !== false) {
            isEditMode = true; currentActiveIndex = linkIndex;
            const link = dashboardData.find(g => g.id === groupId).links[linkIndex];
            document.getElementById('linkModalTitle').innerText = "📝 Sửa Nút Bấm";
            document.getElementById('linkNameInput').value = link.name;
            document.getElementById('linkUrlInput').value = link.url;
            buildEmojiPicker('linkEmojiGrid', link.emoji || "NONE");
        } else {
            isEditMode = false;
            document.getElementById('linkNameInput').value = '';
            document.getElementById('linkUrlInput').value = '';
            buildEmojiPicker('linkEmojiGrid', "NONE");
        }
        openModal('linkModal');
    }

    function submitLinkForm() {
        const name = document.getElementById('linkNameInput').value.trim();
        let url = document.getElementById('linkUrlInput').value.trim();
        if(!name || !url) return;
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
        const group = dashboardData.find(g => g.id === currentActiveGroupId);
        if(group) {
            if(isEditMode) group.links[currentActiveIndex] = { name, url, emoji: selectedEmoji };
            else group.links.push({ name, url, emoji: selectedEmoji });
            saveData();
        }
        closeModal('linkModal');
    }

    // Mở form điền thông tin Ghi Chú Mới (Có tiêu đề + nội dung đầy đủ)
    function openNoteModal(groupId, noteIndex = false) {
        currentActiveGroupId = groupId;
        if(noteIndex !== false) {
            isEditMode = true; currentActiveIndex = noteIndex;
            const noteObj = dashboardData.find(g => g.id === groupId).notes[noteIndex];
            document.getElementById('noteModalTitle').innerText = "📝 Sửa Nút Ghi Chú";
            document.getElementById('noteTitleInput').value = noteObj.title || "";
            document.getElementById('noteContentInput').value = noteObj.content || "";
            buildEmojiPicker('noteEmojiGrid', noteObj.emoji || "NONE");
        } else {
            isEditMode = false;
            document.getElementById('noteModalTitle').innerText = "➕ Thêm Nút Ghi Chú Mới";
            document.getElementById('noteTitleInput').value = '';
            document.getElementById('noteContentInput').value = '';
            buildEmojiPicker('noteEmojiGrid', "NONE");
        }
        openModal('noteModal');
        document.getElementById('noteTitleInput').focus();
    }

    function submitNoteForm() {
        const title = document.getElementById('noteTitleInput').value.trim();
        const content = document.getElementById('noteContentInput').value;
        if(!title || !content.trim()) return;

        const group = dashboardData.find(g => g.id === currentActiveGroupId);
        if(group) {
            const dataObj = { title, content, emoji: selectedEmoji };
            if(isEditMode) group.notes[currentActiveIndex] = dataObj;
            else group.notes.push(dataObj);
            saveData();
        }
        closeModal('noteModal');
    }

    // ĐỌC GHI CHÚ KHI BẤM CHUỘT TRÁI VÀO NÚT NOTE
    function readNoteDetail(groupId, index) {
        const group = dashboardData.find(g => g.id === groupId);
        if(!group || !group.notes[index]) return;
        
        const noteObj = group.notes[index];
        const titleText = (noteObj.emoji && noteObj.emoji !== "NONE") ? `${noteObj.emoji} ${noteObj.title}` : `📋 ${noteObj.title}`;
        
        document.getElementById('readNoteTitle').innerHTML = titleText;
        document.getElementById('readNoteBody').innerHTML = linkify(noteObj.content);
        openModal('readNoteModal');
    }

    function openContextMenu(e, targetType, groupId, index = null) {

        e.preventDefault(); e.stopPropagation();
        currentActiveGroupId = groupId; currentActiveIndex = index;

        const menu = document.getElementById('customContextMenu');
        const menuContent = document.getElementById('menuItemsContent');
        menu.style.display = 'none';
        menuContent.innerHTML = '';

        if (targetType === 'group-link') {
            menuContent.innerHTML = `
                <div class="context-menu-item" onclick="openLinkModal('${groupId}')">➕ Thêm nút bấm link</div>
                <div class="context-menu-divider"></div>
                <div class="context-menu-item" onclick="openGroupModal('${groupId}', 'link')">📝 Sửa tên/icon nhóm</div>
                <div class="context-menu-item delete" onclick="triggerDeleteGroup()">❌ Xóa toàn bộ nhóm</div>
            `;
        } else if (targetType === 'group-note') {
            menuContent.innerHTML = `
                <div class="context-menu-item" onclick="openNoteModal('${groupId}')">➕ Thêm nút ghi chú</div>
                <div class="context-menu-divider"></div>
                <div class="context-menu-item" onclick="openGroupModal('${groupId}', 'note')">📝 Sửa tên/icon nhóm</div>
                <div class="context-menu-item delete" onclick="triggerDeleteGroup()">❌ Xóa toàn bộ nhóm</div>
            `;
        } else if (targetType === 'link') {
            menuContent.innerHTML = `
                <div class="context-menu-item" onclick="openLinkModal('${groupId}', ${index})">📝 Chỉnh sửa nút</div>
                <div class="context-menu-item delete" onclick="triggerDeleteLink()">❌ Xóa nút bấm này</div>
            `;
        } else if (targetType === 'note') {
            menuContent.innerHTML = `
                <div class="context-menu-item" onclick="openNoteModal('${groupId}', ${index})">📝 Chỉnh sửa ghi chú</div>
                <div class="context-menu-item delete" onclick="triggerDeleteNote()">❌ Xóa ghi chú này</div>
            `;
        }

        menu.style.display = 'block'; menu.style.left = `${e.pageX}px`; menu.style.top = `${e.pageY}px`;
    }

    document.addEventListener('click', () => document.getElementById('customContextMenu').style.display = 'none');

    function triggerDeleteGroup() {
        const group = dashboardData.find(g => g.id === currentActiveGroupId);
        document.getElementById('confirmMessage').innerText = `Xóa nhóm "${group.title}" cùng toàn bộ dữ liệu bên trong?`;
        document.getElementById('confirmDeleteBtn').onclick = function() {
            dashboardData = dashboardData.filter(g => g.id !== currentActiveGroupId);
            saveData(); closeModal('confirmModal');
        };
        openModal('confirmModal');
    }

    function triggerDeleteLink() {
        const group = dashboardData.find(g => g.id === currentActiveGroupId);
        document.getElementById('confirmMessage').innerText = `Xóa nút bấm "${group.links[currentActiveIndex].name}"?`;
        document.getElementById('confirmDeleteBtn').onclick = function() {
            group.links.splice(currentActiveIndex, 1); saveData(); closeModal('confirmModal');
        };
        openModal('confirmModal');
    }

    function triggerDeleteNote() {
        const group = dashboardData.find(g => g.id === currentActiveGroupId);
        document.getElementById('confirmMessage').innerText = `Xóa nút ghi chú "${group.notes[currentActiveIndex].title}"?`;
        document.getElementById('confirmDeleteBtn').onclick = function() {
            group.notes.splice(currentActiveIndex, 1); saveData(); closeModal('confirmModal');
        };
        openModal('confirmModal');
    }

    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, function(url) { return '<a href="' + url + '" target="_blank">' + url + '</a>'; });
    }

    function renderDashboard() {
        const container = document.getElementById('groupsContainer'); container.innerHTML = '';
        
        if(dashboardData.length === 0) {
            container.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: var(--text-sub)">Chưa có nhóm nào cả.</p>`;
            return;
        }
        
        dashboardData.forEach(group => {

        // Tự động bổ sung type cho dữ liệu cũ
        if (!group.type) {
            group.type = group.notes ? 'note' : 'link';
        }
            const isNoteType = group.type === 'note';
            const groupCard = document.createElement('div');
            groupCard.className = `group-card ${isNoteType ? 'type-note' : ''}`;
            groupCard.setAttribute('data-id', group.id);
            groupCard.setAttribute('oncontextmenu', `openContextMenu(event, 'group-${group.type}', '${group.id}')`);

            const showGroupEmoji = (group.emoji && group.emoji !== "NONE");
            const gEmojiHtml = showGroupEmoji ? `<span>${group.emoji}</span> ` : '';
            const tagHtml = isNoteType ? `<span class="group-tag tag-note">Notes</span>` : `<span class="group-tag tag-link">Links</span>`;

            const headerDiv = document.createElement('div');
            headerDiv.className = 'group-header';
            headerDiv.innerHTML = `<span class="group-title">${gEmojiHtml}${group.title}</span>${tagHtml}`;
            groupCard.appendChild(headerDiv);

            const contentArea = document.createElement('div');
            contentArea.className = isNoteType ? 'notes-area' : 'buttons-area';
            contentArea.setAttribute('data-group-id', group.id);

            if(!isNoteType) {
                if(!group.links || group.links.length === 0) {
                    contentArea.innerHTML = `<span class="no-data-text">Chuột phải để thêm liên kết...</span>`;
                } else {
                    group.links.forEach((link, index) => {
                        const showLinkEmoji = (link.emoji && link.emoji !== "NONE");
                        const lEmojiHtml = showLinkEmoji ? `<span>${link.emoji}</span> ` : '';
                        
                        const itemWrap = document.createElement('div');
                        itemWrap.className = 'item-wrapper';
                        itemWrap.setAttribute('data-index', index);
                        
                        const aLink = document.createElement('a');
                        aLink.href = link.url;
                        aLink.target = '_blank';
                        aLink.className = 'link-button';
                        aLink.setAttribute('oncontextmenu', `openContextMenu(event, 'link', '${group.id}', ${index})`);
                        aLink.innerHTML = `${lEmojiHtml}${link.name}`;
                        
                        itemWrap.appendChild(aLink);
                        contentArea.appendChild(itemWrap);
                    });
                }
            } else {
                // RENDER CÁC NÚT BẤM GHI CHÚ (Đã đồng bộ giao diện gọn đẹp giống Link)
                if(!group.notes || group.notes.length === 0) {
                    contentArea.innerHTML = `<span class="no-data-text">Chuột phải để thêm ghi chú...</span>`;
                } else {
                    group.notes.forEach((noteObj, index) => {
                        // Xử lý dữ liệu cũ sang cấu trúc mới nếu có lỗi tương thích
                        const noteTitle = noteObj.title || "Ghi chú không tên";
                        const showNoteEmoji = (noteObj.emoji && noteObj.emoji !== "NONE");
                        const nEmojiHtml = showNoteEmoji ? `<span>${noteObj.emoji}</span> ` : '';

                        const itemWrap = document.createElement('div');
                        itemWrap.className = 'item-wrapper';
                        itemWrap.setAttribute('data-index', index);
                        
                        const btnNote = document.createElement('div');
                        btnNote.className = 'note-button';
                        btnNote.setAttribute('onclick', `readNoteDetail('${group.id}', ${index})`);
                        btnNote.setAttribute('oncontextmenu', `openContextMenu(event, 'note', '${group.id}', ${index})`);
                        btnNote.innerHTML = `${nEmojiHtml}${noteTitle}`;
                        
                        itemWrap.appendChild(btnNote);
                        contentArea.appendChild(itemWrap);
                    });
                }
            }

            groupCard.appendChild(contentArea);
            container.appendChild(groupCard);
        });

        initDragAndDrop();
    }

    function initDragAndDrop() {
        Sortable.create(document.getElementById('groupsContainer'), {
            animation: 250, ghostClass: 'sortable-ghost-group',
            onEnd: function () {
                const currentOrderIds = Array.from(document.getElementById('groupsContainer').children).map(card => card.getAttribute('data-id'));
                dashboardData.sort((a, b) => currentOrderIds.indexOf(a.id) - currentOrderIds.indexOf(b.id));
                localStorage.setItem('myDashboardDataButtonsEdition', JSON.stringify(dashboardData));
            }
        });

        document.querySelectorAll('.buttons-area, .notes-area').forEach(area => {
            const groupId = area.getAttribute('data-group-id');
            const isNote = area.classList.contains('notes-area');
            Sortable.create(area, {
                animation: 200, ghostClass: 'sortable-ghost-link',
                onEnd: function () {
                    const group = dashboardData.find(g => g.id === groupId); if (!group) return;
                    const newIndices = Array.from(area.children).map(item => parseInt(item.getAttribute('data-index')));
                    
                    if(!isNote) group.links = newIndices.map(idx => group.links[idx]);
                    else group.notes = newIndices.map(idx => group.notes[idx]);

                    localStorage.setItem('myDashboardDataButtonsEdition', JSON.stringify(dashboardData));
                    
                    Array.from(area.children).forEach((child, newIdx) => {
                        child.setAttribute('data-index', newIdx);
                        const innerBtn = child.querySelector('.link-button, .note-button');
                        if(innerBtn) {
                            innerBtn.setAttribute('oncontextmenu', `openContextMenu(event, '${isNote ? 'note' : 'link'}', '${groupId}', ${newIdx})`);
                            if(isNote) innerBtn.setAttribute('onclick', `readNoteDetail('${groupId}', ${newIdx})`);
                        }
                    });
                }
            });
        });
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dashboardData, null, 2));
        const downloadAnchor = document.createElement('a'); downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "workspace_backup.json"); document.body.appendChild(downloadAnchor);
        downloadAnchor.click(); downloadAnchor.remove();
    }

    function importData(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) { dashboardData = importedData; saveData(); }
            } catch (err) { alert("File không hợp lệ!"); }
        };
        reader.readAsText(file); event.target.value = '';
    }

    window.onload = renderDashboard;

    let pressTimer;

    document.addEventListener('touchstart', function(e) {

        const target = e.target.closest(
            '.link-button, .note-button, .group-card'
        );

        if (!target) return;

        pressTimer = setTimeout(() => {

            let groupId = null;
            let index = null;
            let targetType = null;

            const card = target.closest('.group-card');

            if (target.classList.contains('link-button')) {
                groupId = card.dataset.id;
                index = parseInt(target.parentElement.dataset.index);
                targetType = 'link';
            }
            else if (target.classList.contains('note-button')) {
                groupId = card.dataset.id;
                index = parseInt(target.parentElement.dataset.index);
                targetType = 'note';
            }
            else {
                groupId = card.dataset.id;

                const group = dashboardData.find(g => g.id === groupId);

                targetType =
                    group.type === 'note'
                        ? 'group-note'
                        : 'group-link';
            }

            openContextMenu({
                preventDefault(){},
                stopPropagation(){},
                pageX: e.touches[0].pageX,
                pageY: e.touches[0].pageY
            }, targetType, groupId, index);

        }, 500);

    });

    document.addEventListener('touchend', () => clearTimeout(pressTimer));
    document.addEventListener('touchmove', () => clearTimeout(pressTimer));
</script>
</body>
</html>
