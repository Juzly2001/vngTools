<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ tay Tiếng Trung</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff' style='background-color:%230b74de;border-radius:20%25;'%3E%3Cpath d='M13 10V3L4 14h7v7l9-11h-7z'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff' style='background-color:%230b74de;border-radius:20%25;'%3E%3Cpath d='M13 10V3L4 14h7v7l9-11h-7z'/%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.20.0/dist/index.js"></script>
    <style>
        body { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); min-height: 100vh; padding: 20px 10px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-audio { background-color: #dc3545; color: white; border: none; padding: 5px 8px; border-radius: 6px; font-size: 14px; margin: 2px; }
        .correct-input { border: 2px solid green !important; background-color: #d4edda !important; }
        .wrong-input { border: 2px solid red !important; background-color: #f8d7da !important; }
        .show-answer { color: red; font-size: 0.9em; font-weight: bold; margin-top: 5px; }
        .highlight-match {
            text-decoration: underline red; /* Gạch chân lượn sóng màu đỏ */
            text-underline-offset: 2px; /* Khoảng cách giữa chữ và gạch chân */
        }
        
    </style>
</head>

<body>

    <div class="container">
        <h2 class="mb-4">Sổ tay Tiếng Trung</h2>

        <div id="inputArea">
            <textarea id="wordInput" class="form-control" rows="3" placeholder="Nhập từ Hán, Việt để tìm"></textarea>
            <button class="btn btn-primary mt-2 w-100" onclick="processAllWords()">Tra & Thêm từ</button>

            <div class="mt-3 p-3 bg-secondary bg-opacity-10 border rounded">
                <label class="fw-bold">Thêm từ ngẫu nhiên:</label>
                <div class="input-group mt-2">
                    <input type="number" id="randomCount" class="form-control" value="5">
                    <button class="btn btn-info" onclick="addRandomWords()">Thêm ngay</button>
                </div>
            </div>

            <div class="mt-3 p-3 bg-primary bg-opacity-10 border rounded">
                <label class="fw-bold">Thêm từ theo chủ đề:</label>
                <div class="row g-2 mt-2">
                    <div class="col-8">
                        <input type="text" id="topicInput" class="form-control" placeholder="Chủ đề (VD: HSK1)">
                    </div>
                    <div class="col-4">
                        <input type="number" id="topicCount" class="form-control" value="5">
                    </div>
                </div>
                <button class="btn btn-primary w-100 mt-2" onclick="addByTopic()">Thêm theo chủ đề</button>
            </div>

            <div class="mt-3 p-3 bg-light border">
                <label class="fw-bold">Chế độ kiểm tra:</label>
                <div class="input-group mt-2">
                    <select id="quizMode" class="form-select">
                        <option value="zh-vi">Trung - Việt</option>
                        <option value="vi-zh">Việt - Trung</option>
                    </select>
                    <button class="btn btn-warning" onclick="startQuiz()">Bắt đầu</button>
                </div>
            </div>

            <div class="mt-3">
                <label>Tốc độ đọc:</label>
                <select id="speechRate" class="form-select" style="width: 250px;">
                    <option value="0.2">Ơ sao chậm thế? (0.2x)</option>
                    <option value="0.5">Rất chậm (0.5x)</option>
                    <option value="0.75">Chậm (0.75x)</option>
                    <option value="1" selected>Bình thường (1x)</option>
                    <option value="1.5">Nhanh (1.5x)</option>
                </select>
            </div>
        </div>
        
        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-success flex-grow-1" onclick="exportToExcel()">Xuất Excel</button>
            <button class="btn btn-danger flex-grow-1" onclick="clearAll()">Xóa hết</button>
        </div>

        <div class="table-responsive mt-4">
            <table class="table table-bordered table-hover" id="wordTable">
                <thead class="table-dark">
                    <tr>
                        <th>Chữ Hán</th>
                        <th>Pinyin</th>
                        <th>Phát âm</th>
                        <th>Loại từ</th>
                        <th>Nghĩa</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="quizSection" style="display:none;">
            <h4>Bài kiểm tra từ vựng</h4>
            <div id="quizForm" class="mt-3"></div>
            <button class="btn btn-primary mt-3" onclick="checkQuiz()">Kiểm tra</button>
            <button class="btn btn-secondary mt-3" onclick="location.reload()">Quay lại</button>
            <div id="quizResult" class="mt-3 h4"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./hskJson/data.js"></script>
    <script>
        let lastQuery = "";
        
        function showModal(message) {
            document.getElementById('modalMessage').textContent = message;
            let myModal = new bootstrap.Modal(document.getElementById('messageModal'));
            myModal.show();
        }
    
        let vocabData = JSON.parse(localStorage.getItem('myChineseVocab')) || [];
        window.onload = () => vocabData.forEach(item => renderRow(item));
    
    
    
        // Hàm thêm từ từ thư viện
        function addFromLibrary(item) {
            if (vocabData.find(i => i.word === item.word)) return false;
            vocabData.push(item);
            renderRow(item);
            return true;
        }
    
        async function addRandomWords() {
            let count = parseInt(document.getElementById("randomCount").value);
            // Gộp tất cả từ trong thư viện thành 1 danh sách phẳng
            let shuffled = [...window.allVocabulary].sort(() => 0.5 - Math.random());
            
            let added = 0;
            for (let item of shuffled) {
                if (added >= count) break;
                if (addFromLibrary(item)) added++;
            }
            
            if (added > 0) {
                localStorage.setItem('myChineseVocab', JSON.stringify(vocabData));
                showModal(`Đã thêm thành công ${added} từ ngẫu nhiên!`);
            } else {
                showModal("Không thể thêm từ (có thể danh sách đã đầy hoặc đã có đủ từ).");
            }
        }
    
        async function addByTopic() {
            const topic = document.getElementById("topicInput").value.toLowerCase();
            let count = parseInt(document.getElementById("topicCount").value);
            
            // Kiểm tra xem chủ đề có tồn tại không
            if (!fullLibrary[topic]) return showModal("Không tìm thấy chủ đề này! Hãy nhập: hsk1 hoặc hsk2");
            
            // Lấy danh sách gốc của chủ đề đó
            let topicWords = [...fullLibrary[topic]]; 
            
            // Trộn ngẫu nhiên danh sách từ của chủ đề (xáo trộn vị trí)
            let shuffled = topicWords.sort(() => 0.5 - Math.random());
            
            let added = 0;
            for (let item of shuffled) {
                if (added >= count) break; // Dừng khi đã thêm đủ số lượng
                
                // Hàm addFromLibrary kiểm tra trùng lặp
                if (addFromLibrary(item)) {
                    added++;
                }
            }
            
    
    
            if (added === 0) {
                showModal("Các từ trong chủ đề này đã được thêm hết rồi!");
            } else {
                showModal(`Đã thêm ${added} từ ngẫu nhiên từ chủ đề ${topic}`);
                localStorage.setItem('myChineseVocab', JSON.stringify(vocabData));
                console.log(`Đã thêm ${added} từ ngẫu nhiên từ chủ đề ${topic}`);
            }
        }
    
        
    
    let wordToDelete = null;
    
    // Hàm render từng dòng (có tích hợp xóa & highlight)
   function renderRow(obj) {
    let tbody = document.querySelector("#wordTable tbody");
    let row = tbody.insertRow();
    
    row.style.cursor = "context-menu";
    row.oncontextmenu = function(e) {
        e.preventDefault();
        wordToDelete = obj.word;
        document.getElementById('modalMessage').textContent = `Bạn có chắc muốn xóa từ "${obj.word}" không?`;
        new bootstrap.Modal(document.getElementById('messageModal2')).show();
    };

    const highlight = (text) => {
        if (!lastQuery || !text) return text;
        const regex = new RegExp(`(${lastQuery})`, 'gi');
        return text.replace(regex, `<span class="highlight-match">$1</span>`);
    };

    row.insertCell(0).innerHTML = highlight(obj.word);
    row.insertCell(1).innerHTML = highlight(obj.pinyin);
    row.insertCell(2).innerHTML = `<button class="btn btn-audio" onclick="speakChinese('${obj.word}')">🔊</button>`;
    row.insertCell(3).textContent = obj.fromType || "-";
    
    // --- PHẦN CẬP NHẬT CHO VÍ DỤ ---
    let exampleText = obj.example || "";
    let highlightedExample = exampleText.replace(new RegExp(obj.word, 'g'), `<span style="color: red; font-weight: bold;">${obj.word}</span>`);
    
    // Tự động tạo Pinyin cho ví dụ
    let examplePinyin = exampleText ? pinyinPro.pinyin(exampleText, { toneType: 'symbol' }) : "";
    
    let meaningCell = row.insertCell(4);
   meaningCell.innerHTML = `
    <div>${highlight(obj.meaning)}</div>
    ${exampleText ? `
        <div style="margin-top:5px; padding:5px; background:#f9f9f9; border-radius:5px; display: flex; align-items: center; gap: 8px;">
            <button class="btn btn-audio" style="font-size:10px; padding:2px 5px;" onclick="speakChinese('${exampleText}')">🔊</button>
            <span style="font-size:0.9em; color:#333;">
                <ruby>
                    ${highlightedExample}
                    <rt style="font-size:0.8em; color:#dc3545;">${examplePinyin}</rt>
                </ruby>
            </span>
        </div>` : ""}
    ${obj.trans ? `<div style="font-size:0.8em; color:#888; margin-top:2px;">${highlight(obj.trans)}</div>` : ""}
`;
}
        function speakChinese(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN';
            
            // Lấy tốc độ từ ô select
            const rate = document.getElementById("speechRate").value;
            u.rate = parseFloat(rate); 
            
            window.speechSynthesis.speak(u);
        }
    
    // Hàm khởi tạo bài kiểm tra
    function startQuiz() {
        if (vocabData.length === 0) return showModal("Vui lòng thêm từ trước!");
        
        const mode = document.getElementById("quizMode").value;
        const quizForm = document.getElementById("quizForm");
        quizForm.innerHTML = ""; 
        
        document.getElementById("inputArea").style.display = "none";
        document.getElementById("wordTable").parentElement.style.display = "none";
        document.getElementById("quizSection").style.display = "block";
    
        vocabData.forEach((item, index) => {
            let question = mode === "zh-vi" ? item.word : item.meaning;
            
            let div = document.createElement("div");
            div.className = "mb-3";
            // Lưu trữ cả word và pinyin vào thuộc tính data để đối chiếu
            div.innerHTML = `
                <label class="form-label"><b>${index + 1}. ${question}</b></label>
                <input type="text" class="form-control quiz-ans" 
                       data-correct-word="${item.word.toLowerCase()}" 
                       data-correct-pinyin="${item.pinyin.toLowerCase()}" 
                       data-correct-meaning="${item.meaning.toLowerCase()}"
                       placeholder="Nhập đáp án...">
            `;
            quizForm.appendChild(div);
        });
    }
    
        // Hàm kiểm tra đáp án (Bản nâng cấp: không phân biệt hoa thường + hiện đáp án đúng)
    function checkQuiz() {
        let score = 0;
        let total = vocabData.length;
        const mode = document.getElementById("quizMode").value; // Lấy lại chế độ
    
        document.querySelectorAll('.quiz-ans').forEach((input) => {
            let userAnswer = input.value.trim().toLowerCase();
            let parent = input.parentElement;
            
            // Xóa thông báo cũ
            let oldMsg = parent.querySelector('.show-answer');
            if (oldMsg) oldMsg.remove();
    
            let isCorrect = false;
    
            if (mode === "vi-zh") {
                // Chế độ Việt - Trung: Khớp 1 trong 2 (Chữ Hán HOẶC Pinyin)
                if (userAnswer === input.dataset.correctWord || userAnswer === input.dataset.correctPinyin) {
                    isCorrect = true;
                }
            } else {
                // Chế độ Trung - Việt: Chỉ khớp nghĩa (Logic cũ)
                if (userAnswer === input.dataset.correctMeaning) {
                    isCorrect = true;
                }
            }
    
            if (isCorrect) {
                input.className = "form-control quiz-ans correct-input";
                score++;
            } else {
                input.className = "form-control quiz-ans wrong-input";
                let msg = document.createElement("div");
                msg.className = "show-answer";
                // Hiển thị gợi ý đáp án đúng tùy theo chế độ
                msg.textContent = mode === "vi-zh" 
                    ? `Đáp án: ${input.dataset.correctWord} (${input.dataset.correctPinyin})`
                    : `Đáp án: ${input.dataset.correctMeaning}`;
                parent.appendChild(msg);
            }
        });
    
        document.getElementById("quizResult").innerHTML = `<b>Kết quả: ${score}/${total} đúng.</b>`;
    }
    
        // Hàm tìm kiếm & thêm từ
    function processAllWords() {
        const input = document.getElementById("wordInput");
        const query = input.value.trim();
        if (!query) return showModal("Vui lòng nhập từ!");
    
        lastQuery = query.toLowerCase(); // Lưu lại để highlight
        const searchTerms = query.split(/[,，]/);
        let allWords = window.allVocabulary;
        let addedCount = 0;
    
        searchTerms.forEach(term => {
            let q = term.trim().toLowerCase();
            let matches = allWords.filter(item => 
                item.word.toLowerCase().includes(q) || 
                item.pinyin.toLowerCase().includes(q) || 
                item.meaning.toLowerCase().includes(q) ||
                (item.example && item.example.toLowerCase().includes(q)) ||
                (item.trans && item.trans.toLowerCase().includes(q))
            );
    
            matches.forEach(item => {
                if (!vocabData.find(i => i.word === item.word)) {
                    vocabData.push(item);
                    addedCount++;
                }
            });
        });
    
        if (addedCount > 0) {
            localStorage.setItem('myChineseVocab', JSON.stringify(vocabData));
            renderTable(); // Vẽ lại bảng với highlight
        }
        
        showModal(`Đã xử lý xong. Đã thêm ${addedCount} từ mới.`);
        input.value = "";
    }
    
        function clearAll() { localStorage.removeItem('myChineseVocab'); location.reload(); }
        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(vocabData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "TuVungTrung");
            XLSX.writeFile(wb, "TuVungTrung.xlsx");
        }
    
        // Thêm hàm render lại toàn bộ bảng
    function renderTable() {
        document.querySelector("#wordTable tbody").innerHTML = "";
        vocabData.forEach(item => renderRow(item));
    }
    
        function confirmDelete() {
        if (wordToDelete) {
            // Xóa khỏi mảng dữ liệu
            vocabData = vocabData.filter(item => item.word !== wordToDelete);
            localStorage.setItem('myChineseVocab', JSON.stringify(vocabData));
            
            // Tải lại trang để cập nhật bảng (hoặc viết code xóa dòng cụ thể)
            location.reload(); 
        }
    }

    // Hàm tạo pinyin tự động từ chữ Hán
    function getPinyin(text) {
        // pinyin-pro sẽ trả về kết quả dạng: nǐ hǎo
        return pinyinPro.pinyin(text, { toneType: 'symbol' });
    }
    </script>

    <!-- Modal thông báo -->
    <div class="modal fade" id="messageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thông báo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalMessage"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="messageModal2" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Xác nhận xóa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalMessage">
                    <p>Bạn chắc chằn muốn xóa dòng này?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <!-- Nút này sẽ thực hiện hành động xóa thật sự -->
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">Xóa</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
