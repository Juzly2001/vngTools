

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ tay Tiếng Trung</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff' style='background-color:%230b74de;border-radius:20%25;'%3E%3Cpath d='M13 10V3L4 14h7v7l9-11h-7z'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff' style='background-color:%230b74de;border-radius:20%25;'%3E%3Cpath d='M13 10V3L4 14h7v7l9-11h-7z'/%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.20.0/dist/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            color-scheme: light;
            --page-bg: #f5f7fb;
            --page-soft: #eef3f8;
            --card-bg: #ffffff;
            --table-bg: #ffffff;
            --table-row: #ffffff;
            --table-row-hover: #fbfdff;
            --text-main: #182033;
            --text-muted: #667085;
            --line: #e6eaf0;
            --primary: #2563eb;
            --primary-soft: #eff6ff;
            --danger: #dc2626;
            --danger-soft: #fef2f2;
            --success: #059669;
            --warning: #f59e0b;
            --example-bg: #f8fafc;
            --example-line: #e2e8f0;
            --shadow-card: 0 10px 28px rgba(15, 23, 42, .08);
            --shadow-row: 0 12px 26px rgba(15, 23, 42, .10);
            --radius-lg: 20px;
            --radius-md: 16px;
        }

        body.dark-mode {
            color-scheme: dark;
            --page-bg: #0f172a;
            --page-soft: #111827;
            --card-bg: #182235;
            --table-bg: #121a2a;
            --table-row: #182235;
            --table-row-hover: #1e2a40;
            --text-main: #e5e7eb;
            --text-muted: #a9b4c7;
            --line: #2c3a50;
            --primary: #60a5fa;
            --primary-soft: #1e3a5f;
            --danger: #f87171;
            --danger-soft: #3a1f26;
            --success: #34d399;
            --warning: #fbbf24;
            --example-bg: #101827;
            --example-line: #334155;
            --shadow-card: 0 12px 32px rgba(0, 0, 0, .35);
            --shadow-row: 0 14px 28px rgba(0, 0, 0, .28);
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, .08), transparent 30%),
                linear-gradient(180deg, var(--page-bg), var(--page-soft));
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .app-shell {
            max-width: 1500px;
            margin: 0 auto;
        }

        .top-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        h2.mb-4,
        .app-title {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -.03em;
            color: var(--text-main);
        }

        .app-subtitle {
            margin: 4px 0 0;
            color: var(--text-muted);
            font-size: .94rem;
        }

        .theme-toggle {
            border: 1px solid var(--line);
            background: var(--card-bg);
            color: var(--text-main);
            border-radius: 999px;
            min-width: 46px;
            height: 42px;
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 800;
            box-shadow: var(--shadow-card);
            cursor: pointer;
            transition: transform .2s ease, background .2s ease;
        }

        .theme-toggle:hover { transform: translateY(-2px); }

        .card {
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: var(--card-bg);
            color: var(--text-main);
            box-shadow: var(--shadow-card);
            margin-bottom: 1rem;
        }

        .form-control,
        .form-select {
            min-height: 44px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background-color: var(--table-bg);
            color: var(--text-main);
        }

        .form-control::placeholder { color: var(--text-muted); }

        .small.text-muted,
        .text-muted { color: var(--text-muted) !important; }

        .btn {
            min-height: 42px;
            border-radius: 14px;
            font-weight: 750;
        }

        #tableContainer{
            overflow-x:auto;
            overflow-y:hidden;

            -webkit-overflow-scrolling:touch;

            padding:0!important;
            border-radius:18px;
        }

        #tableContainer::-webkit-scrollbar{
            height:10px;
        }

        #tableContainer::-webkit-scrollbar-thumb{
            background:#bfc7d5;
            border-radius:20px;
        }

        #tableContainer::-webkit-scrollbar-track{
            background:transparent;
        }

        .table-responsive { border-radius: 22px; }

        #wordTable {
            width:auto;
        }

        #wordTable thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            padding: 15px 14px;
            border: none;
            color: var(--text-main);
            font-size: .88rem;
            letter-spacing: .02em;
            font-weight: 850;
            background: linear-gradient(180deg, var(--card-bg), var(--table-bg));
            border-bottom: 1px solid var(--line);
        }

        #wordTable thead th:first-child { border-top-left-radius: 20px; }
        #wordTable thead th:last-child { border-top-right-radius: 20px; }

        #wordTable tbody tr {
            transition: transform .22s ease, filter .22s ease;
        }

        #wordTable tbody tr:hover {
            transform: translateY(-3px);
            filter: drop-shadow(var(--shadow-row));
        }

        #wordTable tbody td {
            vertical-align: middle;
            padding: 16px 14px;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            background: var(--table-row);
            color: var(--text-main);
        }

        #wordTable tbody tr:hover td { background: var(--table-row-hover); }

        #wordTable tbody td:first-child {
            border-left: 1px solid var(--line);
            border-top-left-radius: 18px;
            border-bottom-left-radius: 18px;
        }

        #wordTable tbody td:last-child {
            border-right: 1px solid var(--line);
            border-top-right-radius: 18px;
            border-bottom-right-radius: 18px;
        }

        .hanzi-cell {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.35;
            letter-spacing: .04em;
            white-space: nowrap;
            color: var(--text-main);
            font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: geometricPrecision;
        }

        .pinyin-cell {
            color: var(--primary);
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.5;
        }

        .type-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 42px;
            padding: 5px 10px;
            border-radius: 999px;
            background: var(--primary-soft);
            color: var(--primary);
            font-size: .82rem;
            font-weight: 800;
        }

        .btn-audio,
        .draw-btn,
        .delete-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--line);
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease, background .2s ease, color .2s ease, opacity .2s ease;
        }

        .btn-audio {
            background: var(--primary-soft);
            color: var(--primary);
            padding: 0;
            font-size: 1rem;
            box-shadow: none;
        }

        .btn-audio:hover {
            color: #fff;
            background: var(--primary);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 10px 20px rgba(37,99,235,.22);
        }

        .draw-btn {
            background: rgba(5, 150, 105, .10);
            color: var(--success);
            font-size: 1rem !important;
            margin-left: 0 !important;
        }

        .draw-btn:hover {
            color: #fff;
            background: var(--success);
            transform: translateY(-2px) rotate(-5deg) scale(1.06);
        }

        .meaning-wrap {
            position: relative;
            padding-right: 48px;
        }

        .meaning-main {
            font-weight: 700;
            line-height: 1.55;
            font-size: 1rem;
        }

        .example-card {
            margin-top: 12px;
            padding: 14px 15px;
            border-radius: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: var(--example-bg);
            border: 1px solid var(--example-line);
        }

        .example-card .btn-audio {
            flex: 0 0 34px;
            width: 34px;
            height: 34px;
            font-size: .9rem;
        }

        .example-text {

            font-size:26px;

            font-weight:400;

            line-height:1.8;

            font-family:
            "PingFang SC",
            "Noto Sans SC",
            "Microsoft YaHei";
        }

        .example-text ruby {
            ruby-position: over;
        }

        .example-text rt {
            color: var(--danger);
            font-size: .62em;
            font-weight: 650;
            letter-spacing: 0;
            line-height: 1.25;
        }

        .example-highlight {
            color: var(--danger);
            font-weight: 600;
            background: rgba(220, 38, 38, .08);
            padding: 0 3px;
            border-radius: 6px;
        }

        .trans-text {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: .92rem;
            line-height: 1.55;
        }

        .delete-btn {
            position: absolute;
            top: 4px;
            right: 0;
            background: var(--danger-soft);
            color: var(--danger);
            border-color: rgba(220,38,38,.18);
            opacity: 0;
            transform: scale(.82);
        }

        tr:hover .delete-btn,
        .meaning-wrap:hover .delete-btn {
            opacity: 1;
            transform: scale(1);
        }

        .delete-btn:hover {
            background: var(--danger);
            color: #fff;
            transform: rotate(7deg) scale(1.08);
            box-shadow: 0 12px 24px rgba(220,38,38,.28);
        }

        .highlight-match {
            background: linear-gradient(transparent 58%, rgba(245, 158, 11, .35) 58%);
            font-weight: 800;
            border-radius: 4px;
        }

        #quizSection {

            width:min(900px,100%);

            margin:40px auto;

            padding:40px;

        }

        #quizSection h2 {
            text-align: center;
            font-weight: 850;
            margin-bottom: 18px;
        }

        #quizForm {
            display: grid;
            gap: 14px;
        }

        .quiz-question-card {
            border: 1px solid var(--line) !important;
            border-radius: 18px !important;
            padding: 16px !important;
            background: var(--table-row);
            box-shadow: 0 8px 20px rgba(15,23,42,.05);
        }

        .quiz-question-card .form-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            line-height: 1.55;
        }

        .quiz-hanzi {
            font-size: 2.25rem;
            font-weight: 500;
            letter-spacing: .06em;
            font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
        }



        .quiz-listen-btn {
            width: auto !important;
            min-width: 170px;
            height: 46px !important;
            border-radius: 999px !important;
            padding: 0 18px !important;
            gap: 8px;
            font-size: 1rem !important;
            font-weight: 800;
            white-space: nowrap;
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            line-height: 1;
        }

        .quiz-listen-row {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .quiz-ans { margin-bottom: 0; }
        .correct-input { border: 2px solid #16a34a !important; background-color: rgba(22, 163, 74, .12) !important; }
        .wrong-input { border: 2px solid #dc2626 !important; background-color: rgba(220, 38, 38, .12) !important; }
        .show-answer { color: var(--danger); font-weight: 800; font-size: .95em; margin-top: 8px; }

        .quiz-feedback-card {
            margin-top: 18px;
            padding: 18px 20px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: var(--table-row);
            box-shadow: var(--shadow-card);
            text-align: center;
            animation: quizPop .28s ease;
        }

        .quiz-feedback-card.perfect {
            border-color: rgba(22, 163, 74, .35);
            background: linear-gradient(135deg, rgba(22, 163, 74, .14), var(--table-row));
        }

        .quiz-feedback-card.good {
            border-color: rgba(37, 99, 235, .35);
            background: linear-gradient(135deg, rgba(37, 99, 235, .12), var(--table-row));
        }

        .quiz-feedback-card.warning {
            border-color: rgba(220, 38, 38, .35);
            background: linear-gradient(135deg, rgba(220, 38, 38, .12), var(--table-row));
        }

        .quiz-feedback-icon {
            font-size: 2.2rem;
            line-height: 1;
            margin-bottom: 8px;
        }

        .quiz-feedback-title {
            font-size: 1.35rem;
            font-weight: 900;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .quiz-feedback-message {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.55;
        }

        .confetti-layer {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            top: -20px;
            width: 10px;
            height: 16px;
            border-radius: 3px;
            opacity: .95;
            animation-name: confettiFall;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
        }

        @keyframes confettiFall {
            0% { transform: translate3d(0, -10px, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate3d(var(--drift), 105vh, 0) rotate(720deg); opacity: 0; }
        }

        @keyframes quizPop {
            from { opacity: 0; transform: translateY(10px) scale(.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        #character-target-div { max-width: 100%; }

        body.dark-mode .modal-content {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--line);
        }

        body.dark-mode .btn-close { filter: invert(1) grayscale(100%); }


        .word-limit-card {
            overflow: hidden;
        }

        .word-limit-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        #wordCounter {
            font-size: .95rem;
            font-weight: 850;
            color: var(--text-main);
            white-space: nowrap;
        }

        .word-limit-note {
            color: var(--text-muted);
            font-size: .82rem;
            font-weight: 700;
        }

        .word-progress {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: var(--line);
            overflow: hidden;
        }

        #wordProgressBar {
            height: 100%;
            width: 0%;
            border-radius: inherit;
            background: var(--success);
            transition: width .25s ease, background .25s ease;
        }

        #wordProgressBar.warn { background: var(--warning); }
        #wordProgressBar.full { background: var(--danger); }


        /* Sidebar trượt - giữ nguyên giao diện, chỉ mở rộng vùng bảng */
        .workspace {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            width: 100%;
            min-width: 0;
        }

        #inputArea {
            width: 380px;
            flex: 0 0 380px;
            min-width: 0;
            transition: transform .34s ease, margin-right .34s ease, opacity .25s ease;
            will-change: transform, margin-right, opacity;
        }

        #contentArea {
            flex: 1 1 auto;
            min-width: 0;
            transition: width .34s ease;
        }

        .sidebar-toggle-control {
            flex: 0 0 auto;
            position: sticky;
            top: 88px;
            z-index: 60;
            width: 38px;
            height: 46px;
            margin-left: -6px;
            margin-right: -6px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--card-bg);
            color: var(--text-main);
            box-shadow: var(--shadow-card);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.15rem;
            font-weight: 900;
            transition: transform .2s ease, background .2s ease, color .2s ease;
        }

        .sidebar-toggle-control:hover {
            transform: translateY(-2px) scale(1.04);
            background: var(--primary-soft);
            color: var(--primary);
        }

        .workspace.sidebar-collapsed #inputArea {
            transform: translateX(calc(-100% - 28px));
            margin-right: -380px;
            opacity: 0;
            pointer-events: none;
        }

        .workspace.sidebar-collapsed .sidebar-toggle-control {
            margin-left: 0;
        }

        .workspace.sidebar-collapsed #contentArea {
            flex-basis: 100%;
        }

        .sidebar-toggle-hint {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 991px) {
            /* .row { gap: 14px; } */
            #inputArea { order: 1; }
            .col-lg-8 { order: 2; }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container-fluid,
            .app-shell { padding: 0; }
            .top-title {
                position: sticky;
                top: 8px;
                z-index: 20;
                padding: 10px 12px;
                border-radius: 18px;
                background: color-mix(in srgb, var(--card-bg) 88%, transparent);
                backdrop-filter: blur(12px);
                border: 1px solid var(--line);
            }
            .app-title { font-size: 1.3rem; }
            .app-subtitle { display: none; }

            .block-excel {
                display: none !important;
            }

            .workspace {
                gap: 8px;
            }

            #inputArea {
                width: min(330px, calc(100vw - 62px));
                flex-basis: min(330px, calc(100vw - 62px));
            }

            .workspace.sidebar-collapsed #inputArea {
                margin-right: calc(-1 * min(330px, calc(100vw - 62px)));
            }

            .sidebar-toggle-control {
                top: 76px;
                width: 36px;
                height: 44px;
                margin-left: -4px;
                margin-right: -4px;
            }

            .card { border-radius: 18px; margin-bottom: .8rem; }
            .card.p-3, .card.p-4 { padding: 14px !important; }
            .btn, .form-control, .form-select {
                min-height: 46px;
                font-size: 1rem;
            }

            #tableContainer {
                border-radius: 18px;
                overflow: visible;
                background: transparent;
                box-shadow: none;
                border: none;
            }

            #wordTable,
            #wordTable tbody,
            #wordTable tr,
            #wordTable td {
                display: block;
                width: 100%;
            }

            #wordTable {
                padding: 0;
                border-spacing: 0;
            }

            #wordTable thead { display: none; }

            #wordTable tbody tr {
                margin-bottom: 12px;
                border: 1px solid var(--line);
                border-radius: 20px;
                overflow: hidden;
                background: var(--table-row);
                box-shadow: var(--shadow-card);
            }

            #wordTable tbody tr:hover {
                transform: none;
                filter: none;
            }

            #wordTable tbody td {
                border: none !important;
                border-radius: 0 !important;
                padding: 10px 14px;
                background: transparent;
            }

            #wordTable tbody td:first-child {
                padding-top: 15px;
            }

            #wordTable tbody td:nth-child(1)::before { content: "Chữ Hán"; }
            #wordTable tbody td:nth-child(2)::before { content: "Pinyin"; }
            #wordTable tbody td:nth-child(3)::before { content: "Phát âm"; }
            #wordTable tbody td:nth-child(4)::before { content: "Loại từ"; }
            #wordTable tbody td:nth-child(5)::before { content: "Nghĩa"; }

            #wordTable tbody td::before {
                display: block;
                margin-bottom: 4px;
                color: var(--text-muted);
                font-size: .78rem;
                font-weight: 800;
                text-transform: uppercase;
                letter-spacing: .04em;
            }

            .hanzi-cell {

                font-family:
                "PingFang SC",
                "Microsoft YaHei",
                "Noto Sans SC",
                sans-serif;

                font-weight:500;

                font-size:34px;

                letter-spacing:.5px;
            }

            .pinyin-cell { font-size: 1.08rem; }
            .meaning-wrap { padding-right: 44px; }
            .meaning-main { font-size: 1.05rem; }
            .example-card {
                padding: 13px;
                gap: 10px;
            }
            .example-text {
                font-size: 1.35rem;
                line-height: 2.15;
            }
            .delete-btn {
                opacity: 1;
                transform: scale(1);
                top: 0;
                right: 0;
            }

            #quizSection {
                max-width: 100%;
                margin: 0;
                padding: 16px !important;
            }

            #quizSection h2 {
                font-size: 1.35rem;
            }

            .quiz-question-card {
                padding: 14px !important;
                border-radius: 16px !important;
            }

            .quiz-question-card .form-label {
                align-items: flex-start;
                flex-direction: column;
                gap: 6px;
            }

            .quiz-hanzi {
                font-size: 2.35rem;
            }

            .quiz-listen-btn {
                width: 100% !important;
                min-width: 0;
                height: 52px !important;
                justify-content: center;
                font-size: 1rem !important;
            }

            .quiz-listen-row {

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./hskJson/data.js"></script>
    <script>
        let lastQuery = "";

        function applyTheme(theme) {
            const isDark = theme === "dark";
            document.body.classList.toggle("dark-mode", isDark);
            const btn = document.getElementById("themeToggle");
            if (btn) btn.textContent = isDark ? "☀️" : "🌙";
            localStorage.setItem("chineseVocabTheme", theme);
        }



        function applySidebarState(isCollapsed) {
            const workspace = document.getElementById("workspace");
            const btn = document.getElementById("sidebarToggle");
            if (!workspace || !btn) return;

            workspace.classList.toggle("sidebar-collapsed", isCollapsed);
            btn.firstChild.nodeValue = isCollapsed ? "›" : "‹";
            btn.title = isCollapsed ? "Hiện bảng điều khiển" : "Ẩn bảng điều khiển";
            localStorage.setItem("chineseVocabSidebarCollapsed", isCollapsed ? "1" : "0");
        }

        function toggleSidebar() {
            const workspace = document.getElementById("workspace");
            applySidebarState(!workspace.classList.contains("sidebar-collapsed"));
        }



        function applyMobileControlsState(isCollapsed) {
            document.body.classList.toggle("mobile-controls-collapsed", isCollapsed);
            const btn = document.getElementById("mobilePanelToggle");
            if (btn) btn.textContent = isCollapsed ? "Mở ra ↓" : "Thu lên ↑";
            localStorage.setItem("chineseVocabMobileControlsCollapsed", isCollapsed ? "1" : "0");

            if (!isCollapsed && window.matchMedia("(max-width: 768px)").matches) {
                const panel = document.getElementById("inputArea");
                if (panel) panel.scrollTop = 0;
            }
        }

        function toggleMobileControls() {
            applyMobileControlsState(!document.body.classList.contains("mobile-controls-collapsed"));
        }

        function scrollToTopSmooth() {
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function updateBackToTopButton() {
            const btn = document.getElementById("backToTopBtn");
            if (!btn) return;
            btn.classList.toggle("show", window.scrollY > 280);
        }

        window.addEventListener("scroll", updateBackToTopButton, { passive: true });

        function toggleTheme() {
            const current = document.body.classList.contains("dark-mode") ? "dark" : "light";
            applyTheme(current === "dark" ? "light" : "dark");
        }

        applyTheme(localStorage.getItem("chineseVocabTheme") || "light");
        applySidebarState(localStorage.getItem("chineseVocabSidebarCollapsed") === "1");
        applyMobileControlsState(localStorage.getItem("chineseVocabMobileControlsCollapsed") === "1");
        updateBackToTopButton();
        
        function showModal(message) {
            document.getElementById('modalMessage').textContent = message;
            let myModal = new bootstrap.Modal(document.getElementById('messageModal'));
            myModal.show();
        }
    
        const MAX_WORDS = 100;
        let vocabData = JSON.parse(localStorage.getItem('myChineseVocab')) || [];

        // Nếu dữ liệu cũ đã vượt quá 100 từ thì chỉ tải 100 từ đầu để tránh nặng máy.
        if (vocabData.length > MAX_WORDS) {
            vocabData = vocabData.slice(0, MAX_WORDS);
            localStorage.setItem('myChineseVocab', JSON.stringify(vocabData));
        }

        window.onload = () => {
            renderTable();
            updateCounter();
        };

        function updateCounter() {
            const counter = document.getElementById("wordCounter");
            const bar = document.getElementById("wordProgressBar");
            if (!counter || !bar) return;

            const percent = Math.min(100, Math.round((vocabData.length / MAX_WORDS) * 100));
            counter.textContent = `${vocabData.length} / ${MAX_WORDS} từ`;
            bar.style.width = `${percent}%`;
            bar.classList.toggle("warn", percent >= 70 && percent < 100);
            bar.classList.toggle("full", percent >= 100);
        }

        function canAddMoreWords(showWarning = true) {
            if (vocabData.length < MAX_WORDS) return true;
            if (showWarning) {
                showModal(`Đã đạt giới hạn ${MAX_WORDS} từ. Vui lòng xóa bớt từ trước khi thêm mới.`);
            }
            updateCounter();
            return false;
        }

        // Hàm thêm từ từ thư viện
        function addFromLibrary(item) {
            if (!canAddMoreWords(false)) return false;
            if (vocabData.find(i => i.word === item.word)) return false;
            vocabData.push(item);
            renderRow(item);
            updateCounter();
            return true;
        }
    
        async function addRandomWords() {
            if (!canAddMoreWords()) return;

            let count = parseInt(document.getElementById("randomCount").value) || 0;
            const remainingSlots = MAX_WORDS - vocabData.length;
            count = Math.min(count, remainingSlots);

            let shuffled = [...window.allVocabulary].sort(() => 0.5 - Math.random());
            let added = 0;

            for (let item of shuffled) {
                if (added >= count) break;
                if (addFromLibrary(item)) added++;
            }

            if (added > 0) {
                localStorage.setItem('myChineseVocab', JSON.stringify(vocabData));
                updateCounter();

                const limitText = vocabData.length >= MAX_WORDS
                    ? `\n\nĐã đủ ${MAX_WORDS} từ, không thêm nữa để tránh nặng máy.`
                    : "";

                showModal(`Đã thêm thành công ${added} từ ngẫu nhiên!${limitText}`);
            } else {
                showModal(vocabData.length >= MAX_WORDS
                    ? `Đã đạt giới hạn ${MAX_WORDS} từ. Vui lòng xóa bớt trước khi thêm.`
                    : "Không thể thêm từ, có thể các từ đã bị trùng.");
            }
        }
    
        async function addByTopic() {
            if (!canAddMoreWords()) return;

            const topic = document.getElementById("topicInput").value.toLowerCase().trim();
            let count = parseInt(document.getElementById("topicCount").value) || 0;

            if (!fullLibrary[topic]) {
                return showModal("Không tìm thấy chủ đề này! Hãy nhập đúng tên như hsk1, hsk2...");
            }

            const remainingSlots = MAX_WORDS - vocabData.length;
            count = Math.min(count, remainingSlots);

            let shuffled = [...fullLibrary[topic]].sort(() => 0.5 - Math.random());
            let added = 0;

            for (let item of shuffled) {
                if (added >= count) break;
                if (addFromLibrary(item)) added++;
            }

            if (added === 0) {
                showModal(vocabData.length >= MAX_WORDS
                    ? `Đã đạt giới hạn ${MAX_WORDS} từ. Vui lòng xóa bớt trước khi thêm.`
                    : "Các từ trong chủ đề này đã được thêm hết rồi!");
            } else {
                localStorage.setItem('myChineseVocab', JSON.stringify(vocabData));
                updateCounter();

                const limitText = vocabData.length >= MAX_WORDS
                    ? `\n\nĐã đủ ${MAX_WORDS} từ, không thêm nữa để tránh nặng máy.`
                    : "";

                showModal(`Đã thêm ${added} từ từ chủ đề ${topic}.${limitText}`);
            }
        }

   function startQuiz() {
    if (vocabData.length === 0) return showModal("Vui lòng thêm từ trước!");
    
    const mode = document.getElementById("quizMode").value;
    const quizForm = document.getElementById("quizForm");
    quizForm.innerHTML = ""; 
    
    // Xáo trộn mảng vocabData trước khi hiển thị
    let shuffledData = [...vocabData].sort(() => 0.5 - Math.random());

    document.getElementById("inputArea").style.display="none";

    document.getElementById("tableContainer").style.display="none";

    const quiz=document.getElementById("quizSection");

    quiz.style.display="block";

    quiz.scrollIntoView({
        behavior:"smooth",
        block:"center"
    });

    shuffledData.forEach((item, index) => {
        let displayContent = "";
        if (mode === "zh-vi") {
            displayContent = `<span class="quiz-hanzi">${item.word}</span>`;
        } else if (mode === "vi-zh") {
            displayContent = `<b style="font-size:1.1rem;">${item.meaning}</b>`;
        } else if (mode === "listen") {
            // Chế độ nghe: Chỉ hiện nút phát âm
            displayContent = `<span class="quiz-listen-row"><button type="button" class="btn-audio quiz-listen-btn" onclick="speakChinese('${item.word}')">🔊 <span>Nghe phát âm</span></button></span>`;
        }
        
        let div = document.createElement("div");
        div.className = "quiz-question-card";
        div.innerHTML = `
            <label class="form-label"><b>${index + 1}.</b> ${displayContent}</label>
            <input type="text" class="form-control quiz-ans" 
                   data-correct-word="${item.word.toLowerCase()}" 
                   data-correct-pinyin="${item.pinyin.toLowerCase()}" 
                   data-correct-meaning="${item.meaning.toLowerCase()}"
                   placeholder="Nhập đáp án...">
        `;
        quizForm.appendChild(div);
    });
}
    
        // Hàm kiểm tra đáp án (Bản nâng cấp: không phân biệt hoa thường + hiện đáp án đúng)
function checkQuiz() {
    let score = 0;
    let total = vocabData.length;
    const mode = document.getElementById("quizMode").value;
    
    document.querySelectorAll('.quiz-ans').forEach((input) => {
        // Lấy giá trị người dùng nhập và chuẩn hóa
        // Dùng removeTone cho Pinyin/Hán, dùng normalizeVietnamese cho tiếng Việt
        let userAnswer = (mode === "zh-vi") 
            ? normalizeVietnamese(input.value) 
            : removeTone(input.value.trim().toLowerCase());
        
        // Lấy dữ liệu gốc từ data-attributes
        let correctWord = input.dataset.correctWord.toLowerCase();
        let correctPinyin = removeTone(input.dataset.correctPinyin.toLowerCase());
        let correctMeaning = (mode === "zh-vi") ? normalizeVietnamese(input.dataset.correctMeaning) : "";
        let correctExample = (input.dataset.correctExample || "").toLowerCase();
        let correctExamplePinyin = removeTone(pinyinPro.pinyin(input.dataset.correctExample || "", { toneType: 'none' }).replace(/\s+/g, ''));

        let parent = input.parentElement;
        let oldMsg = parent.querySelector('.show-answer');
        if (oldMsg) oldMsg.remove();
    
        let isCorrect = false;
    
        // 1. LOGIC CHẤM ĐIỂM
        if (mode === "vi-zh") {
            if (userAnswer === correctWord || userAnswer === correctPinyin) isCorrect = true;
        } else if (mode === "listen") {
            if (userAnswer === correctWord || userAnswer === correctPinyin) isCorrect = true;
        } else if (mode === "listen-example") {
            if (userAnswer === correctExample || userAnswer === correctExamplePinyin) isCorrect = true;
        } else if (mode === "zh-vi") {
            if (userAnswer === correctMeaning) isCorrect = true;
        }
    
        // 2. LOGIC HIỂN THỊ KẾT QUẢ
        if (isCorrect) {
            input.className = "form-control quiz-ans correct-input";
            score++;
        } else {
            input.className = "form-control quiz-ans wrong-input";
            let msg = document.createElement("div");
            msg.className = "show-answer";
            
            // Hiển thị đáp án gợi ý theo chế độ
            let hint = "";
            if (mode === "vi-zh" || mode === "listen") {
                hint = `${input.dataset.correctWord} (${input.dataset.correctPinyin})`;
            } else if (mode === "zh-vi") {
                hint = input.dataset.correctMeaning;
            } else if (mode === "listen-example") {
                let exPinyin = pinyinPro.pinyin(input.dataset.correctExample, { toneType: 'none' }).replace(/\s+/g, '');
                hint = `${input.dataset.correctExample} (${exPinyin})`;
            }
            
            msg.textContent = `Đáp án: ${hint}`;
            parent.appendChild(msg);
        }
    });
    
    showQuizFeedback(score, total);
}

function showQuizFeedback(score, total) {
    const result = document.getElementById("quizResult");
    if (!result) return;

    const percent = total > 0 ? Math.round((score / total) * 100) : 0;
    let type = "warning";
    let icon = "⚠️";
    let title = "Cần ôn lại nhé";
    let message = `Bạn đúng ${score}/${total} câu (${percent}%). Đừng vội nản, hãy nghe lại và làm lại các từ sai một lần nữa.`;

    if (score === total && total > 0) {
        type = "perfect";
        icon = "🎉";
        title = "Xuất sắc! Đúng toàn bộ";
        message = `Bạn đạt ${score}/${total} câu (${percent}%). Quá tuyệt vời, tiếp tục giữ phong độ này nhé!`;
        launchConfetti();
    } else if (percent > 50) {
        type = "good";
        icon = "💪";
        title = "Làm tốt lắm!";
        message = `Bạn đúng ${score}/${total} câu (${percent}%). Bạn đã vượt qua hơn một nửa rồi, chỉ cần ôn thêm một chút nữa là rất ổn.`;
    }

    result.innerHTML = `
        <div class="quiz-feedback-card ${type}">
            <div class="quiz-feedback-icon">${icon}</div>
            <div class="quiz-feedback-title">${title}</div>
            <div class="quiz-feedback-message">${message}</div>
        </div>
    `;
}

function launchConfetti() {
    const oldLayer = document.querySelector(".confetti-layer");
    if (oldLayer) oldLayer.remove();

    const layer = document.createElement("div");
    layer.className = "confetti-layer";
    document.body.appendChild(layer);

    const colors = ["#ef4444", "#f59e0b", "#22c55e", "#3b82f6", "#a855f7", "#ec4899"];
    const count = window.innerWidth < 768 ? 70 : 120;

    for (let i = 0; i < count; i++) {
        const piece = document.createElement("span");
        piece.className = "confetti-piece";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2.2 + Math.random() * 1.6) + "s";
        piece.style.animationDelay = (Math.random() * .45) + "s";
        piece.style.setProperty("--drift", (Math.random() * 240 - 120) + "px");
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        layer.appendChild(piece);
    }

    setTimeout(() => layer.remove(), 4300);
}

        // Hàm tìm kiếm & thêm từ
    function processAllWords() {
        const input = document.getElementById("wordInput");
        const query = input.value.trim();
        if (!query) return showModal("Vui lòng nhập từ!");
        if (!canAddMoreWords()) return;

        lastQuery = query.toLowerCase();
        const searchTerms = query.split(/[,，]/);
        let allWords = window.allVocabulary;
        let addedCount = 0;
        let reachedLimit = false;

        searchTerms.forEach(term => {
            if (vocabData.length >= MAX_WORDS) {
                reachedLimit = true;
                return;
            }

            let q = term.trim().toLowerCase();
            let qNoTone = removeTone(q);
            let matches = allWords.filter(item => {
                let pinyinNoTone = removeTone(item.pinyin);
                return item.word.toLowerCase().includes(q) ||
                    pinyinNoTone.includes(qNoTone) ||
                    item.meaning.toLowerCase().includes(q) ||
                    (item.example && item.example.toLowerCase().includes(q)) ||
                    (item.trans && item.trans.toLowerCase().includes(q));
            });

            for (let item of matches) {
                if (vocabData.length >= MAX_WORDS) {
                    reachedLimit = true;
                    break;
                }

                if (!vocabData.find(i => i.word === item.word)) {
                    vocabData.push(item);
                    addedCount++;
                }
            }
        });

        if (addedCount > 0) {
            localStorage.setItem('myChineseVocab', JSON.stringify(vocabData));
            renderTable();
            updateCounter();
        }

        const limitText = reachedLimit || vocabData.length >= MAX_WORDS
            ? `\n\nĐã đạt giới hạn ${MAX_WORDS} từ nên hệ thống đã dừng thêm.`
            : "";

        showModal(`Đã xử lý xong. Đã thêm ${addedCount} từ mới.${limitText}`);
        input.value = "";
    }

        // Thêm hàm render lại toàn bộ bảng
    function renderTable() {
        document.querySelector("#wordTable tbody").innerHTML = "";
        vocabData.forEach(item => renderRow(item));
        updateCounter();
    }
    
    // Biến tạm để lưu từ cần xóa
    let wordPendingDelete = null;

    // Sửa lại hàm này
    function deleteWord(word) {
        wordPendingDelete = word; // Lưu từ vào biến tạm

        document.querySelector('#messageModal2 .modal-body p').textContent = `Bạn muốn xóa dòng "${word}" này?`;

        let myModal = new bootstrap.Modal(document.getElementById('messageModal2'));
        myModal.show();
    }

    // Hàm này được gọi khi nhấn nút "Xóa" trong Modal
    function confirmDelete() {
        if (wordPendingDelete) {
            // Xóa khỏi mảng dữ liệu
            vocabData = vocabData.filter(item => item.word !== wordPendingDelete);
            // Lưu lại vào LocalStorage
            localStorage.setItem('myChineseVocab', JSON.stringify(vocabData));
            
            // Vẽ lại bảng
            renderTable();
            updateCounter();
            
            // Đóng Modal
            let modalEl = document.getElementById('messageModal2');
            let modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();
            
            // Reset biến tạm
            wordPendingDelete = null;
        }
    }

    // Hàm tạo pinyin tự động từ chữ Hán
    function getPinyin(text) {
        // pinyin-pro sẽ trả về kết quả dạng: nǐ hǎo
        return pinyinPro.pinyin(text, { toneType: 'symbol' });
    }
    

    function removeTone(str) {
        if (!str) return "";
        return str.toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "") // Loại bỏ các dấu thanh
            .replace(/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]/g, (match) => {
                const map = { 'ā':'a','á':'a','ǎ':'a','à':'a', 'ē':'e','é':'e','ě':'e','è':'e', 'ī':'i','í':'i','ǐ':'i','ì':'i', 'ō':'o','ó':'o','ǒ':'o','ò':'o', 'ū':'u','ú':'u','ǔ':'u','ù':'u', 'ǖ':'u','ǘ':'u','ǚ':'u','ǜ':'u' };
                return map[match] || match;
            });
    }

    function normalizeVietnamese(str) {
        if (!str) return "";
        return str.toLowerCase()
            .trim()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, ""); // Chỉ loại bỏ dấu thanh, giữ nguyên chữ cái
    }

        return;
    }

    document.getElementById('drawChar').textContent = char;

   currentWriter = HanziWriter.create('character-target-div', char, {

});

setTimeout(() => {

    startWriterQuiz();
}, 500);
}

function startWriterQuiz() {
    currentQuizOptions = {
        onMistake: function() {
            document.getElementById('scoreDisplay').textContent = "Sai nét!";
        },
        onCorrectStroke: function() {
            document.getElementById('scoreDisplay').textContent = "Đúng nét!";
        },
        onComplete: function(summaryData) {
            let score = Math.max(0, 100 - summaryData.totalMistakes * 15);
            document.getElementById('scoreDisplay').textContent =
                `Kết quả: ${score}/100 | Sai: ${summaryData.totalMistakes} lần`;
        }
    };

    currentWriter.quiz(currentQuizOptions);
}

function resetWriter() {
    if (!currentWriter) return;

    document.getElementById('scoreDisplay').textContent = "Viết lại";

    currentWriter.cancelQuiz();
    currentWriter.hideCharacter();
    currentWriter.showOutline();

    setTimeout(() => {
        startWriterQuiz();
    }, 100);
}
